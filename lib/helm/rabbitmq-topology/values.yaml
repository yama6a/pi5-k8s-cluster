# Shared defaults every rabbitmq-topology consumer inherits (merged under the `rabbitmq-topology` key, the
# repo's usual "config under the dependency name" convention). A workload overrides these under its own
# `rabbitmq-topology:` block. This library renders only topology CRs (User/Exchange/Queue/Binding/Permission)
# against the shared broker; it never touches the workload's Deployment (the pod wires the generated
# credentials Secret itself, like the PG_PASSWORD block). Full schema + the ownership model: see 11_messaging.md.

# The shared broker to point every CR at (03_rabbitmq_cluster). Cross-namespace: the CRs live in the
# workload's namespace but reference the broker in `rabbitmq`, so the generated <user>-user-credentials Secret
# lands in the workload namespace. Rarely overridden.
cluster:
  name: rabbitmq
  namespace: rabbitmq

# The one shared vhost (must match 03_rabbitmq_cluster's `vhost`). All this workload's users/topology live here.
vhost: apps

# This workload's ONE user (reusable for all its publish + consume needs). Empty => defaults to the release
# name at render time. The operator generates its credentials into Secret `<user>-user-credentials`.
user: ""

# ---- Dead-letter (DLQ) ----
# Every CONSUMER queue this workload owns (each consumeCommands + subscribeEvents queue) gets a companion
# dead-letter exchange `<queue>.dlx` (fanout) + queue `<queue>.dlq` (quorum), and the source queue is declared
# with x-dead-letter-exchange + x-delivery-limit: after `deliveryLimit` failed redeliveries a poison message is
# routed to its DLQ instead of being silently dropped (at-most-once — the RabbitMQ default). DLQs are holding
# queues, nothing consumes them; you alert on their depth (see the rabbitmq-dlq-not-empty alert / 09_monitoring.md)
# and drain/replay by hand. Set `deadLetter: false` to opt a workload out.
# NOTE: queue arguments are IMMUTABLE in RabbitMQ — turning this on for an EXISTING queue needs that queue
# recreated (delete it once; the operator redeclares it with the args). See 11_messaging.md.
deadLetter: true
deliveryLimit: 5

# ---- EVENT topics this workload OWNS + publishes to (1 publisher : N consumers) ----
# Each entry declares an Exchange this workload owns and grants this workload write on it. Consumers of these
# events declare their own queues via `subscribeEvents` (below), each readable only by their own user.
#   - name: sample-events      # the exchange name
#     type: topic              # topic | fanout | direct | headers (REQUIRED, no default)
publishEvents: []

# ---- EVENT topics this workload SUBSCRIBES to (its OWN private queue per subscription) ----
# For each, a Queue named "<user>.<exchange>" + a Binding to that exchange are created, and this workload's
# user is granted read on that queue (only this user can consume it). The exchange itself is NOT declared here
# — its owning publisher declares it via `publishEvents`.
#   - exchange: other-events   # an event exchange owned by the publisher workload
#     routingKey: "order.#"    # AMQP topic pattern (default "#" = all)
subscribeEvents: []

# ---- COMMAND topics this workload OWNS + consumes (N publishers : 1 consumer = me) ----
# Each entry declares the Exchange + its single Queue + the Binding (all owned by this consumer) and grants
# this workload read on the queue. Other workloads send to it via `sendCommands`. The exchange is ALWAYS a
# `direct` exchange — a command topic is point-to-point by definition, so the type isn't configurable (setting
# `type` is rejected). Only `name` (+ optional `routingKey`) are knobs.
#   - name: sample-commands    # the command exchange + queue name (this workload is the sole consumer)
#     routingKey: ""           # binding key (default: the name itself, i.e. direct routing)
consumeCommands: []

# ---- COMMAND topics OWNED BY OTHER workloads that this workload SENDS to ----
# Just grants this workload write on the named exchange(s); the exchange+queue are declared by their owning
# consumer via its `consumeCommands`.
#   - other-commands           # an exchange name owned by the consumer workload
sendCommands: []
