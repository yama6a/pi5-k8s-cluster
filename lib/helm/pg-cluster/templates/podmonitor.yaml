{{- if and .Values.cluster.cluster.monitoring.enabled .Values.cluster.cluster.monitoring.podMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "pg-cluster.name" . }}-cluster-podmonitor
  namespace: {{ .Release.Namespace }}
  labels:
    cnpg.io/cluster: {{ include "pg-cluster.name" . }}
    {{- include "pg-cluster.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: {{ include "pg-cluster.name" . }}
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
{{- end }}
