{{- /*
Backup-health alerts for the S3/Barman-plugin path. The upstream cnpg/cluster PrometheusRule ships HA /
replication / disk / connection alerts but NOTHING for backups or WAL archiving, so we add the two that
matter here. Rendered only when backups are ON (and monitoring's PrometheusRule is enabled) — the VM operator
converts this PrometheusRule to a VMRule, same as the bundled one. Scoped to THIS cluster by the pod-name
regex (`<fullname>-<N>`), the same convention the upstream rules use. See docs/13_backups.md.
*/ -}}
{{- if and .Values.cluster.backups.enabled .Values.cluster.cluster.monitoring.prometheusRule.enabled }}
{{- $c := .Values.cluster.fullnameOverride }}
{{- $sel := printf `namespace="%s",pod=~"%s-([1-9][0-9]*)"` .Release.Namespace $c }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ $c }}-backup-alerts
  namespace: {{ .Release.Namespace }}
spec:
  groups:
    - name: cloudnative-pg-backups/{{ $c }}
      rules:
        # WAL archiving falling behind or failing. This is the load-bearing alert: a stalled archiver lets
        # `.ready` segments pile up in pg_wal/archive_status, pg_wal keeps growing, and once the volume fills
        # the PRIMARY goes read-only / crashes. `cnpg_collector_pg_wal_archive_status{value="ready"}` counts
        # those not-yet-archived segments; a sustained >0 for 15m means archiving isn't keeping up (transient
        # spikes under write bursts clear well within that window). Method-agnostic — reads the local status dir,
        # so it works regardless of the plugin. NOTE: confirm the label is `value` (vs `status`) against the live
        # /metrics during the verify step; if the operator renamed it, this expr silently won't match.
        - alert: CNPGWALArchiveFailing
          expr: max by (pod) (cnpg_collector_pg_wal_archive_status{ {{- $sel }},value="ready"}) > 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "CNPG {{ $c }}: WAL archiving to S3 is failing"
            description: >-
              WAL segments are accumulating in archive_status/ready on {{ "{{ $labels.pod }}" }} and are not
              being archived to S3. RPO is degrading and pg_wal will grow until the volume fills and the
              primary goes read-only. Check the barman-cloud sidecar logs and the S3 creds/bucket.
        # No recent successful base backup. The `cnpg_collector_last_available_backup_timestamp` metric is
        # deprecated since 1.26 and MAY stay 0 under the plugin (only guaranteed for the native path) — so we
        # guard with `> 0`: if it's never populated the alert simply won't fire (we lean on the WAL alert +
        # `kubectl cnpg status` then), rather than firing forever against a zero timestamp. 36h = a daily
        # schedule plus generous slack. See docs/13_backups.md.
        - alert: CNPGBackupTooOld
          expr: >-
            (cnpg_collector_last_available_backup_timestamp{ {{- $sel }} } > 0)
            and
            ((time() - cnpg_collector_last_available_backup_timestamp{ {{- $sel }} }) > 129600)
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "CNPG {{ $c }}: last base backup is >36h old"
            description: >-
              The most recent successful base backup for {{ $c }} completed more than 36 hours ago (daily
              schedule expected). Check the latest Backup object and the barman-cloud sidecar on the standby.
{{- end }}
