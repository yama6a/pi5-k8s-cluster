{{- /*
Validation only — renders to empty (all branches either fail or produce nothing). Enforces the REQUIRED
fields. NOTE: the upstream cnpg/cluster chart's own defaults (type=postgresql, instances=3, resources={})
coalesce up into this scope, so a naive `required` would be satisfied by them — hence values.yaml seeds
invalid sentinels (type="", resources={}, instances unset) and we check truthiness / the 1|2 range here.
Runs in this wrapper's scope, so it sees the consumer's overrides merged over values.yaml.
*/ -}}
{{- $c := .Values.cluster.cluster -}}
{{- if not .Values.cluster.fullnameOverride }}
{{- fail "pg-cluster: cluster.fullnameOverride is required (the explicit Postgres instance name; no release-name derivation, and it must be unique across a workload's DBs)" }}
{{- end }}
{{- if not .Values.cluster.type }}
{{- fail "pg-cluster: cluster.type is required (postgresql | postgis | timescaledb)" }}
{{- end }}
{{- if not (has (int ($c.instances | default 0)) (list 1 2)) }}
{{- fail (printf "pg-cluster: cluster.cluster.instances is required and must be 1 or 2 (got %v)" $c.instances) }}
{{- end }}
{{- if not $c.resources }}
{{- fail "pg-cluster: cluster.cluster.resources is required (per-instance requests/limits)" }}
{{- end }}
{{- if not .Values.networkPolicy.allowedClients }}
{{- fail "pg-cluster: networkPolicy.allowedClients is required (who may reach Postgres on 5432); the DB policy is always enforced, so an empty list would wall off the database" }}
{{- end }}
{{- /* When backups are on, the chart's `required` would fail deep in the ObjectStore render; catch it here
      with a message that names the .env-driven knob 14_cnpg_backup.sh injects. */ -}}
{{- if .Values.cluster.backups.enabled }}
{{- if not .Values.cluster.backups.s3.bucket }}
{{- fail "pg-cluster: cluster.backups.s3.bucket is required when backups are enabled (set S3_BACKUP_BUCKET in .env and run 14_cnpg_backup.sh)" }}
{{- end }}
{{- if not .Values.cluster.backups.s3.region }}
{{- fail "pg-cluster: cluster.backups.s3.region is required when backups are enabled (set AWS_REGION in .env and run 14_cnpg_backup.sh)" }}
{{- end }}
{{- if not .Values.cluster.backups.secret.name }}
{{- fail "pg-cluster: cluster.backups.secret.name is required when backups are enabled (the sealed S3 creds secret; default cnpg-backup-s3)" }}
{{- end }}
{{- end }}
