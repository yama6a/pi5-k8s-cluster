apiVersion: v2
name: pg-cluster
description: >-
  Shared wrapper chart that turns the upstream cnpg/cluster chart (the CloudNativePG Cluster CR + its
  PodMonitor + the 18-alert PrometheusRule) into a small, curated interface for workloads. It pre-bakes
  every boilerplate value a workload should never think about (node-local local-path storage, hostname
  anti-affinity, monitoring on, an `app`/`app` initdb, backups off) and exposes only the knobs a workload
  actually decides: REQUIRED `cluster.type`, `cluster.cluster.instances`, `cluster.cluster.resources`, and
  OPTIONAL-with-defaults max_connections / shared_buffers / prometheusRule.enabled. A consumer's Postgres
  drops from ~40 lines of nested cnpg/cluster config to ~6 lines of real decisions.

  Lives in lib/helm/ (the repo's home for charts consumed as a dependency by other charts) but is the FIRST
  `type: application` chart there: unlike the ingress-edge library it must pin a real upstream dependency
  (cnpg/cluster), so it can't be `type: library`. See CLAUDE.md's shared-charts paragraph.

  CAVEATS (inherent to wrapping a subchart, Helm can't transform/lock a child's values):
    - "Hardcoded" values below are SOFT: fixed defaults a consumer *could* still override but shouldn't.
    - Consumers gain one nesting level (pg-cluster.cluster.cluster.*), offset by a far shorter values file.
  Required fields aren't left to the upstream default; a validation-only template (templates/validate.yaml)
  fails the render with a clear message if fullnameOverride/type/instances/resources are unset. Consumed via a
  file:// dependency; see argo_apps/workloads/charts/sample_workload. The Cluster + its services/secret are named
  off the REQUIRED `cluster.fullnameOverride` (e.g. `<name>-rw`, `<name>-app`) — an explicit name you set, not
  the release name, so a workload can alias this wrapper for multiple DBs. See 10_sample_workload.md.
type: application
version: 0.1.0                 # this wrapper chart's own version

dependencies:
  - name: cluster
    version: "0.7.0"          # cnpg/cluster chart, THE single source for the pin
    repository: https://cloudnative-pg.github.io/charts
