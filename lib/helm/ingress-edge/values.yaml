# Shared defaults every ingress-edge consumer inherits (merged under the `ingress-edge` key). Per-ingress
# data (domain, hosts) lives in each consumer's own `ingresses:`; schema in 07_ingress.md. This library
# renders only the edge (Gateway/Certificate/HTTPRoute/ReferenceGrant); SSO is applied centrally per domain
# by the google-sso chart.
ingressEdge:
  gatewayClassName: eg          # Envoy Gateway class (01_envoy_gateway); mergeGateways -> one LB IP.
  gatewayNamespace: gateway     # ns for Gateways/Certs/Routes (ReferenceGrants go to the backend ns).
  defaultIssuer: letsencrypt-staging   # fallback issuer; must be letsencrypt-staging|letsencrypt-prod.

# ingresses[] schema — each consumer sets its own; full docs in 07_ingress.md:
#   - name: platform              # unique; the SAN cert name + the <name>-tls Secret
#     domain: pontiki.app         # required; exactly one registrable domain
#     issuer: letsencrypt-staging # optional; defaults to defaultIssuer
#     hosts:
#       - subdomain: argocd            # host = argocd.pontiki.app  ("@" = apex)
#         targetService: argocd-server # the k8s Service to route to
#         targetNamespace: argocd      # optional; defaults to the consumer's release namespace
#         targetPort: 80               # the Service port
ingresses: []
