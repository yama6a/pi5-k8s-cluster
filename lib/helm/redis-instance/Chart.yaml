apiVersion: v2
name: redis-instance
description: >-
  Shared wrapper chart that renders ONE standalone OpsTree `Redis` CR (redis.redis.opstreelabs.in/v1beta2) plus
  its ServiceMonitor and a default-deny CiliumNetworkPolicy, as a small curated interface for workloads. A
  first-party chart (no upstream dependency — pure templates); the Redis CRD it targets is installed by the
  platform's 03_redis_operator. A REQUIRED `persistence` flag (no default) selects the mode: durable
  (longhorn-redis-persistent class, Retain + AOF) or ephemeral cache (longhorn-redis-ephemeral class, Delete,
  RDB-only) — the two 2-replica classes are shipped by the platform's 03_redis_operator app. Everything a workload
  shouldn't decide is HARDCODED in the templates (images + tags, the redis-exporter, a maxmemory bound, a non-root
  podSecurityContext, and no-auth — gated by the network policy instead); a workload sets four REQUIRED knobs
  (name / resources / allowedClients / persistence) plus an OPTIONAL create-time initialFixedDiskSize (default 1Gi;
  changing it later has no effect — see docs/12_redis.md). A single standalone instance (no HA / replication
  / sentinel / cluster); DURABLE instances are labelled for off-cluster RDB backups to S3, done centrally by
  the platform's 07_redis_backup app (not per instance — see docs/12_redis.md + docs/13_backups.md). Declared
  as an ALIASED file:// dependency, once per instance (alias =>
  values key), the same shape as pg-cluster — so "one or more Redis per workload" is just "one or more aliases".
  See README.md and docs/12_redis.md.
type: application
version: 0.3.0                 # this chart's own version (0.3.0: durable instances labelled for central S3 backup)
