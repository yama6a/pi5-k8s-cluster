{{- /*
Off-cluster RDB backup for a DURABLE instance. Rendered only when persistence AND backups.bucket are set
(ephemeral instances are never backed up; empty bucket = feature off). One CronJob per instance; the name
`<name>-redis-backup` is load-bearing — the Grafana alert (05_grafana) selects backup jobs by it.

Two stages sharing an emptyDir:
  initContainer dump  — redis-cli --rdb does a full replication SYNC of the live instance over 6379 (the
                        Service, no auth, netpol-gated) and writes an app-consistent point-in-time RDB. No PVC
                        or AOF-file access. The dump image is the SAME opstree redis as the server (annotated
                        for renovate below), but --rdb only streams bytes so it is version-tolerant regardless.
  container    upload — aws s3 cp to <prefix><ns>/<name>/<UTC-timestamp>.rdb; creds from the sealed secret,
                        SSE-S3 is enforced by the bucket. Egress is opened by backup-networkpolicy.yaml.
*/ -}}
{{- if and .Values.persistence .Values.backups.bucket }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.name }}-redis-backup
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/component: redis-backup
spec:
  schedule: {{ .Values.backups.schedule | quote }}
  concurrencyPolicy: Forbid          # never overlap dumps of the same instance
  startingDeadlineSeconds: 300        # skip (don't stampede) a run the scheduler missed by >5m
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 900      # a dump+upload that runs >15m is wedged — fail it
      ttlSecondsAfterFinished: 86400  # GC finished jobs after a day
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ .Values.name }}
            app.kubernetes.io/component: redis-backup
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile: { type: RuntimeDefault }
          initContainers:
            - name: dump
              # renovate: datasource=docker
              image: "quay.io/opstree/redis:v8.6.2"
              imagePullPolicy: IfNotPresent
              command:
                - redis-cli
                - -h
                - {{ .Values.name }}.{{ .Release.Namespace }}.svc.cluster.local
                - -p
                - "6379"
                - --rdb
                - /work/dump.rdb
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
              resources:
                requests: { cpu: 25m, memory: 32Mi }
                limits:   { memory: 128Mi }
              volumeMounts:
                - { name: work, mountPath: /work }
          containers:
            - name: upload
              # renovate: datasource=docker
              image: "public.ecr.aws/aws-cli/aws-cli:2.36.0"
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - aws s3 cp /work/dump.rdb "s3://${BUCKET}/${PREFIX}${NS}/${NAME}/$(date -u +%Y%m%dT%H%M%SZ).rdb"
              env:
                - { name: HOME,   value: /work }         # aws-cli needs a writable HOME as non-root
                - { name: BUCKET, value: {{ .Values.backups.bucket | quote }} }
                - { name: PREFIX, value: {{ .Values.backups.prefix | quote }} }
                - { name: NS,     value: {{ .Release.Namespace | quote }} }
                - { name: NAME,   value: {{ .Values.name | quote }} }
                - { name: AWS_DEFAULT_REGION, value: {{ .Values.backups.region | quote }} }
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef: { name: {{ .Values.backups.secretName }}, key: AWS_ACCESS_KEY_ID }
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef: { name: {{ .Values.backups.secretName }}, key: AWS_SECRET_ACCESS_KEY }
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
              resources:
                requests: { cpu: 25m, memory: 64Mi }
                limits:   { memory: 256Mi }
              volumeMounts:
                - { name: work, mountPath: /work }
          volumes:
            - name: work
              emptyDir: {}
{{- end }}
