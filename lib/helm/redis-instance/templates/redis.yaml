{{- /*
The standalone OpsTree Redis instance. `kind: Redis` (redis.redis.opstreelabs.in/v1beta2) => the operator
reconciles a single-pod StatefulSet with ONE PVC. Single-instance by design (no HA/replication): on node loss
Longhorn reattaches the volume elsewhere and the pod reschedules — a brief availability gap, the volume follows.
Field shape mirrors the upstream ot-helm/redis chart's standalone template (verified against redis 0.16.9).

A workload sets name / resources / allowedClients (+ optional persistence + initialFixedDiskSize). EVERYTHING
ELSE IS PINNED HERE, once, for every instance at once:
  storage class    persistence=true -> longhorn-r2-retained (Retain); false -> longhorn-r2-ephemeral (Delete);
                   both 2-replica, from the platform 02_longhorn app. initialFixedDiskSize is the only storage
                   knob, create-time only — default 1Gi (see docs/12_redis.md "Resizing an instance")
  persistence      REQUIRED (no default). true: AOF appendfsync everysec + RDB, crash-durable. false: RDB only, no AOF
  maxmemory        80% of the container memory limit (noeviction: writes fail at the cap, never drop data)
  security         non-root uid/gid 1000
  auth             OFF — access is gated by the CiliumNetworkPolicy (see networkpolicy.yaml), not requirepass
Single standalone instance by design: no HA / replication / sentinel / cluster, and no off-cluster backups.
Bump a tag / image here and every instance the chart renders picks it up.
*/ -}}
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: cache
    {{- if .Values.alertCritical }}
    alert-criticality: critical   # OpsTree copies CR labels onto the StatefulSet + pods, so the outage alerts (statefulset-not-available / container-waiting-fatal) page `critical`. See docs/09_monitoring.md.
    {{- end }}
    {{- if .Values.persistence }}
    redis-backup.raspi-cluster/enabled: "true"   # discovered by the central 07_redis_backup job (durable only)
    {{- end }}
spec:
  kubernetesConfig:
    # renovate: datasource=docker
    image: "quay.io/opstree/redis:v8.6.2"
    imagePullPolicy: IfNotPresent
    resources:
      {{- toYaml .Values.resources | nindent 6 }}
    # No auth: access is gated by the CiliumNetworkPolicy (network-RBAC), not requirepass — so there is no
    # secret to commit or generate. To add a password, drop a `redisSecret: { name, key }` here pointing at a
    # (sealed) Secret; deliberately not a per-workload knob. See docs/12_redis.md.
  redisExporter:
    enabled: true
    # renovate: datasource=docker
    image: "quay.io/opstree/redis-exporter:v1.84.0"
    imagePullPolicy: IfNotPresent
  redisConfig:
    # Extra redis.conf overlay (templates/configmap.yaml): active defrag for every instance, plus `appendonly yes`
    # + `appendfsync everysec` in persistent mode (AOF replay on restart, ~1s max loss on a hard crash, vs the
    # whole window back to the last RDB snapshot). AOF + RDB land on the PVC (operator sets dir=/data). Ephemeral
    # mode skips the AOF lines — RDB only, less write overhead. ConfigMap always exists, so this is unconditional.
    additionalRedisConfig: {{ .Values.name }}-ext-config
    # maxmemory = 80% of the container memory limit (operator computes the byte value at reconcile), so Redis
    # can't OOM its own cgroup. BOTH modes (OOM protection, unrelated to persistence). Requires
    # resources.limits.memory. Eviction stays the Redis default (noeviction): at the cap, writes fail.
    maxMemoryPercentOfLimit: 80
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        # persistence -> Retain class (volume survives a PVC delete); ephemeral -> Delete class. Both 2-replica,
        # defined by the platform 02_longhorn app.
        storageClassName: {{ if .Values.persistence }}longhorn-r2-retained{{ else }}longhorn-r2-ephemeral{{ end }}
        resources:
          requests:
            storage: {{ .Values.initialFixedDiskSize }}
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
