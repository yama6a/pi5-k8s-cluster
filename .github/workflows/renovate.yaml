# Self-hosted Renovate. The repo's ONLY CI — it exists solely to run Renovate; nothing here builds/tests the
# cluster. Config: /renovate.json5 (read automatically from the cloned repo). Setup + rationale: docs/14_renovate.md.
name: Renovate

on:
  schedule:
    # Every 3h. Automerge needs frequent runs: Renovate opens the combined PR on one run and self-merges it on
    # a LATER run (~2h grace, no CI gate) — a weekly cron would leave an auto-mergeable PR sitting for a week.
    - cron: "17 */3 * * *"
  workflow_dispatch: # manual run (first run / on demand)
    inputs:
      logLevel:
        description: Renovate log level
        default: info
        type: choice
        options: [info, debug]
      dryRun:
        description: Dry run (extract + plan, open no PRs)
        default: false
        type: boolean
  push:
    branches: [main]
    paths: # fast feedback while iterating on the config itself
      - renovate.json5
      - .github/workflows/renovate.yaml

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: read # checkout only; Renovate acts through RENOVATE_TOKEN, not GITHUB_TOKEN

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: renovatebot/github-action@v46.1.19
        with:
          # Dedicated PAT (repo secret). GITHUB_TOKEN can't open PRs that re-trigger workflows and lacks scope.
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }} # this repo only; no org-wide autodiscover
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || '' }}
