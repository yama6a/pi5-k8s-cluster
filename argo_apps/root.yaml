# The root-of-roots. Applied once by 05_gitops/05_argocd.sh; everything else is GitOps from here. It
# watches argo_apps/roots/ and manages the two child root Applications it finds there (directory.recurse):
#
#   0_platform.yaml   (sync-wave "0")  -> recurses argo_apps/platform/apps/   (CNI, operators, storage, ...)
#   1_workloads.yaml  (sync-wave "1")  -> recurses argo_apps/workloads/apps/  (the actual apps)
#
# The waves on those two children order CREATION only (~2s ARGOCD_SYNC_WAVE_DELAY): this root creates
# `platform` first, then `workloads` — it does NOT wait for platform health (there is no
# argoproj.io/Application health check, on purpose). So workloads may reconcile against not-yet-present
# platform CRDs on a cold boot; they fail and self-converge via unbounded syncPolicy.retry. See 05_gitops.md.
#
# AUTOMATED: keeps the two root Application OBJECTS matching git. Each child root has its own syncPolicy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  # Cascade-delete this app's own resources on Application deletion instead of orphaning them; see 05_gitops.md.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/roots
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1  # unbounded; only retry re-drives a failed sync (see 05_gitops.md)
      refresh: true  # retry the latest revision so a fix commit lands mid-loop
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
