# ArgoCD Application for the sample workload (argo_apps/workloads/charts/sample_workload/), the merge of
# the old gateway-test demo and the cnpg-cluster Postgres into one app. Ships the sample app (PG_PASSWORD
# injected from the CNPG secret), its CloudNativePG Cluster, and two ingress hosts:
# sample-workload.pontiki.app (OPEN) + sample-workload-sso.pontiki.app (PROTECTED by this workload's OWN
# Google-SSO allowlist). The whole edge is rendered by the shared ingress-edge library from the chart's
# `ingress-edge:` values. See 10_sample_workload.md / 17_cnpg.md.
#
# AUTOMATED (prune + selfHeal): drift auto-corrects. A prune is data-safe, the Postgres PVCs use the
# `local-path` class with reclaimPolicy: Retain, so removing the Cluster CR never destroys the node-local
# volumes (the dirs under /var/mnt/cnpg persist). The app + echo routes are safe leaves.
#
# MULTI-NAMESPACE: the app + Cluster (+ generated password Secret) land in the destination namespace
# `sample-workload`; the per-host Gateways/Certs/HTTPRoutes set metadata.namespace: gateway explicitly
# (where the SSO SecurityPolicy + merged Envoy live), reaching the app via the chart's ReferenceGrant.
#
# A WORKLOAD, not platform: lives in the workloads tree, which the root-of-roots only creates AFTER the
# whole platform tree is Healthy, so the CNPG operator's Cluster CRD, the local-path class, the Gateway,
# the SecurityPolicy CRD AND the shared google-sso.pontiki.app callback host (04_google_sso) all exist
# before this app reconciles. This app renders its OWN SecurityPolicy alongside its protected route (so the
# route is never briefly exposed) and its Cluster CR never hits a missing CRD. No per-app sync-wave needed.
# See 05_gitops.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-workload
  namespace: argocd
  annotations:
    # Diff via a server-side-apply dry-run so server-defaulted Gateway API fields (HTTPRoute
    # parentRefs/backendRefs group+kind, rules.matches, weight, ...) and the large CNPG Cluster CR don't
    # show as perpetual OutOfSync. Pairs with ServerSideApply below. Needs ArgoCD >= 2.10.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/workloads/charts/sample_workload
  destination:
    server: https://kubernetes.default.svc
    namespace: sample-workload
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # the CNPG Cluster CR is large, SSA avoids the last-applied-annotation limit
