# ArgoCD Application for sample-user-signup (argo_apps/workloads/charts/sample_user_signup/): a messaging-only
# service running the sample-app image's `/signup` binary (no HTTP, no Postgres, no ingress). Every 10s it
# publishes a `create-user-command`, and it consumes the manager's `users.created` (topic, its own queue) +
# `user-audit-logger` (fanout, its own queue) outputs, logging both. sample-user-manager is the hub at the
# other end; sample-audit-logger is the other audit subscriber.
#
# AUTOMATED (prune + selfHeal): drift auto-corrects. Nothing here holds data — the only stateful side is the
# operator-generated <user>-user-credentials Secret + the RabbitMQ topology CRs, all safe to reconcile.
#
# A WORKLOAD, not platform: lives in the workloads tree, which the root-of-roots only creates AFTER the whole
# platform tree is Healthy, so the RabbitMQ operators + broker + `apps` vhost already exist when this app's
# topology CRs land. No per-app sync-wave needed. See 05_gitops.md / 11_messaging.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-user-signup
  namespace: argocd
  # Cascade-delete this app's own resources on Application deletion instead of orphaning them; see 05_gitops.md.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # SSA dry-run diff so server-defaulted fields on the topology CRs don't show as perpetual OutOfSync.
    # Pairs with ServerSideApply below. Needs ArgoCD >= 2.10.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/workloads/charts/sample_user_signup
  destination:
    server: https://kubernetes.default.svc
    namespace: sample-user-signup
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1  # unbounded; only retry re-drives a failed sync (see 05_gitops.md)
      refresh: true  # retry the latest revision so a fix commit lands mid-loop
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
