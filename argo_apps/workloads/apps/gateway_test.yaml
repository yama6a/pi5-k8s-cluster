# ArgoCD Application for the demo/echo apps (argo_apps/workloads/charts/gateway_test/) — split out of
# the gateway ingress platform so the platform owns no apps. gateway-test is the open control;
# gateway-test-sso is protected by the platform SSO policy. See 13_gateway_test.md.
#
# AUTOMATED (prune + selfHeal): a safe leaf — throwaway echo apps, no CRDs, can't cut the cluster off
# its network. Toggle individual apps via the chart's `apps` list (and re-sync) to add/remove them.
#
# A WORKLOAD, not platform: lives in the workloads tree, which the root-of-roots only creates AFTER the
# whole platform tree is Healthy — so the Gateway listeners AND the SSO SecurityPolicies already exist
# before these routes appear (a protected route is never briefly exposed). No per-app sync-wave is
# needed; workloads carry no wave and reconcile in parallel. See 05_gitops.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-test
  namespace: argocd
  annotations:
    # Diff via a server-side-apply dry-run so server-defaulted Gateway API fields (HTTPRoute
    # parentRefs/backendRefs group+kind, rules.matches, weight, …) don't show as perpetual OutOfSync.
    # Pairs with ServerSideApply below. Needs ArgoCD >= 2.10. See 13_gateway_test.md.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/workloads/charts/gateway_test
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
