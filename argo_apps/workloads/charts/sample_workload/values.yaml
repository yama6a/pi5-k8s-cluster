# The end-to-end sample workload: a real app + its CloudNativePG Postgres, behind open + SSO ingress.
# See 10_sample_workload.md / 08_storage.md. cnpg/cluster version pinned in the pg-cluster wrapper's Chart.yaml.

app:
  name: sample-workload
  image: "ghcr.io/yama6a/pi5-k8s-sample-app:2"
  port: 8080
  replicas: 1
  # Postgres wiring — explicit instance names (must match the pg-cluster fullnameOverride values below), no
  # release-name derivation. `db` is the app's primary (PG_* env points at its -rw Service + -app Secret); the
  # sample binary reads a single DSN. `extraDbs` are additional instances the app is permitted to reach — they
  # only widen the app's egress NetworkPolicy (proving multi-DB reachability), the binary doesn't dial them.
  db: sample-workload-db
  extraDbs: [sample-workload-analytics]
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits:   { memory: 48Mi }

# Ingress edges for the app: two hosts on the same Service. Neither configures SSO — sample-workload-sso is
# gated centrally by the google-sso chart (its domains[].hosts); sample-workload is left open there.
ingress-edge:
  ingresses:
    - name: sample-workload
      domain: pontiki.app
      issuer: letsencrypt-staging      # todo: letsencrypt-prod once tested
      # targetNamespace omitted => the chart's release namespace (sample-workload).
      hosts:
        - subdomain: sample-workload       # open control (not in google-sso)
          targetService: sample-workload
          targetPort: 8080
        - subdomain: sample-workload-sso   # gated centrally by google-sso
          targetService: sample-workload
          targetPort: 8080

# RabbitMQ messaging via the shared rabbitmq-topology library (file:// dependency). Renders this workload's
# ONE user (operator-generated creds -> Secret sample-workload-user-credentials) + the topology it owns, all
# against the single shared broker on the `apps` vhost. Demonstrates BOTH patterns in one workload:
#   - publishEvents: it OWNS + publishes the `sample-events` event topic (1 publisher : N consumers).
#   - subscribeEvents: it also SUBSCRIBES to that topic — its own private queue `sample-workload.sample-events`
#     (in a real system the subscriber is a DIFFERENT workload; here it's a self-contained demo).
#   - consumeCommands: it OWNS + is the sole consumer of the `sample-commands` command topic (N publishers : 1
#     consumer). Other workloads would publish to it via their own `sendCommands: [sample-commands]`.
# The derived per-user Permission is write=^(sample-events)$, read=^(sample-workload\.sample-events|sample-commands)$.
# See 11_messaging.md.
rabbitmq-topology:
  user: sample-workload            # == app.name; the pod reads <user>-user-credentials (see templates/app.yaml)
  publishEvents:
    - { name: sample-events, type: topic }
  subscribeEvents:
    - { exchange: sample-events, routingKey: "sample.#" }
  consumeCommands:
    - { name: sample-commands, type: direct }

# Two CloudNativePG Postgres instances, each an aliased instance of the shared pg-cluster wrapper (file://
# dependency; pins cnpg/cluster, pre-bakes storage/affinity/monitoring/initdb/backups). The alias key routes
# values; each instance sets its REQUIRED knobs — an explicit `cluster.fullnameOverride` (the instance name,
# no release derivation), type, instances, resources — plus its own DB-lockdown allowlist. Keeps the upstream
# chart's `cluster.cluster.*` shape. See 10_sample_workload.md.

# Primary DB: the app's main store (2-instance HA — primary + streaming replica on 2 distinct nodes).
maindb:
  cluster:
    fullnameOverride: sample-workload-db
    type: postgresql        # postgresql | postgis | timescaledb
    cluster:
      instances: 2
      # Conservative footprint for the Pi 5s (8 GB RAM, lots already running). Per-instance.
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 512Mi
  networkPolicy:
    allowedClients:
      - namespace: sample-workload
        matchLabels: { app: sample-workload }

# Second DB: demonstrates multiple DBs per workload. Single-instance (no HA) to stay light on the Pis.
analyticsdb:
  cluster:
    fullnameOverride: sample-workload-analytics
    type: postgresql
    cluster:
      instances: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: "500m"
          memory: 256Mi
  networkPolicy:
    allowedClients:
      - namespace: sample-workload
        matchLabels: { app: sample-workload }
