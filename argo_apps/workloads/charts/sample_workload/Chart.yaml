apiVersion: v2
name: sample-workload
description: >-
  A sample workload that exercises the platform's ingress end to end, with its own Postgres and Google-SSO
  allowlist.
type: application
version: 0.1.0                 # this wrapper chart's own version

dependencies:
  # version: "*" for every file:// dep — the path IS the source, so the version is just a required constraint
  # Helm insists on, not a selector; an exact pin would only force a bump here each time the local chart's
  # version changes, for no benefit. (Remote pins like cnpg/cluster inside pg-cluster stay exact.)
  #
  # Two Postgres instances, each an ALIASED instance of the shared pg-cluster wrapper. Helm renders a dependency
  # once, so N databases == N aliases; each alias is a values key (maindb/analyticsdb) and carries its own
  # explicit cluster.fullnameOverride. Add another alias block to add another DB.
  - name: pg-cluster
    alias: maindb
    version: "*"
    repository: "file://../../../../lib/helm/pg-cluster"
  - name: pg-cluster
    alias: analyticsdb
    version: "*"
    repository: "file://../../../../lib/helm/pg-cluster"
  - name: ingress-edge
    version: "*"              # shared edge library; renders this workload's ingress from values below
    repository: "file://../../../../lib/helm/ingress-edge"
  - name: rabbitmq-topology
    version: "*"              # shared messaging library; renders this workload's User/Exchange/Queue/... below
    repository: "file://../../../../lib/helm/rabbitmq-topology"
