{{- range .Values.ingress.hosts }}
---
# Routes HTTPS traffic for {{ .host }} to the sample app Service (cross-namespace: route in the gateway
# namespace, Service in {{ $.Release.Namespace }}, allowed by the ReferenceGrant this chart ships). The
# optional `sso: <domain>` label is what the matching SecurityPolicy (04_google_sso) selects on, present
# => gated by Google login + the domain allowlist; absent => open. parentRef points at this host's own
# Gateway (templates/gateway.yaml).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.ingress.gatewayNamespace }}
  {{- if .sso }}
  labels:
    {{ $.Values.ingress.routeLabelKey }}: {{ .sso | quote }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ .name }}
      namespace: {{ $.Values.ingress.gatewayNamespace }}
      sectionName: {{ .name }}
  hostnames:
    - {{ .host | quote }}
  rules:
    - backendRefs:
        - name: {{ $.Values.app.name }}
          namespace: {{ $.Release.Namespace }}
          port: {{ $.Values.app.port }}
{{- end }}
