# The sample app — a single Deployment + Service in this chart's release namespace (sample-workload),
# alongside the CNPG Cluster and its operator-generated password Secret. PG_PASSWORD is injected from
# that Secret (`<release>-cluster-app`, key `password`) so the app can connect to its Postgres. Both
# ingress hosts (open + SSO) route to this one Service. See 13_sample_workload.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.app.name }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}
    spec:
      containers:
        - name: app
          image: {{ .Values.app.image | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
          env:
            # Make the chart's `app.port` authoritative (the app honours PORT; defaults to 8080).
            - name: PORT
              value: {{ .Values.app.port | quote }}
            # Postgres connection, fed to the app's DSNFromEnv() as discrete PG_* parts (it assembles +
            # escapes the DSN itself — safer than passing a pre-built URL with the raw password). Points at
            # THIS chart's CNPG cluster: the `<release>-cluster-rw` read-write Service in this namespace,
            # with the initdb owner/database. PG_PASSWORD comes from the CNPG operator-generated Secret
            # (blank pgPasswordSecret => derive `<release>-cluster-app`, the cnpg/cluster fullname + -app).
            - name: PG_HOST
              value: "{{ .Release.Name }}-cluster-rw.{{ .Release.Namespace }}.svc.cluster.local"
            - name: PG_USER
              value: {{ .Values.cluster.cluster.initdb.owner | quote }}
            - name: PG_DATABASE
              value: {{ .Values.cluster.cluster.initdb.database | quote }}
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.pgPasswordSecret | default (printf "%s-cluster-app" .Release.Name) }}
                  key: {{ .Values.app.pgPasswordKey }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Values.app.name }}
  ports:
    - name: http
      port: {{ .Values.app.port }}
      targetPort: http
