# The sample app, a single Deployment + Service in this chart's release namespace (sample-workload),
# alongside its two CNPG Postgres instances. PG_PASSWORD is injected from the primary DB's operator-generated
# owner Secret (`<app.db>-app`, key `password`) so the app can connect. Both ingress hosts (open + SSO) route to
# this one Service. See 10_sample_workload.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.app.name }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}
        messaging-client: "true"   # opts this pod into the broker's CiliumNetworkPolicy ingress on 5672. See 11_messaging.md.
    spec:
      containers:
        - name: app
          image: {{ .Values.app.image | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
          env:
            # Make the chart's `app.port` authoritative (the app honours PORT; defaults to 8080).
            - name: PORT
              value: {{ .Values.app.port | quote }}
            # Postgres connection, fed to the app's DSNFromEnv() as discrete PG_* parts (it assembles + escapes
            # the DSN itself, safer than a pre-built URL with the raw password). Points at the app's PRIMARY
            # Postgres by its explicit instance name (`app.db`, == that DB's pg-cluster fullnameOverride) — its
            # `<db>-rw` read-write Service in this namespace, no release-name derivation. User/database are
            # `app`/`app`, pre-baked (hardcoded) in the pg-cluster wrapper's initdb, literals here. PG_PASSWORD
            # comes from the CNPG operator-generated owner Secret, always `<db>-app` / key `password`.
            - name: PG_HOST
              value: "{{ .Values.app.db }}-rw.{{ .Release.Namespace }}.svc.cluster.local"
            - name: PG_USER
              value: "app"
            - name: PG_DATABASE
              value: "app"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.db }}-app
                  key: password
            # RabbitMQ connection. This workload's single user has operator-GENERATED credentials in the Secret
            # `<user>-user-credentials` (the rabbitmq-topology `user` is set to app.name, so it's
            # `{{ .Values.app.name }}-user-credentials`). Host is the shared broker's client Service; vhost is the
            # shared `apps`. The app assembles the AMQP URI from these discrete parts (username too — it's
            # generated, so it can't be hardcoded). Same generated-secret pattern as PG_PASSWORD above.
            - name: RABBITMQ_HOST
              value: "rabbitmq.rabbitmq.svc.cluster.local"   # the shared broker's client Service (03_rabbitmq_cluster)
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_VHOST
              value: "apps"                                  # the shared vhost (matches rabbitmq-topology default)
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.name }}-user-credentials
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.name }}-user-credentials
                  key: password
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Values.app.name }}
  ports:
    - name: http
      port: {{ .Values.app.port }}
      targetPort: http
