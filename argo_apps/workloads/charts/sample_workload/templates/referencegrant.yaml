# Lets the HTTPRoutes (in the gateway namespace) reference the sample app Service in this chart's
# release namespace ({{ .Release.Namespace }}). Cross-namespace backendRefs require a ReferenceGrant in
# the BACKEND's namespace. One grant covers both hosts (open + SSO) — they target the same Service.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: gateway-routes-to-{{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Values.ingress.gatewayNamespace }}
  to:
    - group: ""
      kind: Service
      name: {{ .Values.app.name }}
