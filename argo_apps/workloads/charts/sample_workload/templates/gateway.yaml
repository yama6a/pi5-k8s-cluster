{{- range .Values.ingress.hosts }}
---
# {{ .name }}'s own Gateway — a single :443 HTTPS listener terminating TLS for {{ .host }} with the cert
# this chart mints. Folded onto the cluster's one Envoy + LB IP by mergeGateways (01_envoy_gateway), so
# the workload owns its full ingress without its own LoadBalancer. In the gateway namespace so the
# HTTPRoute attaches same-namespace and{{ if .sso }} the 04_google_sso SecurityPolicy still selects it by
# the `sso: {{ .sso }}` label{{ else }} no SSO gate applies (this is the OPEN control){{ end }}.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.ingress.gatewayNamespace }}
spec:
  gatewayClassName: {{ $.Values.ingress.gatewayClassName }}
  listeners:
    - name: {{ .name }}
      protocol: HTTPS
      port: 443
      hostname: {{ .host | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .tlsSecretName | quote }}
      allowedRoutes:
        namespaces:
          from: Same
{{- end }}
