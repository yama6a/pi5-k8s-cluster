# Dedicated single-replica Longhorn StorageClass for CNPG Postgres volumes.
#
# WHY a separate class instead of the default `longhorn` (3 replicas): Postgres already replicates at
# the database layer across the 3 Cluster instances (1 primary + 2 streaming replicas, one per node).
# Layering Longhorn's 3-way replication on top means every write is stored 3 (Postgres) x 3 (Longhorn)
# = 9 times. With numberOfReplicas: 1, each instance keeps exactly one local Longhorn replica and HA
# comes from Postgres failover — survives a node loss because a surviving replica is promoted.
#
# dataLocality best-effort pins that lone replica onto the same node as the Postgres pod (low-latency
# local IO; no cross-node hop for every write). reclaimPolicy Retain so deleting the PVC/Cluster never
# silently destroys the database data. See 17_cnpg.md.
#
# This is a Longhorn resource (provisioner driver.longhorn.io); it ships here with CNPG so the whole
# database addition stays self-contained. The name is storage-generic, so other single-replica
# workloads can reuse it. Longhorn's CSI driver exists from wave 2; this app is wave 3.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-single
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  dataLocality: "best-effort"
  fsType: "xfs"
  staleReplicaTimeout: "30"
