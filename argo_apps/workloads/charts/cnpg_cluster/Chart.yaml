apiVersion: v2
name: cnpg-cluster
description: >-
  Wrapper chart for a CloudNativePG Postgres Cluster on the Talos/Raspberry Pi 5 cluster — a 2-instance
  HA Postgres (1 primary + 1 streaming replica, on two distinct Pi nodes) provisioned by the CNPG operator
  (platform app 02_cnpg_operator). Wraps the upstream cnpg/cluster dependency (the Cluster CR), pointed at
  the node-local `local-path` class (platform app 02_local_path_provisioner) so Postgres' own streaming
  replication is the only replication layer — no Longhorn engine/CSI in the data path, on a partition
  isolated from Longhorn's. Single source of truth for the cluster chart version (this file) and its
  values (values.yaml, under the `cluster:` key). A WORKLOAD: delivered purely by ArgoCD via
  argo_apps/workloads/apps/cnpg_cluster.yaml — no sync-wave; the workloads tree is only created after the
  whole platform (operator CRDs + local-path class) is Healthy. No object-store backups in this pass.
  See 17_cnpg.md and 18_local_path_provisioner.md.
type: application
version: 0.1.0                 # this wrapper chart's own version

dependencies:
  - name: cluster
    version: "0.7.0"          # cnpg/cluster chart — THE single source for the pin
    repository: https://cloudnative-pg.github.io/charts
