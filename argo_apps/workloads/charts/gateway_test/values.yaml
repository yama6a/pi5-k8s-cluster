# Values for the gateway_test wrapper chart. SINGLE SOURCE OF TRUTH — ArgoCD (and any local
# `helm template`) consume this.
#
# Demo echo apps, each rendering its OWN Gateway + :443 listener (templates/gateway.yaml) plus a
# Deployment + Service + Certificate + HTTPRoute — the whole stack in one place, all merged onto the one
# Envoy via mergeGateways. Per app the Gateway/listener is named after `name`/`listenerName`, terminates
# `host`, and uses `tlsSecretName`. Set `sso` to an SSO domain to protect an app (its route gets label
# sso:<domain>, picked up by the 04_google_sso policy); leave it empty for an open app. See 13_gateway_test.md.

gatewayClassName: eg
namespace: gateway
image: "traefik/whoami:v1.10.3"

apps:
  # The unprotected control — proves the raw HTTPS path; no sso label, so it stays open.
  - name: gateway-test
    host: gateway-test.pontiki.app
    listenerName: gateway-test
    tlsSecretName: gateway-test-tls
    issuer: letsencrypt-staging
    sso: ""
  # The protected demo — labelled sso:pontiki.app, so the pontiki.app SecurityPolicy (04_google_sso)
  # gates it behind Google login + the pontiki.app allowlist. Auth bounces via google-sso.pontiki.app.
  - name: gateway-test-sso
    host: gateway-test-sso.pontiki.app
    listenerName: gateway-test-sso
    tlsSecretName: gateway-test-sso-tls
    issuer: letsencrypt-staging
    sso: "pontiki.app"
