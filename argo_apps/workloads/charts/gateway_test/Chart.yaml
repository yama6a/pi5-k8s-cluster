apiVersion: v2
name: gateway-test
description: >-
  Throwaway demo/echo apps that exercise the ingress end to end — split out of the platform 03_gateway so
  the ingress platform owns no apps. gateway-test is OPEN (the unprotected control); gateway-test-sso is
  PROTECTED (its HTTPRoute is labelled sso:<domain> so the platform 04_google_sso SecurityPolicy attaches
  Google SSO). Each app ships its OWN Gateway + :443 listener plus a Deployment + Service + Certificate +
  HTTPRoute — the whole stack in one place, merged onto the one Envoy via mergeGateways. No upstream
  dependency (first-party resources + a tiny Deployment), so no Chart.lock. A WORKLOAD: delivered purely
  by ArgoCD via argo_apps/workloads/apps/gateway_test.yaml — no sync-wave; the workloads tree is only
  created after the whole platform (the Gateway AND the SSO policies) is Healthy, so the protected app is
  never briefly exposed. See 13_gateway_test.md.
type: application
version: 0.1.0
