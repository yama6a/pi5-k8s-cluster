{{- range .Values.apps }}
---
# {{ .name }} — a whoami echo on {{ .host }}{{ if .sso }} (PROTECTED by SSO domain {{ .sso }}){{ else }} (OPEN — no sso label){{ end }}.
# Deployment + Service + Certificate + HTTPRoute + its own Gateway (templates/gateway.yaml), all in the
# gateway namespace. Its :443 listener lives on that per-app Gateway (merged onto the one Envoy); this
# chart now ships the whole stack — workload + cert + route + gateway — in one place.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ .name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      containers:
        - name: whoami
          image: {{ $.Values.image | quote }}
          ports:
            - name: http
              containerPort: 80
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { memory: 32Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
spec:
  selector:
    app: {{ .name }}
  ports:
    - name: http
      port: 80
      targetPort: http
---
# cert-manager mints this (HTTP-01 via the shared :80 listener) into the Secret this app's own Gateway
# listener ({{ .listenerName }}, templates/gateway.yaml) references.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
spec:
  secretName: {{ .tlsSecretName | quote }}
  dnsNames:
    - {{ .host | quote }}
  issuerRef:
    name: {{ .issuer | quote }}
    kind: ClusterIssuer
---
# Routes HTTPS traffic for the host to the echo Service. The optional `sso: <domain>` label is what the
# matching SecurityPolicy (04_google_sso) selects on — present => gated by Google login + the domain
# allowlist; absent => open.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  {{- if .sso }}
  labels:
    {{ $.Values.routeLabelKey | default "sso" }}: {{ .sso | quote }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ .name }}                       # this app's own Gateway (templates/gateway.yaml)
      namespace: {{ $.Values.namespace }}
      sectionName: {{ .listenerName }}
  hostnames:
    - {{ .host | quote }}
  rules:
    - backendRefs:
        - name: {{ .name }}
          port: 80
{{- end }}
