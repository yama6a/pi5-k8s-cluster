{{- /*
App lockdown. Default-deny both directions (listing ingress AND egress makes the selected endpoint
deny-by-default in each), then allow only: ingress from the ingress edge (Envoy) on the app port, and egress
for DNS + this app's own Postgres. The app has no probes and no metrics scrape, so nothing else is opened.

Fixed platform selectors are hardcoded (they don't vary): the merged Envoy Gateway data-plane pod lives in
envoy-gateway-system (mergeGateways => one Envoy for the whole cluster), CoreDNS in kube-system. The DB egress
targets each CNPG instance the app may reach (`app.db` + `app.extraDbs`) by identity, so it covers the `-rw`
Service too: with kube-proxy replacement Cilium enforces egress on the translated backend, not the ClusterIP.
Always rendered: the app lockdown is not optional (there's no situation where we'd want it reachable from
arbitrary sources).
*/ -}}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Values.app.name }}-app
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: {{ .Values.app.name }}
  ingress:
    # Only the ingress edge (Envoy) may reach the app, on its HTTP port.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
            app.kubernetes.io/managed-by: envoy-gateway
      toPorts:
        - ports:
            - { port: {{ .Values.app.port | quote }}, protocol: TCP }
  egress:
    # DNS to CoreDNS.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
    # Its Postgres instances — the primary (app.db) + any extraDbs it's permitted to reach. Selected by
    # identity (covers each -rw Service via backend identity).
    {{- range prepend .Values.app.extraDbs .Values.app.db }}
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: {{ . }}
            cnpg.io/podRole: instance
      toPorts:
        - ports:
            - { port: "5432", protocol: TCP }
    {{- end }}
    # Its Redis instances — the primary (app.redis) + any extraRedis it may reach. The OpsTree operator stamps
    # each redis pod with a per-instance `app: <name>` label (== that instance's fullnameOverride). 6379, no
    # auth; the return path is allowed by each instance's own redis-instance ingress policy. See 12_redis.md.
    {{- range prepend .Values.app.extraRedis .Values.app.redis }}
    - toEndpoints:
        - matchLabels:
            app: {{ . }}
      toPorts:
        - ports:
            - { port: "6379", protocol: TCP }
    {{- end }}
    # The shared RabbitMQ broker (ns rabbitmq) on AMQP 5672 — this workload publishes/consumes messages. The
    # broker side allows this via its `messaging-client: "true"` ingress rule (the pod carries that label). See
    # 11_messaging.md.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: rabbitmq
            app.kubernetes.io/name: rabbitmq
      toPorts:
        - ports:
            - { port: "5672", protocol: TCP }
