# sample-user-manager: a single Deployment + Service in this chart's release namespace, alongside its two
# CNPG Postgres instances. Runs the image's `/manager` binary. PG_PASSWORD is injected from the primary DB's
# operator-generated owner Secret (`<app.db>-app`, key `password`). Both ingress hosts (open + SSO) route to
# this one Service. See 10_sample_workload.md / 11_messaging.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.app.name }}
    alert-criticality: critical   # app workload down -> `critical` (deployment/container outage rules). See docs/09_monitoring.md.
spec:
  replicas: {{ .Values.app.replicas }}
  revisionHistoryLimit: 0  # roll-forward only; no old ReplicaSets kept (05_gitops.md)
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}
        alert-criticality: critical   # pods carry it too, for the container-waiting-fatal outage rule. See docs/09_monitoring.md.
        messaging-client: "true"   # opts this pod into the broker's CiliumNetworkPolicy ingress on 5672. See 11_messaging.md.
    spec:
      # Single replica today, but if app.replicas is raised keep replicas off the same Pi node. PREFERRED
      # (not required): bare Pi nodes have no zone label so spread by hostname, and soft means replicas beyond
      # the 3 nodes — or scheduling while a node is down — co-locate instead of going permanently Pending.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: {{ .Values.app.name }}
                topologyKey: kubernetes.io/hostname
      containers:
        - name: app
          image: {{ .Values.app.image | quote }}
          command: {{ .Values.app.command | toJson }}   # the /manager binary (default entrypoint; explicit for clarity)
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
          env:
            # Make the chart's `app.port` authoritative (the app honours PORT; defaults to 8080).
            - name: PORT
              value: {{ .Values.app.port | quote }}
            # Postgres connection, fed to the app's DSNFromEnv() as discrete PG_* parts (it assembles + escapes
            # the DSN itself, safer than a pre-built URL with the raw password). Points at the app's PRIMARY
            # Postgres by its explicit instance name (`app.db`, == that DB's pg-cluster fullnameOverride) — its
            # `<db>-rw` read-write Service in this namespace, no release-name derivation. User/database are
            # `app`/`app`, pre-baked (hardcoded) in the pg-cluster wrapper's initdb, literals here. PG_PASSWORD
            # comes from the CNPG operator-generated owner Secret, always `<db>-app` / key `password`.
            - name: PG_HOST
              value: "{{ .Values.app.db }}-rw.{{ .Release.Namespace }}.svc.cluster.local"
            - name: PG_USER
              value: "app"
            - name: PG_DATABASE
              value: "app"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.db }}-app
                  key: password
            # Redis (audit-log cache) connection. Points at the app's PRIMARY Redis by its explicit instance
            # name (`app.redis`, == that instance's redis-instance fullnameOverride) — its ClusterIP Service in
            # this namespace, no release derivation. NO password env: the instance is locked to this workload by
            # the redis-instance CiliumNetworkPolicy (network-RBAC), not requirepass, so there's no secret to
            # inject. The manager RPUSHes each AuditLog under audit:<uuid> with a 1h TTL and reads it back on
            # GET /audit. The second instance (app.extraRedis) is provisioned + egress-allowed but never dialed.
            # See 12_redis.md.
            - name: REDIS_ADDR
              value: "{{ .Values.app.redis }}.{{ .Release.Namespace }}.svc.cluster.local:6379"
            # RabbitMQ connection. This workload's single user has operator-GENERATED credentials in the Secret
            # `<user>-user-credentials` (the rabbitmq-topology `user` is set to app.name, so it's
            # `{{ .Values.app.name }}-user-credentials`). Host is the shared broker's client Service; vhost is the
            # shared `apps`. The app assembles the AMQP URI from these discrete parts (username too — it's
            # generated, so it can't be hardcoded). Same generated-secret pattern as PG_PASSWORD above.
            - name: RABBITMQ_HOST
              value: "rabbitmq.rabbitmq.svc.cluster.local"   # the shared broker's client Service (03_rabbitmq_cluster)
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_VHOST
              value: "apps"                                  # the shared vhost (matches rabbitmq-topology default)
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.name }}-user-credentials
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.name }}-user-credentials
                  key: password
            # This workload's identity: the `sender`/`service` field in the messages it emits, and the prefix
            # for any queues it derives. The exchange/routing-key/queue names themselves are compile-time
            # constants in the binary (internal/messages) — nothing topology-related is passed via env, so a
            # pod can't be pointed at the wrong topic. See 11_messaging.md.
            - name: WORKLOAD_NAME
              value: {{ .Values.app.name | quote }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Values.app.name }}
  ports:
    - name: http
      port: {{ .Values.app.port }}
      targetPort: http
