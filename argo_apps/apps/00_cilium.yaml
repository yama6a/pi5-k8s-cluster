# ArgoCD Application that ADOPTS the already-running Cilium (installed imperatively by
# 04_networking/04_cilium.sh from the SAME chart). Same chart/namespace/release → Argo sees it
# in-sync, not fighting it. See 05_gitops.md.
#
# AUTOMATED, but DELIBERATELY without selfHeal (and prune: false): Cilium is the one app that can
# cut the whole cluster — and ArgoCD itself — off the network. Auto-sync applies git changes
# hands-off, but with selfHeal OFF Argo never reverts an out-of-band break-glass fix (04_cilium.sh)
# back to a bad git state mid-incident, and prune: false means it never cascade-deletes a CRD.
# Recovery rule: after any break-glass, COMMIT the fix to git so the app reconciles (and doesn't
# stall its sync-wave). The price of auto-sync: a bad Cilium change PUSHED to git applies unattended
# — mind your pushes. First sync auto-adopts the running release with no pod churn (values.yaml
# already has loadBalancer.enabled: true).
#
# sync-wave "0": the CNI comes before ArgoCD (wave 1) and all later apps. This only works because
# Cilium auto-syncs to Healthy on its own; a MANUAL app here would start OutOfSync, stall the wave,
# and block the parent from ever creating argocd. See 05_gitops.md "sync-wave convention".
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/charts/00_cilium
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false   # never cascade-delete (a removed CRD would take every CR with it)
      # no selfHeal: an out-of-band break-glass fix (04_cilium.sh) must NOT be auto-reverted
    syncOptions:
      - ServerSideApply=true
