# ArgoCD Application that ADOPTS the already-running Cilium (installed imperatively by
# 04_networking/04_cilium.sh from the SAME chart). Same chart/namespace/release → Argo sees it
# in-sync, not fighting it. See 05_gitops.md.
#
# MANUAL sync (no syncPolicy.automated): Cilium is the one app that can cut the whole cluster —
# and ArgoCD itself — off the network. Argo tracks/monitors it but never auto-reconciles; a bad
# Cilium change must be a deliberate click (or break-glass via 04_cilium.sh). You sync it ONCE to
# adopt the running release (no pod churn — values.yaml already has loadBalancer.enabled: true).
#
# sync-wave "0": same wave as 02_argocd (see 05_gitops.md "sync-wave convention"). A manual app
# starts OutOfSync; putting it at an EARLIER wave would block the parent from creating later-wave
# apps (incl. argocd) until it's Healthy. Both bootstrap apps are merely ADOPTED (already running),
# so they share wave 0; future managed apps go at wave 1+.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster.git
    targetRevision: HEAD
    path: argo_apps/charts/01_cilium
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    # No `automated` block on purpose — Cilium is sync-on-demand only.
    syncOptions:
      - ServerSideApply=true
