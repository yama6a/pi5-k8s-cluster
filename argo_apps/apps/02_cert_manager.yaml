# ArgoCD Application for cert-manager (argo_apps/charts/02_cert_manager/) — the X.509 certificate
# controller (issuance + renewal). This step installs the CONTROLLER ONLY; the Let's Encrypt
# ClusterIssuer for Gateway HTTPS comes in a later step. See 08_cert_manager.md.
#
# AUTOMATED (prune + selfHeal): a safe leaf, like nic-keeper / sealed-secrets — it can't cut the
# cluster off its own network, so drift should just auto-correct. The CRDs are kept on prune
# (crds.keep: true in values.yaml), so prune never cascade-deletes them or the CRs they own.
#
# sync-wave "2": same wave as nic-keeper and sealed-secrets — all three are independent leaves,
# none depends on the others. Per CLAUDE.md the NN prefix IS the wave, so they share `02_`
# (distinct dir names). Wave 2 is the "after the platform (CNI + ArgoCD) is in place" slot.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/charts/02_cert_manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # the cert-manager CRDs are large — SSA avoids the last-applied-annotation limit
