# ArgoCD Application for standalone Grafana (argo_apps/charts/07_grafana/) — the dashboards UI for the
# monitoring core. The grafana/grafana chart (no CRDs); its sidecar ingests kube-prometheus-stack's
# emitted datasource + dashboard ConfigMaps (search-all-namespaces). Grafana's own auth is off
# (anonymous Admin); the only gate is Google SSO at the shared Gateway, via the `sso: pontiki.app`
# HTTPRoute in 07_monitoring_ingress. No persistence. See 16_grafana.md.
#
# AUTOMATED (prune + selfHeal): a leaf workload in the `monitoring` namespace — it can't cut the cluster
# off its network, and it owns no CRDs.
#
# sync-wave "7": same wave as the stack it reads ConfigMaps from (07_kube_prometheus_stack) and its own
# edge route (07_monitoring_ingress). The sidecar is a continuous watcher, so no hard "after the stack"
# ordering is needed; co-locating here also lets the monitoring-ingress HTTPRoute's backendRef resolve
# the instant the grafana Service appears, instead of sitting ResolvedRefs:False across a wave boundary.
# The namespace is labelled privileged exactly like 07_kube_prometheus_stack (idempotent if the stack
# created `monitoring` first); ServerSideApply for parity with the other monitoring apps.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/charts/07_grafana
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        pod-security.kubernetes.io/audit: privileged
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
