# ArgoCD Application that exposes the VictoriaMetrics vmui, VictoriaLogs UI and Grafana through the shared
# Gateway behind Google SSO (argo_apps/charts/07_monitoring_ingress/). Edge only — the stacks are
# untouched. vmui and the VictoriaLogs UI have NO login of their own (and Grafana's is disabled), so the
# `sso: pontiki.app` label IS the only barrier. See 15_monitoring.md.
#
# AUTOMATED (prune + selfHeal): a safe leaf — per-host Certificates + HTTPRoutes + one ReferenceGrant,
# no CRDs, can't cut the cluster off its network. Break-glass if a route wedges:
# `kubectl -n monitoring port-forward svc/vmsingle-victoria-metrics-k8s-stack 8428:8428` bypasses the
# Gateway + SSO entirely.
#
# sync-wave "7": after the gateway (wave 3 — the vmui/vlogs/grafana listeners) AND the SSO policy
# (wave 4 — so the UIs are gated the instant their labelled routes appear, never briefly exposed). Same
# wave as the stacks it fronts (07_victoria_metrics_k8s_stack, 07_victoria_logs, 07_grafana); the routes'
# backendRefs resolve once those Services come up (brief ResolvedRefs:False, self-clears — the HTTP-01
# cert path is independent). ServerSideDiff so server-defaulted Gateway API fields don't show OutOfSync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-ingress
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/charts/07_monitoring_ingress
  destination:
    server: https://kubernetes.default.svc
    # The Certificates + HTTPRoutes land in `gateway`; the ReferenceGrant sets its own metadata.namespace
    # (monitoring). The default AppProject permits both, so this multi-namespace app is fine.
    namespace: gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
