# ArgoCD Application for the monitoring core — kube-prometheus-stack (argo_apps/charts/07_kube_prometheus_stack/).
# Prometheus + Alertmanager + node-exporter + kube-state-metrics, operator-managed, single-replica
# StatefulSets on Longhorn. CRDs come from 00_prometheus_operator_crds (wave 0); this runs with
# crds.enabled:false. Bundled Grafana off (its dashboard/datasource ConfigMaps still emitted). See
# 15_monitoring.md.
#
# AUTOMATED (prune + selfHeal): a leaf workload in its own `monitoring` namespace — it can't cut the
# cluster off its network. The operator manages its OWN CRDs' CRs; prune here won't touch the CRDs
# (those live in the wave-0 app).
#
# sync-wave "7": after Longhorn + cert-manager (wave 2 — PVC storage + the admission-webhook issuer).
# The CRDs are already present from wave 0. Shares wave 7 with 07_monitoring_ingress. ServerSideApply
# because the operator + its objects exceed the client-side last-applied-annotation limit.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/charts/07_kube_prometheus_stack
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    # node-exporter is a hostNetwork/hostPID/hostPath/hostPort DaemonSet, so the monitoring namespace
    # must allow privileged pods — Talos stamps `baseline` PSA by default, which rejects it (the DS sits
    # 0/N and the app hangs Progressing). Label the namespace privileged, exactly like 02_longhorn does.
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        pod-security.kubernetes.io/audit: privileged
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # The admission webhook's caBundle is injected at runtime by cert-manager (admissionWebhooks.
  # certManager.enabled: true), so it's never in git — ignore it or the app sits perpetually OutOfSync.
  # The stack ships BOTH a Validating (2 webhooks) and a Mutating (1 webhook) admission config, all named
  # `kube-prometheus-stack-admission`. jqPathExpressions matches the caBundle on every webhook regardless
  # of index.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: kube-prometheus-stack-admission
      jqPathExpressions:
        - '.webhooks[].clientConfig.caBundle'
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: kube-prometheus-stack-admission
      jqPathExpressions:
        - '.webhooks[].clientConfig.caBundle'
