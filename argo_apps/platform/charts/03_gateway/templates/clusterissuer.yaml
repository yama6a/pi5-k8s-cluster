# Let's Encrypt ClusterIssuers (cluster-scoped, usable by Certificates in any namespace).
# Let's Encrypt ClusterIssuers (cluster-scoped, usable by Certificates in any namespace).
# Each solves HTTP-01 by having cert-manager create a temporary HTTPRoute attached to the shared
# Gateway (parentRefs below); the challenge is served on the Gateway's :80 listener. Reachability
# from the internet is provided by the old Raspberry Pi forwarding :80 for the migrated host to the
# Gateway IP (see 10_gateway.md / the old-host Traefik /rules). The ACME account key is stored in a
# Secret in cert-manager's namespace (the cluster resource namespace for ClusterIssuers).
{{- range .Values.acme.issuers }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .name }}
spec:
  acme:
    email: {{ $.Values.acme.email | quote }}
    server: {{ .server | quote }}
    privateKeySecretRef:
      name: {{ .name }}-account-key
    solvers:
      {{- /* DNS-01 first: cert-manager picks the most-specific solver per dnsName, so names under a
             Cloudflare zone (incl. wildcards) go DNS-01, everything else falls to the http01 catch-all. */}}
      {{- with $.Values.acme.cloudflare }}
      {{- if .zones }}
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: {{ .apiTokenSecretName | quote }}
              key: {{ .apiTokenSecretKey | quote }}
        selector:
          dnsZones:
            {{- range .zones }}
            - {{ . | quote }}
            {{- end }}
      {{- end }}
      {{- end }}
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: {{ $.Values.gateway.name }}
                namespace: {{ $.Values.gateway.namespace }}
                kind: Gateway
{{- end }}
