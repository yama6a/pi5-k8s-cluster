# The cluster's single shared ingress Gateway. Envoy Gateway (the `eg` class) materialises this as a
# data-plane Envoy Deployment + LoadBalancer Service, pinned to .Values.gateway.loadBalancerIP via the
# EnvoyProxy annotation (01_envoy_gateway chart) and the spec.addresses below.
#
# An always-on HTTP :80 listener serves cert-manager's HTTP-01 ACME challenges (solver HTTPRoutes attach
# here) and, later, the forced http->https redirect. Then one HTTPS :443 listener per entry in
# .Values.httpsHosts — each terminates TLS for a hostname using a cert Secret the owning app fills via
# HTTP-01, so a listener stays not-Ready until that cert is issued. See 10_gateway.md.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  addresses:
    - type: IPAddress
      value: {{ .Values.gateway.loadBalancerIP | quote }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      # from: All so HTTPRoutes in any app namespace (and cert-manager's solver routes, created in
      # the Certificate's namespace) can attach to this Gateway across namespaces.
      allowedRoutes:
        namespaces:
          from: All
    {{- range .Values.httpsHosts }}
    - name: {{ .name }}
      protocol: HTTPS
      port: 443
      hostname: {{ .hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .tlsSecretName | quote }}
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
