# Values for the 02_cert_manager wrapper chart. SINGLE SOURCE OF TRUTH, ArgoCD (and any local
# `helm template`) consume this. Chart version pinned in Chart.yaml.
#
# cert-manager runs in its own `cert-manager` namespace (CreateNamespace=true in the Application).
# This step installs the CONTROLLER ONLY, no Issuer/ClusterIssuer is shipped yet (the Let's Encrypt
# wiring depends on a domain + public-reachable Cilium Gateway + ACME email, decided later). See
# 08_cert_manager.md.

# Everything under `cert-manager:` is passed to the upstream jetstack/cert-manager subchart
# (key == dependency name).
cert-manager:
  # Install the cert-manager CRDs as part of this release (the chart owns them)...
  crds:
    enabled: true
    # ...but never let an ArgoCD prune cascade-delete them, that would take every Certificate,
    # Issuer and Order CR down with them. `keep` leaves the CRDs in place on uninstall/prune.
    keep: true

  # High priority for all three components (controller/webhook/cainjector): an evicted webhook fails ALL
  # Certificate/Issuer/CertificateRequest admission cluster-wide until it reschedules. Own ns => our class.
  global:
    priorityClassName: platform-critical
    # Roll-forward only; no old ReplicaSets. v1.21.0 applies this to all 3 Deployments (controller, webhook,
    # cainjector). See 05_gitops.md.
    revisionHistoryLimit: 0

  # GC the issued TLS Secret when its Certificate is removed (default false leaves it orphaned). In this
  # GitOps repo Certificates are declared in charts + pruned on removal, so this leaves no dangling secrets.
  enableCertificateOwnerRef: true

  # Drop the post-install/upgrade Helm-hook Job (an extra arm64 image pull + PostSync Job every sync). Its
  # "webhook reachable" gate is redundant here: ArgoCD's unbounded retry already converges that ordering.
  startupapicheck:
    enabled: false

  # Expose controller metrics (default on) + create the ServiceMonitor so Prometheus scrapes
  # cert-manager. NOTE the lowercase `servicemonitor` key, cert-manager spells it differently from
  # most charts. CRDs exist from wave 0, before this wave-2 app. See 15_monitoring.md.
  prometheus:
    enabled: true
    servicemonitor:
      enabled: true

  # Modest footprint for a 3x 8GB Pi 5 cluster, three light components (controller, webhook,
  # cainjector). Defaults are generous; trim requests, keep memory limits to bound the webhook.
  resources:
    requests: { cpu: 10m, memory: 48Mi }
    limits:   { memory: 64Mi }
  # Controller is leader-elected (one active), but if replicaCount is ever raised for faster failover, keep the
  # standby off the active's node. PREFERRED + hostname: bare Pi nodes have no zone label, and soft means a
  # scale-up never wedges as Pending on the 3-node cluster. No-op at the default single replica.
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: cert-manager
                app.kubernetes.io/component: controller
            topologyKey: kubernetes.io/hostname
  webhook:
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits:   { memory: 48Mi }
    # Stateless admission webhook — the natural HA target. Spread replicas across Pi nodes if replicaCount is
    # raised. PREFERRED + hostname (no zone label; soft so a scale-up never wedges). No-op at one replica.
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: webhook
                  app.kubernetes.io/component: webhook
              topologyKey: kubernetes.io/hostname
  cainjector:
    resources:
      requests: { cpu: 10m, memory: 96Mi }
      limits:   { memory: 200Mi }
    # Leader-elected (one active + standby). Spread across Pi nodes if replicaCount is raised.
    # PREFERRED + hostname (no zone label; soft so a scale-up never wedges). No-op at one replica.
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: cainjector
                  app.kubernetes.io/component: cainjector
              topologyKey: kubernetes.io/hostname

  # HTTP-01 solving through the Cilium Gateway API — enabled via the controller's file config below (it's
  # NOT a feature gate). The one ordering requirement is that the Gateway API CRDs exist before the
  # controller starts; they do (Cilium vendors them at wave 0, before this wave-2 app), so a fresh rollout
  # picks them up. The matching Gateway + Let's Encrypt ClusterIssuers live in the 03_gateway chart
  # (wave 3). See 10_gateway.md.
  config:
    apiVersion: controller.config.cert-manager.io/v1alpha1
    kind: ControllerConfiguration
    enableGatewayAPI: true

  # DNS-01 self-check (Cloudflare): before asking Let's Encrypt to validate, cert-manager checks the
  # _acme-challenge TXT itself. Point it at PUBLIC recursive resolvers (not the pods' /etc/resolv.conf) so a
  # split-horizon home DNS can't make the record look un-propagated and wedge issuance. Only exercised when a
  # dns01 solver runs; a no-op for HTTP-01. Egress :53 to world is opened in templates/networkpolicy.yaml.
  dns01RecursiveNameservers: "1.1.1.1:53,9.9.9.9:53"
  dns01RecursiveNameserversOnly: true
