apiVersion: v2
name: cert-manager
description: >-
  Wrapper chart for cert-manager on the Talos/Raspberry Pi 5 cluster, the X.509
  certificate controller (issuance + renewal) that will later mint Let's Encrypt
  HTTPS certs for the Envoy Gateway ingress. Single source of truth for the cert-manager
  chart version (this file) and its values (values.yaml, under the `cert-manager:`
  key). Delivered purely by ArgoCD (no imperative bootstrap) via
  argo_apps/apps/02_cert_manager.yaml, wave 2, same as nic-keeper / sealed-secrets
  (independent leaves). NO ClusterIssuer here yet, see 08_cert_manager.md.
type: application
version: 0.1.0                 # this wrapper chart's own version

dependencies:
  - name: cert-manager
    version: "v1.21.0"        # jetstack/cert-manager chart, THE single source for the pin
    repository: https://charts.jetstack.io
