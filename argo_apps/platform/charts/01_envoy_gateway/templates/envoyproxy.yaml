# Provider config for every Gateway of the `eg` class (the GatewayClass parametersRef points here). Two jobs:
#
#   1. mergeGateways, collapse EVERY Gateway of the `eg` class onto ONE Envoy Deployment + ONE
#      LoadBalancer Service. This is what lets each app own its own Gateway (its own :443 listener + cert)
#      while the cluster keeps a single ingress point on one pinned IP. Without it, Envoy Gateway spawns
#      one Envoy + one LoadBalancer Service PER Gateway, so N app Gateways would each demand the pinned IP
#      and fight over it. The merge constraint is global uniqueness of (port, protocol, hostname) across
#      all merged listeners, our hostnames are all distinct, so there's no collision. See 11_envoy_gateway.md.
#   2. Pin that one shared Service to the LB-IPAM IP via the `lbipam.cilium.io/ips` annotation (Cilium
#      LB-IPAM honours it on >= 1.15). This is now the SOLE authority for the IP, per-Gateway
#      spec.addresses is dropped (it would conflict on the one shared Service under merge). The fixed IP
#      the old Raspberry Pi forwards :80/:443 to, keep it inside the pool (192.168.100.10-250, from
#      04_networking/config.sh) and stable.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: {{ .Values.envoyProxy.name }}
  namespace: {{ .Values.envoyProxy.namespace }}
spec:
  # All `eg`-class Gateways share one data plane (one Envoy + one LB Service). See the header comment.
  mergeGateways: true
  provider:
    type: Kubernetes
    kubernetes:
      # Data-plane Envoy container resources (KRR-sized; EG's default reserves 512Mi). See values.yaml.
      envoyDeployment:
        container:
          resources:
            {{- toYaml .Values.envoyProxy.resources | nindent 12 }}
      envoyService:
        type: LoadBalancer
        # Cluster, not EG's default Local: the Cilium L2 announcer node isn't necessarily the node
        # running the single Envoy pod, and Local can't serve the IP from a node without a local backend
        # (dead LB after a reschedule). We don't need Local's source-IP preservation (NAT'd at the old-Pi;
        # SSO authorizes by email). See 11_envoy_gateway.md.
        externalTrafficPolicy: Cluster
        annotations:
          lbipam.cilium.io/ips: {{ .Values.envoyProxy.loadBalancerIP | quote }}
