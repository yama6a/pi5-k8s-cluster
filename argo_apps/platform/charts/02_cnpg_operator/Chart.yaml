apiVersion: v2
name: cnpg-operator
description: >-
  Wrapper chart for the CloudNativePG (CNPG) operator on the Talos/Raspberry Pi 5 cluster, the
  Kubernetes-native PostgreSQL controller (manages the Cluster/Backup/... CRDs and reconciles
  Postgres instances). This installs the CONTROLLER + CRDs ONLY; the actual database (a Cluster CR
  on a dedicated node-local local-path StorageClass) is part of the sample_workload workload, in the
  workloads tree. Single source of truth for the operator chart version (this file) and its values
  (values.yaml, under the `cloudnative-pg:` key). Delivered purely by ArgoCD (no imperative
  bootstrap) via argo_apps/platform/apps/02_cnpg_operator.yaml, wave 2, same as cert-manager / longhorn /
  sealed-secrets (independent leaves, only need the CNI). The operator/Postgres images
  (ghcr.io/cloudnative-pg/*) are multi-arch incl. arm64. See 17_cnpg.md.
type: application
version: 0.1.0                 # this wrapper chart's own version
appVersion: "1.29.1"          # CNPG version the pinned chart ships (mirrors the dependency)

dependencies:
  - name: cloudnative-pg
    version: "0.28.3"         # cnpg/cloudnative-pg chart, THE single source for the pin
    repository: https://cloudnative-pg.github.io/charts
