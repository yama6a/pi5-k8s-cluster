# Ingress (edges) for all platform UIs.
ingress:
  ingresses:
    - name: platform
      domain: ops.pontiki.app # platform UIs live under the *.ops.<base> tier (workloads use *.app.<base>). See 07_ingress.md.
      issuer: letsencrypt-staging # staging (untrusted) to dodge LE prod's 5-per-exact-SAN-set/week limit during rebuild-heavy dev.
      # Flip back to letsencrypt-prod for prod: GitHub webhook SSL verification to argocd.<domain> needs a publicly-trusted cert. See 07_ingress.md.
      hosts:
        - subdomain: argocd
          targetNamespace: argocd
          targetService: argocd-server
          targetPort: 80
        - subdomain: grafana
          targetNamespace: monitoring
          targetService: grafana
          targetPort: 80
        - subdomain: vmui
          targetNamespace: monitoring
          targetService: vmsingle-victoria-metrics-k8s-stack
          targetPort: 8428
        - subdomain: vlogs
          targetNamespace: monitoring
          targetService: vlsingle-victoria-logs
          targetPort: 9428
        - subdomain: hubble
          targetNamespace: kube-system # hubble-ui ships with Cilium (00_cilium) in kube-system
          targetService: hubble-ui
          targetPort: 80
        - subdomain: longhorn
          targetNamespace: longhorn-system # longhorn-frontend (the UI) ships with Longhorn (02_longhorn)
          targetService: longhorn-frontend # UI has NO auth of its own -> gated by google-sso (wave 4)
          targetPort: 80
        - subdomain: rabbitmq
          targetNamespace: rabbitmq        # the shared broker's client Service (03_rabbitmq_cluster)
          targetService: rabbitmq          # management UI on 15672; gated by google-sso (wave 4), then RabbitMQ's own login
          targetPort: 15672
    # ntfy gets its OWN ingress (not a host under `platform`) because the Android app validates TLS, so its cert
    # must be PUBLICLY TRUSTED -> letsencrypt-PROD, while `platform` stays on staging during rebuild-heavy dev.
    # Per-ingress issuer => a separate ntfy-tls Certificate, no overlap with the staging SAN set. Deliberately NOT
    # listed in 04_google_sso, so the edge stays OPEN (the mobile app can't do human OAuth) — ntfy's own deny-all
    # + token/user auth is the only gate. See 07_ingress.md / 09_monitoring.md.
    - name: ntfy
      domain: ops.pontiki.app
      issuer: letsencrypt-prod
      hosts:
        - subdomain: ntfy                  # -> ntfy.ops.pontiki.app (the phone subscribes here; Grafana publishes in-cluster)
          targetNamespace: monitoring
          targetService: ntfy
          targetPort: 8080
