# POD-SCOPED to the vmsingle metrics store. NOT namespace-wide: vmagent shares the monitoring namespace and
# scrapes the whole cluster, so it must stay unrestricted. See 04_networking.md / 09_monitoring.md.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vmsingle
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vmsingle
      app.kubernetes.io/instance: victoria-metrics-k8s-stack
  ingress:
    # :8428 — vmagent remote-writes + self-scrapes, grafana reads, the Envoy edge serves vmui, vm-backup exports.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: vmagent
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: grafana
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
            app.kubernetes.io/managed-by: envoy-gateway
        # The central backup CronJob (08_vm_backup) pulls /api/v1/export/native from here. See docs/13_backups.md.
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: vm-backup
      toPorts:
        - ports:
            - { port: "8428", protocol: TCP }
  egress:
    # DNS (CoreDNS).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
