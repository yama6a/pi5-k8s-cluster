# Values for the 05_victoria_metrics_k8s_stack wrapper chart. SINGLE SOURCE OF TRUTH, ArgoCD (and any
# local `helm template`) consume this. Chart version pinned in Chart.yaml. See 15_monitoring.md.
#
# Everything under `victoria-metrics-k8s-stack:` is passed to the upstream subchart (key == dependency
# name). Resource numbers are sized for 8GB Pi 5 nodes already running etcd + control plane + Cilium +
# Longhorn. This is the drop-in replacement for the retired kube-prometheus-stack, same `monitoring`
# namespace, same Talos control-plane scrape targets, same high-cardinality drops.
victoria-metrics-k8s-stack:
  # The VM operator runs STANDALONE (01_victoria_metrics_operator, wave 1) and reconciles the CRs this
  # chart emits. Disable the bundled operator subchart so we don't run two operators or re-install CRDs.
  victoria-metrics-operator:
    enabled: false
  # CRDs are owned by 00_victoria_metrics_operator_crds (wave 0); never let this chart manage them.
  crds:
    enabled: false
    plain: false

  # ---- metrics store -------------------------------------------------------------------------------
  vmsingle:
    enabled: true
    spec:
      retentionPeriod: "180d"        # 180 days of metrics. Bump together with the PVC size below.
      replicaCount: 1
      extraArgs:
        # 60s halves sample volume vs 30s for negligible loss at homelab cardinality (vmagent also 60s).
        dedup.minScrapeInterval: 60s
      storage:
        storageClassName: longhorn   # default global class, replica 3 (02_longhorn)
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
      resources:
        requests: {cpu: 50m, memory: 256Mi}
        limits: {memory: 512Mi}     # no CPU limit, avoid throttling merges/queries
      # Reschedule fast on node loss instead of the default. Pair with Longhorn
      # nodeDownPodDeletionPolicy=delete-statefulset-pod (02_longhorn). See 15_monitoring.md (failover).
      tolerations:
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30

  # ---- scraper -------------------------------------------------------------------------------------
  vmagent:
    enabled: true
    spec:
      # Discover ALL VMServiceScrape/VMPodScrape/VMProbe across every namespace, regardless of labels,      # so the per-component scrapes (cilium, argocd, cert-manager, longhorn, sealed-secrets) AND the
      # operator-converted ServiceMonitors are all picked up. This mirrors the old
      # serviceMonitorSelectorNilUsesHelmValues:false behaviour.
      selectAllByDefault: true
      scrapeInterval: 60s
      externalLabels:
        cluster: raspi-cluster
      extraArgs:
        promscrape.streamParse: "true"
      # Global metric-relabel drop, applied to EVERY scrape after collection (__name__ available), the
      # catch-all for high-cardinality noise we never want, regardless of which job emits it. The
      # gRPC server counters (~4.5k series) come from argocd-server, hubble/cilium and others via their
      # converted ServiceMonitors, which carry no per-source drop; this kills them everywhere in one place.
      # TRADE-OFF: grpc_server_handled_total carries grpc_code (RPC error rates), dropped too; if you ever
      # want ArgoCD/Hubble RPC health, narrow this to grpc_server_(started|msg_received|msg_sent)_total.
      globalScrapeMetricRelabelConfigs:
        - sourceLabels: [__name__]
          action: drop
          regex: "grpc_server_(handled|started|msg_received|msg_sent)_total"
        # Tier-1 cardinality noise emitted across many jobs (or by a job with no per-target drop block):
        #   flag                      : one series per command-line flag of every VM component, value always 1.
        #   kubernetes_feature_enabled, one series per apiserver/kubelet feature-gate; static config dump.
        #   kube_pod_tolerations      : toleration inventory per pod (kube-state-metrics); `kubectl` it instead.
        #   container_tasks_state     : per-container task counts by state (kubelet/cAdvisor); pod health
        #                                already comes from kube_pod_status_*.
        - sourceLabels: [__name__]
          action: drop
          regex: "flag|kubernetes_feature_enabled|kube_pod_tolerations|container_tasks_state"
        # Go runtime GC/scheduler histograms + the GC-pause summary, per-bucket detail for EVERY Go target,
        # never queried. Deliberately KEEPS go_sched_latencies_seconds_bucket (used by the VM dashboards) and
        # all the cheap go_memstats_*/go_goroutines scalars.
        - sourceLabels: [__name__]
          action: drop
          regex: "go_(gc_pauses_seconds|gc_heap_allocs_by_size_bytes|gc_heap_frees_by_size_bytes|sched_pauses_stopping_gc_seconds|sched_pauses_stopping_other_seconds|sched_pauses_total_gc_seconds|sched_pauses_total_other_seconds)_(bucket|count|sum)|go_gc_duration_seconds(_count|_sum)?"
        # ---- Tier-2 drops: controller/storage/CNI internals, unreferenced by any VMRule or dashboard ----
        # Longhorn manager's REST-client + workqueue latency/queue internals. Storage HEALTH metrics
        # (longhorn_volume_*, longhorn_node_*, longhorn_backup_*) are untouched, this is only the
        # controller's own client/queue plumbing.
        - sourceLabels: [__name__]
          action: drop
          regex: "longhorn_rest_client_.*|longhorn_workqueue_.*"
        # Cilium agent/operator internal latency histograms (hive jobs, k8s-client, endpoint regen, k8s
        # workqueue, conntrack GC, policy/identity timers...). Drops only *_bucket, every cilium_*_total
        # dataplane / policy / drop counter stays.
        - sourceLabels: [__name__]
          action: drop
          regex: "cilium_.*_bucket"
        # Generic controller queue/REST histograms emitted by MANY jobs (apiserver, argocd, cert-manager,
        # cnpg, kubelet). Buckets only, KEEPS workqueue_depth, rest_client_requests_total and
        # rest_client_request_duration_seconds_bucket (all queried).
        - sourceLabels: [__name__]
          action: drop
          regex: "workqueue_queue_duration_seconds_bucket|workqueue_work_duration_seconds_bucket|rest_client_request_size_bytes_bucket|rest_client_response_size_bytes_bucket|rest_client_rate_limiter_duration_seconds_bucket"
        # cAdvisor per-container detail we never chart: blkio, load-avg, user/system CPU split, fd count,
        # health-state, last-seen, start-time, memory-failure counts. The core container_cpu_usage_seconds_total
        # / container_memory_working_set_bytes / container_network_* / container_memory_{rss,swap,cache} stay.
        - sourceLabels: [__name__]
          action: drop
          regex: "container_memory_failures_total|container_blkio_device_usage_total|container_cpu_load_average_10s|container_cpu_load_d_average_10s|container_cpu_system_seconds_total|container_cpu_user_seconds_total|container_file_descriptors|container_health_state|container_last_seen|container_start_time_seconds"
        # kubelet probe-latency histograms + node-exporter NFS client counters (no RWX/share-manager volumes
        # exist in this cluster). Probe success/failure is still visible via kube_pod_status_* and events.
        - sourceLabels: [__name__]
          action: drop
          regex: "prober_probe_total|prober_probe_duration_seconds_(bucket|count|sum)|node_nfs_requests_total"
      resources:
        requests: {cpu: 50m, memory: 128Mi}
        limits: {memory: 256Mi}
      # If replicaCount is raised for HA scraping (full replication — every replica scrapes all targets, the
      # duplicate samples collapsed by vmsingle's dedup.minScrapeInterval above), keep replicas off the same
      # Pi node. PREFERRED + hostname: bare Pi nodes have no zone label, and soft so a scale-up never wedges
      # as Pending on the 3-node cluster. No-op at the single replica above.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: vmagent
                topologyKey: kubernetes.io/hostname

  # ---- shape B: everything alerting/visualisation is OFF -------------------------------------------
  vmalert:
    enabled: false               # no rule evaluator, Grafana owns alerting (05_grafana).
  alertmanager:
    enabled: false               # no Alertmanager, Grafana owns notifications (05_grafana).
  grafana:
    enabled: false               # standalone Grafana is its own app (05_grafana).

  # Default ALERTING/RECORDING rules are VMRules that only vmalert evaluates; with vmalert off they would
  # be inert. Grafana alerts query raw metrics instead (recording-rule expressions inlined where needed).
  defaultRules:
    create: false

  # Curated default dashboards, emitted as ConfigMaps labelled `grafana_dashboard` (the sync-job reads
  # grafana.sidecar.dashboards.label, default `grafana_dashboard`) so the standalone Grafana sidecar
  # (05_grafana, searchNamespace ALL) picks them up with zero rework. See 15_monitoring.md.
  defaultDashboards:
    enabled: true
    # Per-dashboard pruning. Keys are the dashboard SOURCE names (the `...-dashboard-<key>` ConfigMap
    # suffix the sync-job emits); `enabled: false` tells the sync-job to skip that dashboard. We drop the
    # kube-mixin / node-exporter / prometheus dashboards that are either irrelevant here (Windows, AIX,
    # macOS, multi-cluster) or redundant with the curated Views/System set we keep. What stays: the
    # Kubernetes Views/System dashboards, kubelet, Networking Cluster + Namespace(Pods), node-exporter
    # "Full"/"Nodes", persistent-volumes, and the VictoriaMetrics dashboards.
    dashboards:
      etcd: {enabled: false}                                  # etcd
      apiserver: {enabled: false}                             # Kubernetes / API server
      controller-manager: {enabled: false}                    # Kubernetes / Controller Manager
      scheduler: {enabled: false}                             # Kubernetes / Scheduler
      k8s-resources-multicluster: {enabled: false}            # Compute Resources / Multi-Cluster
      k8s-resources-cluster: {enabled: false}                 # Compute Resources / Cluster
      k8s-resources-namespace: {enabled: false}               # Compute Resources / Namespace (Pods)
      k8s-resources-workloads-namespace: {enabled: false}     # Compute Resources / Namespace (Workloads)
      k8s-resources-node: {enabled: false}                    # Compute Resources / Node (Pods)
      k8s-resources-nodes-overview: {enabled: false}          # Compute Resources / Nodes Overview
      k8s-resources-pod: {enabled: false}                     # Compute Resources / Pod
      k8s-resources-workload: {enabled: false}                # Compute Resources / Workload
      k8s-resources-windows-cluster: {enabled: false}         # Compute Resources / Cluster(Windows)
      k8s-resources-windows-pod: {enabled: false}             # Compute Resources / Pod(Windows)
      k8s-windows-cluster-rsrc-use: {enabled: false}          # USE Method / Cluster(Windows)
      k8s-windows-node-rsrc-use: {enabled: false}             # USE Method / Node(Windows)
      namespace-by-workload: {enabled: false}                 # Networking / Namespace (Workload)
      pod-total: {enabled: false}                             # Networking / Pod
      workload-total: {enabled: false}                        # Networking / Workload
      node-cluster-rsrc-use: {enabled: false}                 # Node Exporter / USE Method / Cluster
      node-rsrc-use: {enabled: false}                         # Node Exporter / USE Method / Node
      nodes-aix: {enabled: false}                             # Node Exporter / AIX
      nodes-darwin: {enabled: false}                          # Node Exporter / MacOS
      prometheus: {enabled: false}                            # Prometheus / Overview
      prometheus-remote-write: {enabled: false}               # Prometheus / Remote Write

  # ---- exporters -----------------------------------------------------------------------------------
  prometheus-node-exporter:
    # Enabled at cutover, together with the removal of kube-prometheus-stack (whose node-exporter freed
    # hostPort 9100). DaemonSet lands on all 3 nodes via the tolerations below. See 15_monitoring.md.
    enabled: true
    # DaemonSet must land on all 3 nodes. All-control-plane cluster, so tolerate everything rather than a
    # control-plane nodeSelector (a node-role.kubernetes.io/control-plane:DoesNotExist selector would match
    # ZERO nodes here).
    tolerations:
      - operator: Exists
    resources:
      requests: {cpu: 10m, memory: 32Mi}
      limits: {memory: 48Mi}

  kube-state-metrics:
    enabled: true
    resources:
      requests: {cpu: 10m, memory: 32Mi}
      limits: {memory: 64Mi}
    # If replicas is raised, keep them off the same Pi node. PREFERRED + hostname: bare Pi nodes have no zone
    # label, and soft so a scale-up never wedges as Pending on the 3-node cluster. No-op at the default single
    # replica. NOTE real scale-out also needs `autosharding.enabled: true` (else replicas emit duplicate series).
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: kube-state-metrics
              topologyKey: kubernetes.io/hostname

  # ---- Talos control-plane scrape targets ----------------------------------------------------------
  # Talos binds kube-controller-manager / kube-scheduler / etcd metrics to localhost by DEFAULT; we expose
  # them via Talos machine config (OUTSIDE ArgoCD, already applied, see 15_monitoring.md "control-plane
  # scrape"): bind-address 0.0.0.0 for the two controllers, etcd listen-metrics-urls http://0.0.0.0:2381.
  # `endpoints` are the control-plane node IPs (static, reserved, mirror 03_operating_system/03_config.sh
  # CLUSTER_NODES); every node runs all three on this all-control-plane cluster.
  kubeControllerManager:
    enabled: true
    endpoints: ["192.168.10.201", "192.168.10.202", "192.168.10.203"]
    service:
      enabled: true
      port: 10257
      targetPort: 10257
    vmScrape:
      spec:
        endpoints:
          - port: http-metrics
            scheme: https
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            tlsConfig:
              insecureSkipVerify: true   # controller serves a self-signed cert on the metrics port
        jobLabel: app.kubernetes.io/component
        namespaceSelector:
          matchNames: []
  kubeScheduler:
    enabled: true
    endpoints: ["192.168.10.201", "192.168.10.202", "192.168.10.203"]
    service:
      enabled: true
      port: 10259
      targetPort: 10259
    vmScrape:
      spec:
        endpoints:
          - port: http-metrics
            scheme: https
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            tlsConfig:
              insecureSkipVerify: true
        jobLabel: app.kubernetes.io/component
        namespaceSelector:
          matchNames: []
  kubeEtcd:
    enabled: true
    endpoints: ["192.168.10.201", "192.168.10.202", "192.168.10.203"]
    service:
      enabled: true
      port: 2381   # Talos etcd listen-metrics-urls, plain HTTP, no auth
      targetPort: 2381
    vmScrape:
      spec:
        endpoints:
          - port: http-metrics
            scheme: http
            # Drop etcd's gRPC server counters (top cardinality, low value). NOTE: the apiserver->etcd
            # request-latency histogram `etcd_request_duration_seconds_bucket` is NOT exported here, it
            # comes from the apiserver job, so it's dropped in kubeApiServer below, not here.
            metricRelabelConfigs:
              - source_labels: [__name__]
                action: drop
                regex: "grpc_server_(handled|started|msg_received|msg_sent)_total"
        jobLabel: app.kubernetes.io/component
        namespaceSelector:
          matchNames: []
  # Scrape the apiserver but DROP its big histograms (request/response/watch/flowcontrol/admission *_bucket)
  #, the top cardinality hogs, and we don't run the apiserver latency SLOs. Keep apiserver_request_total.
  # Also drop `etcd_request_duration_seconds_bucket` here: it's the apiserver's CLIENT-side etcd latency
  # histogram (exported by THIS job, not by etcd, ~30k series, by far the biggest hog). _count/_sum stay.
  kubeApiServer:
    enabled: true
    vmScrape:
      spec:
        endpoints:
          - port: https
            scheme: https
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              serverName: kubernetes
            metricRelabelConfigs:
              - source_labels: [__name__]
                action: drop
                regex: "apiserver_(request_duration_seconds|request_sli_duration_seconds|request_slo_duration_seconds|request_body_size_bytes|response_sizes|watch_list_duration_seconds|watch_cache_read_wait_seconds|watch_events_sizes|flowcontrol_request_execution_seconds|flowcontrol_priority_level_request_utilization|flowcontrol_priority_level_seat_utilization|flowcontrol_request_wait_duration_seconds|flowcontrol_demand_seats|admission_controller_admission_duration_seconds|admission_webhook_admission_duration_seconds)_bucket|etcd_request_duration_seconds_bucket"
              # Tier-1 apiserver-sourced noise: etcd watch-bookmark counter, the watch-cache capacity gauge,
              # and the OpenAPI v2/v3 schema-regeneration counters (irrelevant on a stable cluster).
              - source_labels: [__name__]
                action: drop
                regex: "etcd_bookmark_total|watch_cache_capacity|apiextensions_openapi_v(2|3)_regeneration_count"
              # apiserver "deep internals", watch-cache / storage-list / cache-list inventories, request &
              # response body sizes, SLI-duration and long-running gauges. Unreferenced by every VMRule and
              # dashboard, incl. k8s_system_apisrv (which uses only apiserver_request_total + the
              # request_duration_seconds _count/_sum). The matching *_bucket histograms are already dropped
              # by the rule above; this clears the surviving _count/_sum/_total remnants and gauge inventories.
              - source_labels: [__name__]
                action: drop
                regex: "apiserver_watch_cache_.*|apiserver_watch_events_.*|apiserver_watch_list_duration_seconds_(count|sum)|apiserver_storage_list_.*|apiserver_cache_list_.*|apiserver_storage_objects|apiserver_resource_objects|apiserver_resource_size_estimate_bytes|apiserver_response_sizes_(count|sum)|apiserver_request_body_size_bytes_(count|sum)|apiserver_request_sli_duration_seconds_(count|sum)|apiserver_longrunning_requests|apiserver_storage_consistency_checks_total|apiserver_storage_transformation_duration_seconds_(bucket|count|sum)"
              # etcd request detail, the apiserver's CLIENT-side etcd op counter + latency _count/_sum (the
              # matching _bucket is already dropped by the first rule). etcd's own SERVER metrics
              # (etcd_server_*, etcd_disk_*, etcd_mvcc_* from the kubeEtcd job) are untouched.
              - source_labels: [__name__]
                action: drop
                regex: "etcd_requests_total|etcd_request_duration_seconds_(count|sum)"
        jobLabel: component
        namespaceSelector:
          matchNames: [default]
        selector:
          matchLabels:
            component: apiserver
            provider: kubernetes
  # CoreDNS on Talos exposes :9153 cluster-wide, keep the default scrape.
  coreDns:
    enabled: true
  # Cilium replaces kube-proxy (kubeProxyReplacement), there is no kube-proxy to scrape.
  kubeProxy:
    enabled: false

