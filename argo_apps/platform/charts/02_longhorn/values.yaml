# Values for the 02_longhorn wrapper chart. SINGLE SOURCE OF TRUTH, ArgoCD (and any local
# `helm template`) consume this. Chart version pinned in Chart.yaml. See 09_longhorn.md for the why.
#
# Longhorn runs in its own `longhorn-system` namespace (CreateNamespace=true in the Application,
# which also stamps the `pod-security.kubernetes.io/enforce: privileged` label Longhorn requires).
#
# Everything under `longhorn:` is passed to the upstream longhorn/longhorn subchart (key == dependency name).
longhorn:
  defaultSettings:
    # Point Longhorn at the dedicated XFS user volume (03d volumes.yaml -> /var/mnt/longhorn),
    # exposed to the kubelet by the extraMount in 03d's cp-patch. Longhorn auto-creates a default
    # disk here on every node and reads its (fixed, grow-once-at-provision) capacity via statfs.
    defaultDataPath: /var/mnt/longhorn

    # Longhorn's global default replica count (a fallback — every StorageClass here sets numberOfReplicas: 2
    # explicitly). 2 on a 3-node cluster survives the one node loss we design for AND leaves a spare node to rebuild
    # the lost replica onto; at 3 replicas / hard anti-affinity there's no spare, so a volume stays degraded until
    # the dead node returns. replicaSoftAntiAffinity stays default false => hard anti-affinity, one replica per node.
    defaultReplicaCount: 2

    # Keep headroom on the Pi NVMes, don't schedule replicas onto a disk under 15% free.
    storageMinimalAvailablePercentage: 15

    # When a node goes down, force-delete the StatefulSet pods bound to it so the scheduler can
    # reschedule them onto a surviving node instead of waiting indefinitely for the dead node. Single-
    # replica StatefulSets (Prometheus, Alertmanager, 07_kube_prometheus_stack) otherwise hang on a
    # lost node; with replica-3 Longhorn volumes the rescheduled pod re-attaches from a surviving
    # replica. The NICs on this cluster are flaky, so node loss is a real, recurring case. See
    # 15_monitoring.md (failover).
    nodeDownPodDeletionPolicy: delete-statefulset-pod

  # Off-cluster S3 backup target for OPT-IN volumes (the longhorn-r2-retained-with-backups class -> templates/storageclasses.yaml).
  # 16_longhorn_backup.sh fills these from .env/terraform when AWS creds are present; empty here = backups OFF (the
  # committed default). Longhorn owns retention via the RecurringJob `retain` counts (the S3 longhorn/ prefix is
  # delete-free, terraform/main.tf) — see templates/recurringjobs.yaml + docs/13_backups.md.
  defaultBackupStore:
    backupTarget: ""                  # -> s3://<S3_BACKUP_BUCKET>@<AWS_REGION>/longhorn/
    backupTargetCredentialSecret: ""  # -> longhorn-backup-s3 (sealed into longhorn-system, templates/backup-s3-sealedsecret.yaml)
    pollInterval: 300                 # s; how often Longhorn rescans S3 (also how DR discovers BackupVolumes on a rebuild)

  persistence:
    # NO default StorageClass. The three explicit classes (templates/storageclasses.yaml: longhorn-r2-ephemeral /
    # -retained / -retained-with-backups) are the only Longhorn classes, and every workload names one deliberately
    # — a PVC that omits a class stays Pending rather than silently landing on Longhorn. See docs/08_storage.md.
    defaultClass: false

  # The pre-upgrade checker is a Helm pre-upgrade HOOK Job. Under ArgoCD a hook Job can stall the
  # sync waiting on its completion; version control already lives in git, so disable it.
  preUpgradeChecker:
    jobEnabled: false

  # Create the Longhorn Manager ServiceMonitor so Prometheus scrapes storage metrics (volume health,
  # capacity, replica state). CRDs exist from wave 0, before this wave-2 app. See 15_monitoring.md.
  metrics:
    serviceMonitor:
      enabled: true

  csi:
    # Disable the CSI snapshotter sidecar (we don't use CSI VolumeSnapshots; it spams "failed to watch
    # VolumeSnapshotClass" since those CRDs aren't installed). No on/off toggle -> drop replica count to 0.
    # MUST be the STRING "0": int 0 is falsy in the chart's `{{- if .snapshotterReplicaCount }}` env guard
    # -> the var is dropped and Longhorn falls back to its default of 3 (that's why plain 0 did nothing).
    # Deployer sets replicas only at CREATE, so after this lands delete the live deploy once to recreate at
    # 0: kubectl -n longhorn-system delete deploy csi-snapshotter.
    snapshotterReplicaCount: "0"

  # longhorn-manager DaemonSet is a real ~134Mi/node consumer (KRR) that ships with NO resources set, so
  # the scheduler treats it as free and a manager leak could pressure a node. Request + bound it. (The tiny
  # CSI sidecars are settable via defaultSettings.systemManagedCSIComponentsResourceLimits but deliberately
  # left unset: it only ADDS reservations for ~16Mi sidecars, is storage-critical, and takes a fiddly JSON.)
  longhornManager:
    resources:
      requests: {cpu: 20m, memory: 160Mi}
      limits: {memory: 192Mi}
