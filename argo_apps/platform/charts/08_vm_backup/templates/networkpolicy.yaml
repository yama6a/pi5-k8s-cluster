{{- /*
Egress lockdown for the central backup pod. Rendered under the same bucket gate as the CronJob. Egress-only (the
pod exposes nothing): deny-by-default egress except the three things a run needs — DNS, VMSingle on 8428 + VLSingle
on 9428 (to pull the exports), and S3 on 443 (to upload them). VMSingle/VLSingle each separately allow THIS pod
inbound (their own networkpolicy.yaml allowlists app.kubernetes.io/name: vm-backup). No kube-apiserver rule: this
job reads the stores over HTTP by Service DNS, it does not touch the k8s API.
*/ -}}
{{- if .Values.bucket }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vm-backup
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vm-backup
      app.kubernetes.io/component: vm-backup
  egress:
    # (a) DNS to CoreDNS — L7 so Cilium's DNS proxy can back the toFQDNs rule below (and resolve Service names).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
          rules:
            dns:
              - matchPattern: "*"
    # (b) VMSingle metrics export on 8428.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: vmsingle
            app.kubernetes.io/instance: victoria-metrics-k8s-stack
      toPorts:
        - ports:
            - { port: "8428", protocol: TCP }
    # (c) VLSingle logs export on 9428.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: vlsingle
            app.kubernetes.io/instance: victoria-logs
      toPorts:
        - ports:
            - { port: "9428", protocol: TCP }
    # (d) S3 upload over HTTPS (virtual-hosted + path-style regional endpoints).
    - toFQDNs:
        - matchPattern: "*.s3.{{ .Values.region }}.amazonaws.com"
        - matchName: "s3.{{ .Values.region }}.amazonaws.com"
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
{{- end }}
