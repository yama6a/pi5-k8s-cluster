apiVersion: v2
name: rabbitmq-operator
description: >-
  Wrapper chart for RabbitMQ on the Talos/Raspberry Pi 5 cluster. Installs BOTH the RabbitMQ Cluster
  Operator (reconciles the RabbitmqCluster CR + broker StatefulSet) and the Messaging Topology Operator
  (reconciles Queue/Exchange/Binding/User/Permission/Vhost CRs) + their CRDs, via the CloudPirates
  rabbitmq-cluster-operator chart. This installs the CONTROLLERS + CRDs ONLY; the actual broker (a single
  RabbitmqCluster) is 03_rabbitmq_cluster, and workloads declare their own topology via the shared
  lib/helm/rabbitmq-topology chart. Single source of truth for the operator chart version (this file) and
  its values (values.yaml, under the `rabbitmq-cluster-operator:` key). Delivered purely by ArgoCD (no
  imperative bootstrap) via argo_apps/platform/apps/02_rabbitmq_operator.yaml, wave 2, same as cert-manager /
  longhorn / cnpg-operator (independent leaves, only need the CNI).

  Why CloudPirates and not Bitnami: since 2025-08-28 Bitnami gated its free-tier images to `latest`-only,
  which breaks version pinning. The RabbitMQ project ships no Helm chart of its own. CloudPirates is a thin
  community chart that pins the OFFICIAL upstream images (ghcr.io/rabbitmq/cluster-operator,
  ghcr.io/rabbitmq/messaging-topology-operator, ghcr.io/rabbitmq/default-user-credential-updater,
  docker.io/library/rabbitmq) — all multi-arch incl. arm64. See 11_messaging.md.
type: application
version: 0.1.0                 # this wrapper chart's own version
appVersion: "2.21.0"          # RabbitMQ Cluster Operator version the pinned chart ships (topology operator 1.19.2)

dependencies:
  - name: rabbitmq-cluster-operator
    version: "0.3.3"          # CloudPirates chart, THE single source for the pin (OCI, so also lands in Chart.lock)
    repository: "oci://ghcr.io/cloudpirates-io/helm-charts"
