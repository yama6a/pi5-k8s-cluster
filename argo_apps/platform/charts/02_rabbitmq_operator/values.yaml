# Values for the 02_rabbitmq_operator wrapper chart. SINGLE SOURCE OF TRUTH; ArgoCD (and any local
# `helm template`) consume this. Chart version pinned in Chart.yaml. See 11_messaging.md for the why.
#
# Both operators run in their own `rabbitmq` namespace (CreateNamespace=true in the Application), alongside
# the single broker (03_rabbitmq_cluster). They run non-root, so the namespace stays restricted-compatible
# (like cert-manager / cnpg-operator).
#
# Everything under `rabbitmq-cluster-operator:` is passed to the upstream CloudPirates subchart (key ==
# dependency name). The chart bundles + installs the RabbitMQ CRDs (RabbitmqCluster + the topology CRDs), so
# no separate wave-0 CRD app is needed: 03_rabbitmq_cluster and the workloads (workloads tree, created only
# after the whole platform is Healthy) both reconcile after these CRDs are registered. ServerSideApply in the
# Application handles the large CRD manifests.
rabbitmq-cluster-operator:
  # Self-sign the Messaging Topology Operator's admission-webhook cert instead of using cert-manager. Keeps
  # this a wave-2 independent leaf (no cross-wave dependency on cert-manager at wave 2, which would race);
  # the operator manages its own webhook CA. Flip to true only if you want cert-manager to own the cert.
  useCertManager: false

  # The RabbitMQ Cluster Operator: watches all namespaces so it can reconcile the RabbitmqCluster in
  # `rabbitmq` and (via topology-allowed-namespaces on the CR) topology objects in every workload namespace.
  clusterOperator:
    replicaCount: 1
    # Modest footprint for a controller pod on the Pi 5s — it only reconciles; the broker work lives in the
    # RabbitmqCluster pods (03_rabbitmq_cluster). Tunable later via the repo's krr workflow.
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
    # Emit a PodMonitor so vmagent scrapes the operator's plaintext /metrics; the VM operator auto-converts
    # PodMonitor -> VMPodScrape (CRDs exist from wave 0). See 09_monitoring.md.
    metrics:
      podMonitor:
        enabled: true

  # The Messaging Topology Operator: reconciles the Queue/Exchange/Binding/User/Permission/Vhost CRs.
  msgTopologyOperator:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
    # metrics left off: as of topology-operator v1.19.0 the metrics endpoint requires TLS, which the
    # plaintext vmagent scrape can't consume without extra config — not worth it for the homelab.
