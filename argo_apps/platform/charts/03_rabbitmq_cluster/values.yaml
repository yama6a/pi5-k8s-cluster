# Values for the 03_rabbitmq_cluster chart — the one shared broker. SINGLE SOURCE OF TRUTH; ArgoCD (and any
# local `helm template`) consume this. See 11_messaging.md for the why behind each choice.

# The RabbitmqCluster name. Also the name of the client Service (rabbitmq.rabbitmq.svc) workloads dial on 5672
# and the management UI is exposed on (15672). Workloads reference this via the rabbitmq-topology chart's
# `cluster.name` default, so changing it means changing that default too.
name: rabbitmq

# 3 replicas — one per Pi node. Quorum queues use Raft and need a MAJORITY, so 3 tolerates losing 1 node
# (majority 2 of 3); the operator recommends odd counts. (2 would pay the cost of a cluster with no quorum
# benefit; 1 has no HA.) Paired with the quorum default queue type below.
replicas: 3

# Pinned RabbitMQ server image. `-management` bundles the management plugin (the 15672 UI); `-alpine` is the
# small variant (kind to the Pis). Multi-arch incl. arm64. 4.2.x matches the line the operator chart
# (02_rabbitmq_operator, CloudPirates 0.3.3) is built/tested against; bump deliberately.
image: rabbitmq:4.2.8-management-alpine

# Per-instance requests/limits. RabbitMQ sizes its memory high-watermark off the memory LIMIT, so the limit
# is the real knob — 1Gi gives ~400Mi of working set before back-pressure, ample for homelab messaging on the
# 8GB Pi 5s that already run a lot. Tunable later via the repo's krr workflow.
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Per-broker storage on the node-local `local-path-ephemeral` class (NOT Longhorn). Quorum queues already
# replicate every message across the 3 brokers via Raft and fsync locally, so HA + durability live in the app;
# replicating the volume underneath too would just be write amplification — the same reason CNPG runs Postgres
# on local-path. So each broker gets a plain node-local volume, and it's disposable: lose a node and its
# replacement broker starts empty and rebuilds from the 2 healthy peers, which is why the class is reclaimPolicy
# Delete, not Retain (nothing to preserve; the dir is auto-cleaned). Trade-offs, all accepted: while a node is
# down there's no spare fault tolerance (a 2nd loss drops quorum below majority), and this shares Postgres's
# fixed 50GiB /var/mnt/cnpg slice (fine — quorum-log volumes are tiny). `size` is nominal: local-path enforces
# no quota (same as CNPG's value).
storage:
  className: local-path-ephemeral
  size: 5Gi

# The one shared vhost every workload's users/exchanges/queues live in (kept separate from the default `/`,
# which stays admin-only). The rabbitmq-topology chart defaults `vhost` to this name — keep them in sync.
vhost: apps
