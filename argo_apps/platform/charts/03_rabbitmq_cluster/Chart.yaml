apiVersion: v2
name: rabbitmq-cluster
description: >-
  The single, shared RabbitMQ broker for the whole cluster: one RabbitmqCluster CR (3 replicas, one per Pi
  node, on Longhorn) + the one shared Vhost every workload uses + the broker's CiliumNetworkPolicy lockdown.
  A first-party chart (no upstream dependency — pure templates); the CRDs it renders come from the operators
  installed by 02_rabbitmq_operator. There is exactly ONE broker for all workloads (unlike Postgres, which is
  per-workload), so the broker is platform infrastructure here; workloads add only their own topology
  (exchanges/queues/users) via the shared lib/helm/rabbitmq-topology chart. Delivered by ArgoCD via
  argo_apps/platform/apps/03_rabbitmq_cluster.yaml, wave 3 (after the operators + CRDs at wave 2 are Healthy,
  the same operator-then-CR split as 02_cert_manager -> 03_gateway). See 11_messaging.md.
type: application
version: 0.1.0                 # this chart's own version
appVersion: "4.2.8"           # RabbitMQ server version pinned in values.yaml (spec.image)
