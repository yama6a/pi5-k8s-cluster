apiVersion: v2
name: cilium
description: >-
  Wrapper chart for Cilium on Talos/Raspberry Pi 5, the CNI + LoadBalancer
  (LB-IPAM/L2) + Gateway API + WireGuard encryption. Single source of truth for
  the Cilium chart version (this file), its values (values.yaml), the Gateway API
  CRDs (crds/), and the LB-IPAM pool + L2 policy (templates/cilium-lb.yaml).
  Bootstrapped imperatively by ../../../04_networking/04_cilium.sh; later adopted
  by ArgoCD against this same chart. See 04_networking.md.
type: application
version: 0.1.0                 # this wrapper chart's own version

dependencies:
  - name: cilium
    version: "1.19.5"         # cilium/cilium chart + image, THE single source for the pin
    repository: https://helm.cilium.io
