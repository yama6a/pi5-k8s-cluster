# One Gateway per monitoring UI — each a single :443 HTTPS listener terminating TLS for its host with the
# cert this chart mints. All folded onto the cluster's one Envoy + LB IP by mergeGateways
# (01_envoy_gateway), so they share the single ingress point without their own LoadBalancers. In the
# gateway namespace so each HTTPRoute (also gateway ns) attaches same-namespace and the 04_google_sso
# SecurityPolicy still selects it by label. A listener is not-Ready only until its own cert issues — that
# wait now lives on the per-UI Gateway, and under merge one UI's missing cert never blocks another.
# See 15_monitoring.md.
{{- range .Values.hosts }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.gatewayNamespace }}
spec:
  gatewayClassName: {{ $.Values.gatewayClassName }}
  listeners:
    - name: {{ .name }}
      protocol: HTTPS
      port: 443
      hostname: {{ .host | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .tlsSecretName | quote }}
      allowedRoutes:
        namespaces:
          from: Same
{{- end }}
