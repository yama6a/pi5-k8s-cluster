# Lets the HTTPRoutes (in the gateway namespace) reference the monitoring Services in the monitoring
# namespace. Cross-namespace backendRefs require a ReferenceGrant in the BACKEND's namespace. One grant
# covers every UI's Service.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: gateway-routes-to-monitoring
  namespace: {{ .Values.backendNamespace }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Values.gatewayNamespace }}
  to:
    {{- range .Values.hosts }}
    - group: ""
      kind: Service
      name: {{ .backend.name }}
    {{- end }}
