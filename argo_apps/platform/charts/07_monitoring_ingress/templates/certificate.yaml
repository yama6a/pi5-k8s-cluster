# cert-manager mints one Certificate per UI (HTTP-01 via the shared :80 listener) into the Secret each
# UI's own Gateway listener (templates/gateway.yaml) references. In the gateway namespace, alongside those
# Gateways. STAGING by default — flip .Values.issuer to letsencrypt-prod once they issue (browser-facing UIs).
{{- range .Values.hosts }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.gatewayNamespace }}
spec:
  secretName: {{ .tlsSecretName | quote }}
  dnsNames:
    - {{ .host | quote }}
  issuerRef:
    name: {{ $.Values.issuer | quote }}
    kind: ClusterIssuer
{{- end }}
