# Values for the 06_argocd_ingress wrapper chart. SINGLE SOURCE OF TRUTH — ArgoCD (and any local
# `helm template`) consume this.
#
# Fronts the ArgoCD UI on `host` through the shared Gateway, gated by Google SSO. The :443 listener for
# `host` must exist in 03_gateway's httpsHosts (name == listenerName, hostname == host, tlsSecretName ==
# tlsSecretName). The route is labelled `sso: <sso>` so the matching 04_google_sso SecurityPolicy
# attaches Google login + the allowlist. ArgoCD's own admin login still applies behind it.
# See 14_argocd_ingress.md.

# The shared Gateway + its namespace (where the Certificate + HTTPRoute live). MUST match 03_gateway.
gatewayName: shared-gateway
gatewayNamespace: gateway

# Public host for the ArgoCD UI. Needs DNS -> router (the old-Pi *.pontiki.app forward already covers it).
host: argocd.pontiki.app
# The 03_gateway httpsHosts entry this attaches to (parentRef.sectionName) + its cert Secret.
listenerName: argocd
tlsSecretName: argocd-tls
# Cert issuer (HTTP-01). STAGING for the brand-new host; flip to letsencrypt-prod once it issues (the
# UI is browser-facing, so a trusted cert is wanted — pontiki.app's HTTP-01 path is already validated).
issuer: letsencrypt-staging

# Route label that opts this host into SSO. `sso: <domain>` -> gated by that domain's SecurityPolicy.
routeLabelKey: sso
sso: "pontiki.app"

# The in-cluster Service to route to (cross-namespace — needs the ReferenceGrant this chart ships).
# argocd-server :80 serves the UI/API over HTTP (server.insecure: true); the Gateway terminates TLS.
backend:
  name: argocd-server
  namespace: argocd
  port: 80
