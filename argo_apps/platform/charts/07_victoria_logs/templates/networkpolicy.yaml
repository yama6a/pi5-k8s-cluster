# POD-SCOPED to the vlsingle logs store (60d of raw container logs — the most sensitive data at rest). NOT
# namespace-wide: vmagent shares the monitoring namespace and must stay unrestricted. See 04_networking.md /
# 09_monitoring.md.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vlsingle
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vlsingle
      app.kubernetes.io/instance: victoria-logs
  ingress:
    # :9428 — the collector writes, grafana reads, the Envoy edge serves vlogs, vmagent self-scrapes.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: victoria-logs-collector
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: grafana
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
            app.kubernetes.io/managed-by: envoy-gateway
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: vmagent
      toPorts:
        - ports:
            - { port: "9428", protocol: TCP }
  egress:
    # DNS (CoreDNS).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
