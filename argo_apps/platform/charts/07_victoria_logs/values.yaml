# Values for the 07_victoria_logs wrapper chart. SINGLE SOURCE OF TRUTH, ArgoCD (and any local
# `helm template`) consume this. Chart version pinned in Chart.yaml. See 15_monitoring.md.
#
# Two pieces:
#   1. vlsingle.*           -> our hand-written VLSingle CR (templates/vlsingle.yaml), reconciled by the
#                              standalone VM operator (01_victoria_metrics_operator).
#   2. victoria-logs-collector.* -> the upstream collector DaemonSet (key == dependency name).

# ---- VLSingle (the logs store) ---------------------------------------------------------------------
vlsingle:
  # CR name -> the operator names the Service `vlsingle-<name>` on :9428 (the collector remoteWrite target
  # and the vlogs UI backend both reference it). Keep in step with victoria-logs-collector.remoteWrite and
  # the `ingress.backend` block below.
  name: victoria-logs
  namespace: monitoring
  # Logs are bulkier than metrics, so they get their OWN, shorter window (metrics are 180d). 60d here.
  retentionPeriod: "60d"
  storage:
    storageClassName: longhorn   # default global class, replica 3 (02_longhorn)
    size: 30Gi
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {memory: 512Mi}

# ---- victoria-logs-collector (the DaemonSet) -------------------------------------------------------
victoria-logs-collector:
  # Tail all container logs on every node, remote-write to the VLSingle service above.
  remoteWrite:
    - url: http://vlsingle-victoria-logs.monitoring.svc:9428

  # DaemonSet must land on all 3 nodes. All-control-plane cluster, so tolerate everything rather than a
  # control-plane nodeSelector (a node-role.kubernetes.io/control-plane:DoesNotExist selector would match
  # ZERO nodes here).
  tolerations:
    - operator: Exists

  # Let vmagent scrape the collector's own /metrics via a VMPodScrape (vm: true), operator-native,
  # picked up by vmagent's selectAllByDefault.
  podMonitor:
    enabled: true
    vm: true

  resources:
    requests: {cpu: 25m, memory: 64Mi}
    limits: {memory: 128Mi}

# ---- edge / ingress (folded in from the retired 07_monitoring_ingress) -------------------------------
# Exposes the VictoriaLogs UI on `host` through its OWN Gateway (a single :443 listener, merged onto the
# one Envoy via mergeGateways in 01_envoy_gateway), gated by Google SSO: the HTTPRoute is labelled
# `sso: <sso>` so the 04_google_sso SecurityPolicy attaches Google login + the allowlist. The VictoriaLogs
# UI has NO login of its own, so this SSO gate is the only barrier. The Gateway/listener/cert/route are
# named `vlogs`; the ReferenceGrant lands in the backend namespace as gateway-routes-to-vlogs. `issuer`
# is STAGING until the cert issues, flip to letsencrypt-prod then. See 15_monitoring.md.
ingress:
  name: vlogs
  gatewayClassName: eg
  gatewayNamespace: gateway
  host: vlogs.pontiki.app
  tlsSecretName: vlogs-tls
  issuer: letsencrypt-staging
  routeLabelKey: sso
  sso: "pontiki.app"
  # The operator-generated VLSingle Service (verify: kubectl get svc -n monitoring). The UI is served by
  # VLSingle on :9428 (landing at /select/vmui/); the name follows the operator pattern vlsingle-<cr>.
  backend:
    name: vlsingle-victoria-logs
    namespace: monitoring
    port: 9428
