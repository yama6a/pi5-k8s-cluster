# Values for the 05_victoria_logs wrapper chart. SINGLE SOURCE OF TRUTH, ArgoCD (and any local
# `helm template`) consume this. Chart version pinned in Chart.yaml. See 15_monitoring.md.
#
# Two pieces:
#   1. vlsingle.*           -> our hand-written VLSingle CR (templates/vlsingle.yaml), reconciled by the
#                              standalone VM operator (01_victoria_metrics_operator).
#   2. victoria-logs-collector.* -> the upstream collector DaemonSet (key == dependency name).

# ---- VLSingle (the logs store) ---------------------------------------------------------------------
vlsingle:
  # CR name -> the operator names the Service `vlsingle-<name>` on :9428 (the collector remoteWrite target
  # and the vlogs UI backend both reference it). Keep in step with victoria-logs-collector.remoteWrite and
  # the `ingress.backend` block below.
  name: victoria-logs
  namespace: monitoring
  # Logs are bulkier than metrics, so they get their OWN, shorter window (metrics are 180d). 60d here.
  retentionPeriod: "60d"
  storage:
    storageClassName: longhorn-r2-retained   # Retain r2 (02_longhorn): survives an accidental delete; VL has no off-cluster backup
    size: 30Gi
  resources:
    requests: {cpu: 10m, memory: 96Mi}
    limits: {memory: 192Mi}

# ---- victoria-logs-collector (the DaemonSet) -------------------------------------------------------
victoria-logs-collector:
  # Tail all container logs on every node, remote-write to the VLSingle service above.
  remoteWrite:
      # Cap the on-disk send buffer (default: uncapped). VLSingle is in-cluster on these same 3 nodes, so if it
      # goes down the buffer could otherwise grow until it fills the node's /var/lib and takes the node with it;
      # capped, the collector drops oldest logs instead. (Homelab: dropping logs during a store outage is fine.)
    - url: http://vlsingle-victoria-logs.monitoring.svc:9428
      maxDiskUsagePerURL: 2GiB

  collector:
    # Drop the collector's OWN logs before reading them (applied pre-read => saves CPU + hostPath I/O + store
    # space, and stops a self-ingestion feedback loop). %{HOSTNAME} is substituted per-pod by the chart.
    excludeFilter: "kubernetes.pod_name:=%{HOSTNAME}"
    # Don't stamp every log line with all pod labels (default true): needless stream/field cardinality in the
    # small 30Gi/60d store. Labels stay available to excludeFilter above regardless.
    includePodLabels: false

  # DaemonSet must land on all 3 nodes. All-control-plane cluster, so tolerate everything rather than a
  # control-plane nodeSelector (a node-role.kubernetes.io/control-plane:DoesNotExist selector would match
  # ZERO nodes here).
  tolerations:
    - operator: Exists

  # Let vmagent scrape the collector's own /metrics via a VMPodScrape (vm: true), operator-native,
  # picked up by vmagent's selectAllByDefault.
  podMonitor:
    enabled: true
    vm: true

  resources:
    requests: {cpu: 10m, memory: 48Mi}
    limits: {memory: 96Mi}

