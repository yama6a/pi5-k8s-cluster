# The shared OIDC callback BACKEND: one tiny whoami behind every domain's google-sso.<domain> host. Envoy
# Gateway intercepts /oauth2/callback (via each callback host's SecurityPolicy) before it reaches this, so
# this whoami only ever answers non-callback paths, and only to someone who cleared the callback host's
# own gate. ONE shared Deployment+Service for every domain's callback host. The per-domain callback host
# itself (Gateway + :443 listener + Certificate + HTTPRoute + SecurityPolicy) is rendered by the
# ingress-edge library from the `ingress-edge:` block in values.yaml (templates/ingress.yaml). See 07_ingress.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-sso-callback
  namespace: {{ .Values.namespace }}
  labels:
    app: gateway-sso-callback
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-sso-callback
  template:
    metadata:
      labels:
        app: gateway-sso-callback
    spec:
      containers:
        - name: whoami
          image: {{ .Values.callbackImage | quote }}
          ports:
            - name: http
              containerPort: 80
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { memory: 32Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-sso-callback
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: gateway-sso-callback
  ports:
    - name: http
      port: 80
      targetPort: http
