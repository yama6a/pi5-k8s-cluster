# One Google-SSO policy PER domain. Each selects routes by LABEL (`sso: <domain>`, targetSelectors) — so
# protecting a host is just labelling its route with its domain, zero per-host config. Three filters run
# at the Envoy edge, in order:
#   1. oidc            — no session -> 302 to Google; callback lands on the shared google-sso.<domain>
#                        host and stores the ID token in a cookie scoped to <domain> (cookieDomain).
#   2. jwt             — validates that ID token (Google's JWKS) and exposes its claims.
#   3. authorization   — Deny by default; Allow only when the `email` claim is in THIS domain's allowlist.
# ONE Google OAuth client is shared across domains (same clientID + sealed secret); only the redirectURL,
# cookieDomain, label and allowlist differ per domain. A SecurityPolicy is namespaced and selects routes
# in its OWN namespace, hence ns == the routes' ns. See 12_google_sso.md.
{{- range .Values.ssoDomains }}
{{- $slug := .domain | replace "." "-" }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: google-sso-{{ $slug }}
  namespace: {{ $.Values.namespace }}
spec:
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      matchLabels:
        {{ $.Values.routeLabelKey }}: {{ .domain | quote }}

  oidc:
    provider:
      issuer: "https://accounts.google.com"
    clientID: {{ $.Values.oidc.clientID | quote }}
    clientSecret:
      name: {{ $.Values.oidc.clientSecretName | quote }}
    # Fixed shared callback host for this domain — register it on the Google OAuth client.
    redirectURL: {{ printf "https://%s.%s/oauth2/callback" $.Values.authSubdomain .domain | quote }}
    # Off the default /logout so it doesn't collide with a backend app's own /logout (e.g. ArgoCD's).
    logoutPath: {{ $.Values.oidc.logoutPath | quote }}
    # Share the session cookie across every subdomain of this domain (one login covers them all).
    cookieDomain: {{ .domain | quote }}
    cookieNames:
      idToken: {{ $.Values.oidc.idTokenCookie | quote }}
    # Silently renew the id/access token so a session survives past Google's ~1h id-token expiry, up to
    # defaultRefreshTokenTTL (sessionTTL). Without this the user is bounced back to Google every hour.
    refreshToken: {{ $.Values.oidc.refreshToken }}
    defaultRefreshTokenTTL: {{ $.Values.oidc.sessionTTL | quote }}
    {{- with $.Values.oidc.csrfTokenTTL }}
    # Lifetime of the per-flow CSRF (OauthNonce) + PKCE (CodeVerifier) cookies. A failed/abandoned
    # flow orphans them for this long; keep it short so leftovers drain fast (EG default is 10m).
    csrfTokenTTL: {{ . | quote }}
    {{- end }}
    {{- with $.Values.oidc.denyRedirectSecFetchMode }}
    # Return 401 instead of a 302→Google for non-navigational requests (XHR/fetch/websocket). Such a
    # request can't render Google's login page, so the OIDC flow it kicks off never completes — and
    # every attempt leaks an OauthNonce/CodeVerifier cookie. A logged-out SPA (Grafana Live's
    # /api/live/ws, ArgoCD's polling) spams these until the crumbled HTTP/2 cookie count crosses
    # Envoy's max_headers_count and the stream is reset (http2.too_many_headers -> ERR_HTTP2_PROTOCOL_ERROR).
    # Only real navigations (Sec-Fetch-Mode: navigate) should redirect to login.
    denyRedirect:
      headers:
        - name: Sec-Fetch-Mode
          type: RegularExpression
          value: {{ . | quote }}
    {{- end }}
    scopes:
      - openid
      - email
      - profile

  jwt:
    providers:
      - name: google
        issuer: "https://accounts.google.com"
        remoteJWKS:
          uri: "https://www.googleapis.com/oauth2/v3/certs"
        extractFrom:
          cookies:
            - {{ $.Values.oidc.idTokenCookie | quote }}

  authorization:
    defaultAction: Deny
    rules:
      - name: allow-listed-emails
        action: Allow
        principal:
          jwt:
            provider: google
            claims:
              - name: email
                valueType: String
                values:
                  {{- range .allowlist }}
                  - {{ . | quote }}
                  {{- end }}
{{- end }}
