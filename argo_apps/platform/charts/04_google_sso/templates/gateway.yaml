# One Gateway per SSO callback host (google-sso.<domain>), a single :443 HTTPS listener terminating TLS
# for the callback host with the cert callbacks.yaml mints. Folded onto the cluster's one Envoy + LB IP by
# mergeGateways (01_envoy_gateway). In the gateway namespace so the callback HTTPRoute (same ns) attaches
# same-namespace and this domain's SecurityPolicy still selects it by the `sso: <domain>` label. The
# listener + its Certificate + its HTTPRoute now all live in this chart, one place per domain. The
# callback cert must be browser-trusted (the login flow redirects THROUGH this host). See 12_google_sso.md.
{{- range .Values.ssoDomains }}
{{- $slug := .domain | replace "." "-" }}
{{- $host := printf "%s.%s" $.Values.authSubdomain .domain }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: google-sso-{{ $slug }}
  namespace: {{ $.Values.namespace }}
spec:
  gatewayClassName: {{ $.Values.gatewayClassName }}
  listeners:
    - name: google-sso-{{ $slug }}
      protocol: HTTPS
      port: 443
      hostname: {{ $host | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: google-sso-{{ $slug }}-tls
      allowedRoutes:
        namespaces:
          from: Same
{{- end }}
