{{/*
Per domain, render the shared callback host google-sso.<domain> (Gateway + Certificate + HTTPRoute) via the
ingress library, fronting the shared whoami (templates/callbacks.yaml). The SecurityPolicy
(templates/securitypolicy.yaml) attaches to this route + the domain's app routes so one OAuth flow completes
on this host. See 07_ingress.md.
*/}}
{{- range $d := .Values.domains }}
{{- $slug := $d.domain | replace "." "-" -}}
{{- $ing := dict
      "name" (printf "google-sso-%s" $slug)
      "domain" $d.domain
      "issuer" $d.issuer
      "hosts" (list (dict "subdomain" $.Values.oidc.authSubdomain "targetService" "gateway-sso-callback" "targetNamespace" $.Values.namespace "targetPort" 80)) -}}
{{ include "ingress.renderIngress" (dict "ingress" $ing "release" $.Release) }}
{{- end }}
