# CENTRAL Google-SSO for the whole cluster. Per domain this chart stands up the shared callback host
# google-sso.<domain> and ONE SecurityPolicy that gates every listed host with its own email allowlist
# (matched by the request `:authority`). Workloads/packages configure NOTHING SSO — a host is protected by
# adding it to `domains[].hosts` below. See 07_ingress.md.

namespace: gateway                       # must equal the ingress library's hardcoded gateway namespace (where the routes live).
# renovate: datasource=docker
callbackImage: "traefik/whoami:v1.10.3"  # Envoy intercepts /oauth2/callback before it reaches this.

# Shared Google-OIDC config (one client for everything). clientID written by 07_google_sso.sh; the client
# secret is sealed (templates/google-oauth-sealedsecret.yaml).
oidc:
  clientID: "637835871395-igu5si0bf9dckedp4gu8btoej706a684.apps.googleusercontent.com"
  clientSecretName: google-oauth   # sealed Secret holding it under key `client-secret`.
  authSubdomain: google-sso        # callback host = <authSubdomain>.<domain>; one Google redirect URI per domain.
  idTokenCookie: "google-id-token" # cookie holding the Google ID token (email claim read from it).
  logoutPath: "/oauth2/sign_out"   # off the default /logout so it doesn't swallow a backend's /logout.
  refreshToken: true               # renew silently so a session outlives Google's ~1h token...
  sessionTTL: "24h"                # ...capped here (needs access_type=offline).
  csrfTokenTTL: "5m"               # TTL of per-flow CSRF/PKCE cookies; short so orphans drain fast.
  # non-navigational reqs (XHR/websocket) get 401 not 302->Google, else a logged-out SPA leaks cookies
  # until Envoy resets the stream (ERR_HTTP2_PROTOCOL_ERROR). Empty disables.
  denyRedirectSecFetchMode: "cors|no-cors|same-origin|websocket"

# THE central map: which hosts are SSO-gated, and by whom. One SecurityPolicy per domain covers all its
# hosts + the callback host (one cookie identity -> the OAuth flow completes). Each host's rule allows only
# its allowlist. To protect a host: add it here (its route is created by whatever chart owns the ingress).
domains:
  - domain: pontiki.app
    issuer: letsencrypt-staging   # callback cert issuer (letsencrypt-staging | letsencrypt-prod)
    hosts:
      # Platform UIs (06_platform_ingress) live under the *.ops.<domain> tier; the workload
      # (sample_user_manager) under *.app.<domain>. All still share this one pontiki.app domain entry:
      # cookieDomain + callback google-sso.pontiki.app are a parent of both, so the OAuth flow completes
      # across both tiers with no Google Console change. Each host MUST equal the FQDN its ingress renders
      # (the SecurityPolicy attaches to routes by dashed-host name). See 07_ingress.md.
      - host: argocd.ops.pontiki.app
        allowlist:
          - yassin.samoila@gmail.com
      - host: grafana.ops.pontiki.app
        allowlist:
          - yassin.samoila@gmail.com
      - host: vmui.ops.pontiki.app
        allowlist:
          - yassin.samoila@gmail.com
      - host: vlogs.ops.pontiki.app
        allowlist:
          - yassin.samoila@gmail.com
      - host: hubble.ops.pontiki.app
        allowlist:
          - yassin.samoila@gmail.com
      - host: longhorn.ops.pontiki.app
        allowlist:
          - yassin.samoila@gmail.com
      - host: sample-user-manager-sso.app.pontiki.app
        allowlist:
          - yassin.samoila@gmail.com
      - host: rabbitmq.ops.pontiki.app   # RabbitMQ management UI (06_platform_ingress); edge SSO + RabbitMQ's own login
        allowlist:
          - yassin.samoila@gmail.com
