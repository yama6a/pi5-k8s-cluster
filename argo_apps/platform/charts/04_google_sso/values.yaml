# Values for the 04_google_sso wrapper chart. SINGLE SOURCE OF TRUTH — ArgoCD (and any local
# `helm template`) consume this.
#
# This chart is the OPTIONAL Google-SSO layer. Per SSO domain it ships:
#   - a SecurityPolicy (templates/securitypolicy.yaml) attaching Google OIDC + an email allowlist to
#     every HTTPRoute labelled `sso: <domain>`, and
#   - the shared callback host google-sso.<domain> (templates/callbacks.yaml — its Certificate + an
#     `sso`-labelled HTTPRoute, sharing one tiny backend) plus that host's own Gateway + :443 listener
#     (templates/gateway.yaml), the single OIDC redirect target for that domain.
# Each domain's :443 listener now lives on this chart's own per-domain Gateway (merged onto the one Envoy
# via mergeGateways) — adding a domain is a one-place edit here, no 03_gateway change. ONE Google OAuth
# client (clientID + sealed secret) is shared across all domains; the allowlist is per-domain and INLINE
# (Envoy Gateway can't read authorization values from a Secret). Only the client secret is sealed.
# See 12_google_sso.md.

# Namespace the SecurityPolicies, callback hosts and the sealed Secret live in. MUST equal the namespace
# of the routes they target (a SecurityPolicy selects routes in its own namespace) — all gateway routes
# (callbacks here, demo apps in gateway-test) are in `gateway`.
namespace: gateway
# The GatewayClass for each per-domain callback Gateway (templates/gateway.yaml). MUST match the `eg`
# class the 01_envoy_gateway chart registers.
gatewayClassName: eg
# The label KEY a route opts in with; the VALUE is the route's domain (e.g. `sso: "pontiki.app"`). MUST
# match the key apps stamp on protected routes (the callbacks here + the demo apps in gateway-test).
routeLabelKey: sso
# The shared OIDC callback subdomain — the redirect target is `https://<authSubdomain>.<domain>/oauth2/callback`.
# Each domain's callback Gateway listener terminates `<authSubdomain>.<domain>`.
authSubdomain: google-sso
# Backend the callback hosts route to. Envoy intercepts /oauth2/callback before it reaches this, so it
# only ever answers non-callback paths (behind SSO). One shared whoami for every domain's callback host.
callbackImage: "traefik/whoami:v1.10.3"
oidc:
  # ONE Google OAuth client, shared across ALL domains (register one redirect URI per domain on it).
  # NOT sensitive. Written by 12_google_sso/12_google_sso.sh. Placeholder denies login until set.
  clientID: "637835871395-igu5si0bf9dckedp4gu8btoej706a684.apps.googleusercontent.com"
  # Sealed Secret holding the client secret under key `client-secret` (the key Envoy Gateway expects).
  clientSecretName: google-oauth
  # Cookie Envoy Gateway stores the Google ID token in; the jwt provider extracts the email claim from it
  # (Google's access token is opaque, so the email lives in the ID token).
  idTokenCookie: "google-id-token"
  # Path the OIDC filter uses for ITS OWN logout — moved off the default /logout so it doesn't swallow a
  # backend app's /logout (e.g. ArgoCD's). Applies to every domain's policy.
  logoutPath: "/oauth2/sign_out"
  # Keep a login session valid for a DAY without re-auth. Without refreshToken the session dies when
  # Google's ~1h id token expires (Envoy honours the IdP's expiry; defaultTokenTTL only applies when the
  # IdP omits one, which Google never does). refreshToken makes Envoy silently renew the id/access token
  # using Google's refresh token; sessionTTL caps how long that renew-without-re-login lasts (Google's
  # refresh token is opaque/non-JWT, so this value governs it — EG default is 1 week). See 12_google_sso.md.
  # NOTE: Google only ISSUES a refresh token when the auth request carries access_type=offline; if sessions
  # still drop at ~1h after this, that's the cause (revoke the app at myaccount.google.com + re-login to
  # force a fresh consent, or confirm EG is sending offline access).
  refreshToken: true
  sessionTTL: "24h"
# One entry per SSO domain. `domain` becomes the label value, the cookieDomain, the google-sso.<domain>
# redirect host, and (with `issuer`) the callback host's cert. `allowlist` is per-domain (inline; written
# by the script — Deny is the default). Each entry renders its own callback Gateway + :443 listener +
# Certificate + HTTPRoute (one place per domain). The callback host cert uses `issuer` — keep it
# browser-trusted (prod) once the domain's HTTP-01 path is validated, because the login flow redirects
# the browser THROUGH it.
ssoDomains:
  - domain: pontiki.app
    issuer: letsencrypt-staging
    allowlist:
      - yassin.samoila@gmail.com
  - domain: yama.casa
    issuer: letsencrypt-staging
    allowlist:
      - yassin.samoil@gmail.com
      - lavinia.samoila@gmail.com
      - kostas.theocharis@live.de
      - Kostas.theocharis@live.de
      - satschock1996@yahoo.gr
      - sad.shock.is.happy@gmail.com
