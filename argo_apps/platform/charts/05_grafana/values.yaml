# Values for the 05_grafana wrapper chart. SINGLE SOURCE OF TRUTH, ArgoCD (and any local
# `helm template`) consume this. Chart version pinned in Chart.yaml. See 09_monitoring.md for the why.
#
# Grafana runs in the `monitoring` namespace (release name `grafana`), alongside the VictoriaMetrics +
# VictoriaLogs stack it visualises AND alerts on. Everything under `grafana:` is passed to the upstream
# grafana/grafana subchart (key == dependency name). Since the Prometheus -> VictoriaMetrics migration,
# Grafana also OWNS alerting (no Alertmanager, no vmalert): datasources, contact point, notification
# policy and alert rules are all provisioned here as code.
grafana:
  # No persistent storage (explicit request). Ephemeral pod, the datasources, dashboards and alert rules
  # are all re-provisioned on every start (from these values + the k8s-stack's emitted dashboard
  # ConfigMaps). TRADE-OFF: alert *state* (firing history, silences) and any UI-created dashboards reset
  # on restart; rules themselves survive because they are file-provisioned. See 09_monitoring.md.
  persistence:
    enabled: false

  # Pinned so the chart stops generating a random admin-password each render (churns checksum/secret,
  # rolls the pod every sync). Value irrelevant, login is disabled.
  adminUser: admin
  adminPassword: raspi-cluster

  # Grafana's OWN auth is OFF, the gateway Google SSO allowlist (this chart's own `sso: pontiki.app` edge
  # route, see the `ingress:` block below, + the 04_google_sso SecurityPolicy) is the only barrier, exactly
  # like the vmui/VictoriaLogs UIs.
  # Every request arrives already authenticated at the edge, so we serve it as an anonymous Admin: no
  # second login, full functionality. dotted keys (`auth.anonymous` etc.) are grafana.ini SECTION names.
  grafana.ini:
    # Quiet Grafana's INFO chatter (per-poll "Plugin Request Completed" datasource calls, cleanup &
    # update-check). WARN keeps errors. No HTTP access logs lost, inbound traffic is logged by the
    # envoy gateway, which stays at INFO on purpose.
    log:
      level: warn
    server:
      domain: grafana.ops.pontiki.app
      root_url: https://grafana.ops.pontiki.app
    auth:
      disable_login_form: true       # no built-in login, SSO is the front door
    auth.anonymous:
      enabled: true
      org_name: Main Org.
      org_role: Admin                # everyone who clears the SSO allowlist gets full admin
    auth.basic:
      enabled: false                 # no basic-auth path either

  # GF_NTFY_TOKEN <- the sealed grafana-ntfy Secret (key `token`), referenced (env-interpolated) by the ntfy
  # webhook contact point below as ${GF_NTFY_TOKEN}, so the write token never lands in git. The Secret is
  # created by the committed SealedSecret (templates/grafana-ntfy-sealedsecret.yaml), written by 10_ntfy_auth.sh.
  envValueFrom:
    GF_NTFY_TOKEN:
      secretKeyRef:
        name: grafana-ntfy
        key: token
        optional: true   # so Grafana starts before 10_ntfy_auth.sh seals the token; the ntfy contact point just
                         # fails to publish (auth rejected) until the SealedSecret lands and the pod restarts

  # The VictoriaLogs datasource is NOT built in (unlike Loki), install the signed plugin (commercial
  # signature, so no allow-unsigned needed). Version pinned; the space-separated form pins the version via
  # grafana-cli. The VictoriaMetrics datasource is the built-in `prometheus` type, no plugin required.
  plugins:
    - victoriametrics-logs-datasource 0.29.0

  # Provisioned datasources (replaces the old sidecar-fed Prometheus datasource ConfigMap). UIDs are PINNED
  # and deliberately match the k8s-stack's defaults (`VictoriaMetrics` / `VictoriaLogs`) so BOTH the
  # synced default dashboards AND the alert rules below resolve their datasource. See 09_monitoring.md.
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: VictoriaMetrics
          type: prometheus
          uid: VictoriaMetrics
          access: proxy
          url: http://vmsingle-victoria-metrics-k8s-stack.monitoring.svc:8428
          isDefault: true
          jsonData:
            # VM is PromQL-compatible; mark it so Grafana enables the right query editor features.
            prometheusType: Prometheus
        - name: VictoriaLogs
          type: victoriametrics-logs-datasource
          uid: VictoriaLogs
          access: proxy
          url: http://vlsingle-victoria-logs.monitoring.svc:9428

  # Dashboards: keep the sidecar (it ingests the k8s-stack's emitted `grafana_dashboard` ConfigMaps across
  # ALL namespaces). Datasources sidecar is OFF, datasources are provisioned directly above now.
  sidecar:
    # Right-size the dashboard sidecar per KRR (applies to all sidecar containers in the pod).
    resources:
      requests: {cpu: 10m, memory: 96Mi}
      limits: {memory: 128Mi}
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
    datasources:
      enabled: false

  # ---- Unified alerting (Grafana OWNS it: contact point + policy + rules) --------------------------
  # File-provisioned (https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/).
  # Metrics rules query the `VictoriaMetrics` datasource (PromQL); the log rule queries `VictoriaLogs`
  # (LogsQL). Recording rules from kube-prometheus-stack are gone (no vmalert), so expressions are inlined.
  alerting:
    # Contact point: an ntfy webhook that JSON-publishes to the in-cluster ntfy Service (05_ntfy). The write
    # token is env-interpolated from the sealed grafana-ntfy Secret (${GF_NTFY_TOKEN}), never in git. A Custom
    # Payload builds ntfy's JSON body (the webhook has no header field, so title/priority/tags go in the body).
    # The whole alerting block is Helm-tpl'd, so the inner {{ }} are wrapped in ONE Helm raw-string escape
    # ({{` … `}}) — Helm outputs them literally for Grafana's notifier to render. See 09_monitoring.md.
    contactpoints.yaml:
      apiVersion: 1
      contactPoints:
        - orgId: 1
          name: ntfy
          receivers:
            - uid: ntfy-webhook
              type: webhook
              settings:
                url: http://ntfy.monitoring.svc.cluster.local:8080/   # in-cluster JSON publish (topic is in the body)
                httpMethod: POST
                authorization_scheme: Bearer
                authorization_credentials: ${GF_NTFY_TOKEN}           # sealed write token, env-interpolated; never committed
                maxAlerts: 0                                          # no cap on alerts bundled per notification
                payload:
                  # severity -> ntfy priority (critical=5 / warning=4 / else=3) + a matching tag (ntfy renders known tags as emoji).
                  template: |
                    {{`{
                      "topic": "cluster-alerts",
                      "title": "{{ .Status | toUpper }}: {{ index .CommonLabels "alertname" }}",
                      "message": "{{ if index .CommonAnnotations "summary" }}{{ index .CommonAnnotations "summary" }}{{ else }}{{ index .CommonLabels "alertname" }}{{ end }}",
                      "priority": {{ if eq (index .CommonLabels "severity") "critical" }}5{{ else if eq (index .CommonLabels "severity") "warning" }}4{{ else }}3{{ end }},
                      "tags": ["{{ index .CommonLabels "severity" }}"]
                    }`}}
    policies.yaml:
      apiVersion: 1
      policies:
        - orgId: 1
          receiver: ntfy
          group_by: [alertname, namespace]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
    rules.yaml:
      apiVersion: 1
      groups:
        - orgId: 1
          name: cluster-health
          folder: raspi-cluster
          interval: 1m
          rules:
            - uid: node-not-ready
              title: Node NotReady
              condition: C
              for: 5m
              labels: {severity: critical}
              annotations:
                summary: 'Node {{`{{ $labels.node }}`}} is NotReady'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (node) (kube_node_status_condition{condition="Ready",status="true"} == bool 0)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            - uid: node-high-memory
              title: Node high memory usage
              condition: C
              for: 10m
              labels: {severity: warning}
              annotations:
                summary: 'Node {{`{{ $labels.instance }}`}} memory usage above 90%'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [90]}
            - uid: node-high-cpu
              title: Node high CPU saturation
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'Node {{`{{ $labels.instance }}`}} CPU above 90%'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])))'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [90]}
            # NOTE: the old `pod-crashloop` (warning-always) rule was REMOVED — it's superseded by the
            # criticality-aware `container-waiting-fatal` in the workload-outages group below (fires critical for
            # labeled-critical components, warning otherwise). See 09_monitoring.md (alerting severity model).
            - uid: pvc-nearly-full
              title: PVC nearly full
              condition: C
              for: 10m
              labels: {severity: warning}
              annotations:
                summary: 'PVC {{`{{ $labels.namespace }}`}}/{{`{{ $labels.persistentvolumeclaim }}`}} above 85% used'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '100 * kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [85]}
            - uid: target-down
              title: Scrape target down
              condition: C
              for: 10m
              labels: {severity: warning}
              annotations:
                summary: 'Target {{`{{ $labels.job }}`}} / {{`{{ $labels.instance }}`}} is down'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (job, instance) (up == bool 0)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            # ---- node capacity/health (node-exporter + kube-state) — all warning (infra headroom, not workload down)
            # Real disks only: Talos exposes ~19 tmpfs/rootfs mounts; the xfs mounts are /var, /var/mnt/localpath
            # (local-path/CNPG), /var/mnt/longhorn. `instance` is the node IP:9100 (node-exporter has no `node` label).
            - uid: node-disk-space
              title: Node disk almost full
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'Disk {{`{{ $labels.mountpoint }}`}} on {{`{{ $labels.instance }}`}} above 85% used'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '100 * (1 - node_filesystem_avail_bytes{fstype=~"ext4|xfs"} / node_filesystem_size_bytes{fstype=~"ext4|xfs"})'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [85]}
            # Inode exhaustion fills a disk that still has free bytes (many small files) — separate signal.
            - uid: node-disk-inodes
              title: Node disk inodes almost exhausted
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'Inodes on {{`{{ $labels.mountpoint }}`}} / {{`{{ $labels.instance }}`}} above 85% used'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '100 * (1 - node_filesystem_files_free{fstype=~"ext4|xfs"} / node_filesystem_files{fstype=~"ext4|xfs"})'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [85]}
            # Predictive: fires when a disk (already <50% free) will hit zero within 24h at the last 6h trend.
            # A yields the predicted free bytes; threshold `lt 0` = will run out. Early warning before disk-full.
            - uid: node-disk-fill-predict
              title: Node disk will fill within 24h
              condition: C
              for: 30m
              labels: {severity: warning}
              annotations:
                summary: 'Disk {{`{{ $labels.mountpoint }}`}} on {{`{{ $labels.instance }}`}} will fill within 24h at current rate'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 21600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'predict_linear(node_filesystem_avail_bytes{fstype=~"ext4|xfs"}[6h], 86400) < 0 and (node_filesystem_avail_bytes{fstype=~"ext4|xfs"} / node_filesystem_size_bytes{fstype=~"ext4|xfs"}) < 0.5'
                - refId: B
                  relativeTimeRange: {from: 21600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 21600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: lt, params: [0]}
            # Memory COMMITTED: sum of pod memory requests / node allocatable. High commit => scheduler can't
            # place more + eviction risk if actual use spikes. (requests + allocatable both carry `node` here.)
            - uid: node-memory-committed
              title: Node memory requests committed >80%
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'Node {{`{{ $labels.node }}`}} memory requests committed above 80% of allocatable'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '100 * sum by (node) (kube_pod_container_resource_requests{resource="memory"}) / sum by (node) (kube_node_status_allocatable{resource="memory"})'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [80]}
            # Kubelet-reported node pressure conditions (kernel is squeezing mem/disk/PIDs) — imminent evictions.
            - uid: node-pressure
              title: Node under resource pressure
              condition: C
              for: 5m
              labels: {severity: warning}
              annotations:
                summary: 'Node {{`{{ $labels.node }}`}} reports {{`{{ $labels.condition }}`}}'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (node, condition) (kube_node_status_condition{condition=~"MemoryPressure|DiskPressure|PIDPressure", status="true"})'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            # 3-node headroom: total pod memory requests exceed capacity-minus-largest-node => a single node loss
            # can't be absorbed (survivors can't fit the evacuated pods). Warning: reduce requests or add capacity.
            - uid: cluster-memory-overcommit
              title: Cluster can't tolerate one node loss (memory)
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'Cluster memory requests exceed capacity minus one node — a node loss would not fit'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'sum(kube_pod_container_resource_requests{resource="memory"}) > (sum(kube_node_status_allocatable{resource="memory"}) - max(kube_node_status_allocatable{resource="memory"}))'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
        # Off-cluster Redis RDB backups (the single central CronJob `redis-backup` in ns redis-backup, from the
        # 07_redis_backup app). vmalert is off so VMRules are inert — these live here (the only path that fires)
        # and key off the CronJob/Job NAME via kube-state-metrics. Job-level, not per-instance: which instance
        # failed is in the job's stdout (VictoriaLogs). See docs/13_backups.md.
        - orgId: 1
          name: backups
          folder: raspi-cluster
          interval: 1m
          rules:
            - uid: redis-backup-failed
              title: Redis backup job failed
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'Redis backup job {{`{{ $labels.namespace }}`}}/{{`{{ $labels.job_name }}`}} failed'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (namespace, job_name) (kube_job_status_failed{namespace="redis-backup", job_name=~"redis-backup-.+"})'  # kube_job_status_failed (this KSM has no kube_job_failed{condition=...})
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            # Staleness: no successful backup recently. `last_successful_time > 0` keeps it quiet before the first
            # run (absent series => NoData => OK). 129600s = 36h (daily + slack, matching CNPG); raise it if you
            # set a slower schedule in the 07_redis_backup values. VERIFY kube_cronjob_status_last_successful_time
            # exists in the running kube-state-metrics at apply time. See docs/13_backups.md.
            - uid: redis-backup-stale
              title: Redis backup is stale
              condition: C
              for: 30m
              labels: {severity: warning}
              annotations:
                summary: 'Redis backup {{`{{ $labels.namespace }}`}}/{{`{{ $labels.cronjob }}`}} has no success in >36h'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'time() - max by (namespace, cronjob) (kube_cronjob_status_last_successful_time{namespace="redis-backup", cronjob="redis-backup"} > 0)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [129600]}
            # Native Longhorn volume backups (daily/weekly RecurringJobs on the longhorn-r2-retained-with-backups class, 02_longhorn +
            # 16_longhorn_backup.sh). Longhorn's ServiceMonitor is enabled (02_longhorn metrics.serviceMonitor), so
            # these scrape via VictoriaMetrics like the redis rules. Per-volume; the volume is in $labels.volume.
            # See docs/13_backups.md.
            - uid: longhorn-backup-failed
              title: Longhorn backup failed
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'Longhorn backup for volume {{`{{ $labels.volume }}`}} is in Error state'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (volume) (longhorn_backup_state == 4)'  # 4 = Error (0=New,1=Pending,2=InProgress,3=Completed)
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            # Staleness: a backed-up volume hasn't had a successful backup recently — a silently stopped
            # RecurringJob produces NO Error state, so this is the only signal. 172800s = 48h (daily + slack).
            # VERIFY the metric name longhorn_volume_last_backup_at exists in the running Longhorn at apply time (the
            # Longhorn docs list a per-volume "last backup" timestamp but not the exact name); a wrong name => NoData =>
            # OK (silent, never a false alert), so adjust if it never fires after a known-good backup.
            - uid: longhorn-backup-stale
              title: Longhorn backup is stale
              condition: C
              for: 30m
              labels: {severity: warning}
              annotations:
                summary: 'Longhorn volume {{`{{ $labels.volume }}`}} has no successful backup in >48h'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'time() - max by (volume) (longhorn_volume_last_backup_at > 0)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [172800]}
            # ---- CNPG + VM/VL backup health -----------------------------------------------------------------
            # Ported from the former chart PrometheusRules (08_vm_backup + pg-cluster), now DISABLED: vmalert is
            # off so their converted VMRules never fired — Grafana is the only path. Metric names lifted verbatim
            # from those rules. See docs/13_backups.md.
            - uid: vm-backup-failed
              title: VM/VL backup job failed
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'VM/VL backup Job {{`{{ $labels.namespace }}`}}/{{`{{ $labels.job_name }}`}} failed'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (namespace, job_name) (kube_job_status_failed{namespace="monitoring", job_name=~"vm-backup.*"})'  # kube_job_status_failed (this KSM has no kube_job_failed{condition=...})
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            # Staleness: no successful run in >36h (129600s; daily + slack). `> 0` guards the metric being
            # absent/zero before the first success (absent => NoData => OK). Catches a suspended/never-scheduled job.
            - uid: vm-backup-stale
              title: VM/VL backup is stale
              condition: C
              for: 30m
              labels: {severity: warning}
              annotations:
                summary: 'VM/VL backup {{`{{ $labels.namespace }}`}}/{{`{{ $labels.cronjob }}`}} has no success in >36h'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'time() - max by (namespace, cronjob) (kube_cronjob_status_last_successful_time{namespace="monitoring", cronjob="vm-backup"} > 0)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [129600]}
            # WAL archiving to S3 falling behind/failing (load-bearing: a stalled archiver fills pg_wal -> primary
            # read-only). `value="ready"` counts not-yet-archived segments; sustained >0 for 15m = not keeping up.
            # Cluster-wide (dropped the per-instance pod regex the PrometheusRule used). See docs/13_backups.md.
            - uid: cnpg-wal-archive-failing
              title: CNPG WAL archiving to S3 failing
              condition: C
              for: 15m
              labels: {severity: critical}
              annotations:
                summary: 'CNPG {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}: WAL archiving to S3 is failing'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (namespace, pod) (cnpg_collector_pg_wal_archive_status{value="ready"})'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            # No recent base backup (>36h). The timestamp metric MAY stay 0 under the barman plugin, so `> 0`
            # guards it: never populated => won't fire (we lean on the WAL alert then). See docs/13_backups.md.
            - uid: cnpg-backup-too-old
              title: CNPG base backup is stale
              condition: C
              for: 30m
              labels: {severity: warning}
              annotations:
                summary: 'CNPG {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}: last base backup is >36h old'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'time() - max by (namespace, pod) (cnpg_collector_last_available_backup_timestamp > 0)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [129600]}
        # CNPG operational health, ported from the upstream cnpg/cluster PrometheusRules (now disabled). Curated to
        # what fires meaningfully on this 1-2 instance, streaming-only topology: connection saturation + physical
        # replication lag. Exprs + thresholds lifted verbatim (per-instance pod regex dropped for cluster-wide).
        # `CNPGClusterOffline` is intentionally NOT ported — the generic `target-down` rule already catches a down
        # CNPG pod (its scrape target goes down); and the HA / zone-spread / same-node / logical-replication rules
        # are dropped (need 3+ instances / zone labels / logical replication this cluster doesn't use). See docs/13_backups.md.
        - orgId: 1
          name: cnpg-health
          folder: raspi-cluster
          interval: 1m
          rules:
            - uid: cnpg-high-connections-warning
              title: CNPG high connection usage
              condition: C
              for: 5m
              labels: {severity: warning}
              annotations:
                summary: 'CNPG {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} using >80% of max_connections'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'sum by (namespace, pod) (cnpg_backends_total) / max by (namespace, pod) (cnpg_pg_settings_setting{name="max_connections"}) * 100'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [80]}
            - uid: cnpg-high-connections-critical
              title: CNPG connection usage critical
              condition: C
              for: 5m
              labels: {severity: critical}
              annotations:
                summary: 'CNPG {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} using >95% of max_connections'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'sum by (namespace, pod) (cnpg_backends_total) / max by (namespace, pod) (cnpg_pg_settings_setting{name="max_connections"}) * 100'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [95]}
            # Physical replication lag (seconds). Only produces series when a standby exists (instances>=2);
            # absent => NoData => OK at a single instance. > 1s warning, > 15s critical (upstream thresholds).
            - uid: cnpg-replication-lag-warning
              title: CNPG physical replication lag
              condition: C
              for: 5m
              labels: {severity: warning}
              annotations:
                summary: 'CNPG {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} physical replication lag >1s'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (namespace, pod) (cnpg_pg_replication_lag)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [1]}
            - uid: cnpg-replication-lag-critical
              title: CNPG physical replication lag critical
              condition: C
              for: 5m
              labels: {severity: critical}
              annotations:
                summary: 'CNPG {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} physical replication lag >15s'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (namespace, pod) (cnpg_pg_replication_lag)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [15]}
        # ================================================================================================
        # GLOBAL WORKLOAD ALERTS (all namespaces, one rule each). Severity model, see 09_monitoring.md:
        #   OUTAGE-class (this group) = workload down / broken -> severity is DYNAMIC: `critical` when the
        #     firing object carries alert-criticality=critical (joined in via kube_<obj>_labels +
        #     group_left(label_alert_criticality); needs the KSM metricLabelsAllowlist in 05_vm_k8s_stack),
        #     else `warning`. Absent label => "" => warning.
        #   ANOMALY-class (next group) = degraded / saturating / about-to-break -> always `warning`.
        # The `spec>0 and available==0` ordering keeps the firing value >0 after the `* kube_<obj>_labels`
        # (value 1) multiply that attaches the criticality label.
        # ================================================================================================
        - orgId: 1
          name: workload-outages
          folder: raspi-cluster
          interval: 1m
          rules:
            - uid: deployment-not-available
              title: Deployment has no available replicas
              condition: C
              for: 5m
              labels:
                severity: '{{`{{ if eq $labels.label_alert_criticality "critical" }}critical{{ else }}warning{{ end }}`}}'
              annotations:
                summary: 'Deployment {{`{{ $labels.namespace }}`}}/{{`{{ $labels.deployment }}`}} has no available replicas'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '(kube_deployment_spec_replicas > 0 and kube_deployment_status_replicas_available == 0) * on(namespace, deployment) group_left(label_alert_criticality) kube_deployment_labels'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            - uid: statefulset-not-available
              title: StatefulSet has no ready replicas
              condition: C
              for: 5m
              labels:
                severity: '{{`{{ if eq $labels.label_alert_criticality "critical" }}critical{{ else }}warning{{ end }}`}}'
              annotations:
                summary: 'StatefulSet {{`{{ $labels.namespace }}`}}/{{`{{ $labels.statefulset }}`}} has no ready replicas'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '(kube_statefulset_replicas > 0 and kube_statefulset_status_replicas_ready == 0) * on(namespace, statefulset) group_left(label_alert_criticality) kube_statefulset_labels'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            - uid: daemonset-not-available
              title: DaemonSet has no available pods
              condition: C
              for: 5m
              labels:
                severity: '{{`{{ if eq $labels.label_alert_criticality "critical" }}critical{{ else }}warning{{ end }}`}}'
              annotations:
                summary: 'DaemonSet {{`{{ $labels.namespace }}`}}/{{`{{ $labels.daemonset }}`}} has no available pods'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '(kube_daemonset_status_desired_number_scheduled > 0 and kube_daemonset_status_number_available == 0) * on(namespace, daemonset) group_left(label_alert_criticality) kube_daemonset_labels'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            # Container stuck in a FATAL waiting reason (can't start). This is the criticality-critical path for
            # CNPG too (bespoke controller, no Deployment/StatefulSet): a crashlooping labeled CNPG/Redis pod pages
            # critical here. `reason` kept in the series for the summary; join on (namespace,pod) to kube_pod_labels.
            - uid: container-waiting-fatal
              title: Container stuck (crashloop / image / config)
              condition: C
              for: 15m
              labels:
                severity: '{{`{{ if eq $labels.label_alert_criticality "critical" }}critical{{ else }}warning{{ end }}`}}'
              annotations:
                summary: 'Container {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}/{{`{{ $labels.container }}`}} stuck: {{`{{ $labels.reason }}`}}'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '(max by (namespace, pod, container, reason) (kube_pod_container_status_waiting_reason{reason=~"CrashLoopBackOff|ImagePullBackOff|ErrImagePull|CreateContainerConfigError|CreateContainerError|InvalidImageName"}) > 0) * on(namespace, pod) group_left(label_alert_criticality) kube_pod_labels'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
        # Anomaly / about-to-break / degraded — always `warning` (no criticality join). Symptoms; the
        # workload-outages group above is the `critical` path. See 09_monitoring.md.
        - orgId: 1
          name: workload-anomalies
          folder: raspi-cluster
          interval: 1m
          rules:
            - uid: container-oomkilled
              title: Container OOMKilled
              condition: C
              for: 2m
              labels: {severity: warning}
              annotations:
                summary: 'Container {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}/{{`{{ $labels.container }}`}} was OOMKilled'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1) and on(namespace, pod, container) (increase(kube_pod_container_status_restarts_total[10m]) > 0)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            - uid: container-high-restarts
              title: Container restarting frequently
              condition: C
              for: 5m
              labels: {severity: warning}
              annotations:
                summary: 'Container {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}/{{`{{ $labels.container }}`}} restarted >5 times in the last hour'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 3600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total[1h]))'
                - refId: B
                  relativeTimeRange: {from: 3600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 3600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [5]}
            - uid: container-cpu-throttling
              title: Container heavily CPU throttled
              condition: C
              for: 10m
              labels: {severity: warning}
              annotations:
                summary: 'Container {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}/{{`{{ $labels.container }}`}} CPU throttled >50% of the time'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'sum by (namespace, pod, container) (rate(container_cpu_cfs_throttled_periods_total{container!=""}[5m])) / sum by (namespace, pod, container) (rate(container_cpu_cfs_periods_total{container!=""}[5m]))'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0.5]}
            - uid: container-memory-near-limit
              title: Container near memory limit
              condition: C
              for: 10m
              labels: {severity: warning}
              annotations:
                summary: 'Container {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}/{{`{{ $labels.container }}`}} above 90% of its memory limit (OOM risk)'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (namespace, pod, container) (container_memory_working_set_bytes{container!=""}) / max by (namespace, pod, container) (kube_pod_container_resource_limits{resource="memory"} > 0)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0.9]}
            - uid: pod-pending
              title: Pod stuck Pending
              condition: C
              for: 20m
              labels: {severity: warning}
              annotations:
                summary: 'Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} stuck Pending/Unknown for >20m'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown"})'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            # Some (not all) replicas failing readiness. Excludes completed (Job) pods. Full outage is caught
            # by workload-outages (critical); this is the partial/degraded warning.
            - uid: pod-not-ready
              title: Pod not ready
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} not ready for >15m'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (namespace, pod) (kube_pod_status_ready{condition="false"} == 1) unless on(namespace, pod) (kube_pod_status_phase{phase="Succeeded"} == 1)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            - uid: replicaset-degraded
              title: ReplicaSet missing ready replicas
              condition: C
              for: 30m
              labels: {severity: warning}
              annotations:
                summary: 'ReplicaSet {{`{{ $labels.namespace }}`}}/{{`{{ $labels.replicaset }}`}} has fewer ready replicas than desired'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '(kube_replicaset_spec_replicas > 0) and (kube_replicaset_status_ready_replicas < kube_replicaset_spec_replicas)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            - uid: deployment-degraded
              title: Deployment degraded (some replicas unavailable)
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'Deployment {{`{{ $labels.namespace }}`}}/{{`{{ $labels.deployment }}`}} has fewer available replicas than desired'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: '(kube_deployment_status_replicas_available > 0) and (kube_deployment_status_replicas_available < kube_deployment_spec_replicas)'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            - uid: deployment-generation-mismatch
              title: Deployment rollout stuck (generation mismatch)
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'Deployment {{`{{ $labels.namespace }}`}}/{{`{{ $labels.deployment }}`}} observed generation lags spec (rollout stuck)'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'kube_deployment_status_observed_generation != bool kube_deployment_metadata_generation'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            # HPA rules are DORMANT until an HPA exists (none today). Standard KSM metric names.
            - uid: hpa-at-max
              title: HPA at max replicas
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'HPA {{`{{ $labels.namespace }}`}}/{{`{{ $labels.horizontalpodautoscaler }}`}} at max replicas — can''t scale further'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'kube_horizontalpodautoscaler_status_current_replicas / kube_horizontalpodautoscaler_spec_max_replicas'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0.99]}
            - uid: hpa-scaling-blocked
              title: HPA unable to scale
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'HPA {{`{{ $labels.namespace }}`}}/{{`{{ $labels.horizontalpodautoscaler }}`}} can''t scale (AbleToScale/ScalingActive false)'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'max by (namespace, horizontalpodautoscaler) (kube_horizontalpodautoscaler_status_condition{condition=~"AbleToScale|ScalingActive", status="false"})'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            - uid: hpa-below-min
              title: HPA below min replicas
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'HPA {{`{{ $labels.namespace }}`}}/{{`{{ $labels.horizontalpodautoscaler }}`}} running below its min replicas'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'kube_horizontalpodautoscaler_spec_min_replicas - kube_horizontalpodautoscaler_status_current_replicas'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
        # Storage + TLS health — all warning. cert-manager (ingress TLS), Longhorn volume robustness, PV/PVC phase.
        - orgId: 1
          name: storage-tls-health
          folder: raspi-cluster
          interval: 1m
          rules:
            # A = seconds until expiry; threshold `lt` 1209600 (14d). Also fires once already expired (negative).
            - uid: cert-expiring-soon
              title: TLS certificate expiring soon
              condition: C
              for: 1h
              labels: {severity: warning}
              annotations:
                summary: 'Certificate {{`{{ $labels.exported_namespace }}`}}/{{`{{ $labels.name }}`}} expires in <14d'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'certmanager_certificate_expiration_timestamp_seconds - time()'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: lt, params: [1209600]}
            # `== bool 0` -> 1 when the cert's Ready=True condition is not 1 (i.e. not ready).
            - uid: cert-not-ready
              title: TLS certificate not ready
              condition: C
              for: 1h
              labels: {severity: warning}
              annotations:
                summary: 'Certificate {{`{{ $labels.exported_namespace }}`}}/{{`{{ $labels.name }}`}} is not Ready'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'certmanager_certificate_ready_status{condition="True"} == bool 0'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            # Longhorn robustness: 0=unknown 1=healthy 2=degraded 3=faulted.
            - uid: longhorn-volume-degraded
              title: Longhorn volume degraded
              condition: C
              for: 10m
              labels: {severity: warning}
              annotations:
                summary: 'Longhorn volume {{`{{ $labels.volume }}`}} (pvc {{`{{ $labels.pvc }}`}}) is degraded'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'longhorn_volume_robustness == 2'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            - uid: longhorn-volume-faulted
              title: Longhorn volume faulted
              condition: C
              for: 1m
              labels: {severity: warning}
              annotations:
                summary: 'Longhorn volume {{`{{ $labels.volume }}`}} (pvc {{`{{ $labels.pvc }}`}}) is FAULTED (data at risk)'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'longhorn_volume_robustness == 3'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            - uid: pv-errors
              title: PersistentVolume in error state
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'PersistentVolume {{`{{ $labels.persistentvolume }}`}} is {{`{{ $labels.phase }}`}}'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'kube_persistentvolume_status_phase{phase=~"Failed|Pending"} == 1'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
            - uid: pvc-pending
              title: PersistentVolumeClaim unbound
              condition: C
              for: 15m
              labels: {severity: warning}
              annotations:
                summary: 'PVC {{`{{ $labels.namespace }}`}}/{{`{{ $labels.persistentvolumeclaim }}`}} is {{`{{ $labels.phase }}`}}'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: VictoriaMetrics
                  model:
                    refId: A
                    instant: true
                    expr: 'kube_persistentvolumeclaim_status_phase{phase=~"Pending|Lost"} == 1'
                - refId: B
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [0]}
    # Log-based alert in its OWN file so a VL-datasource model mismatch can't break the metrics rules
    # above. VERIFY the query model against the live victoriametrics-logs-datasource at apply time (the
    # plugin's alerting model field names can change between versions). See 09_monitoring.md.
    rules-logs.yaml:
      apiVersion: 1
      groups:
        - orgId: 1
          name: logs-health
          folder: raspi-cluster
          interval: 1m
          rules:
            - uid: high-error-log-rate
              title: High error-log rate
              condition: C
              for: 5m
              labels: {severity: warning}
              annotations:
                summary: 'More than 100 error logs in the last 5m across the cluster'
              noDataState: OK
              execErrState: Error
              data:
                - refId: A
                  relativeTimeRange: {from: 300, to: 0}
                  datasourceUid: VictoriaLogs
                  model:
                    refId: A
                    queryType: stats
                    expr: '(error OR level:error OR level:ERROR) | stats count() as logs'
                - refId: B
                  relativeTimeRange: {from: 300, to: 0}
                  datasourceUid: __expr__
                  model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
                - refId: C
                  relativeTimeRange: {from: 300, to: 0}
                  datasourceUid: __expr__
                  model:
                    refId: C
                    type: threshold
                    expression: B
                    datasource: {type: __expr__, uid: __expr__}
                    conditions:
                      - type: query
                        evaluator: {type: gt, params: [100]}

  # Default ClusterIP Service on :80 -> container :3000, what this chart's own grafana edge backendRef
  # targets (the `ingress:` block below; name `grafana`, port 80).
  service:
    enabled: true
    type: ClusterIP
    port: 80

  # No Helm test Pod, it's a `helm.sh/hook: test` resource ArgoCD ignores anyway; drop it so the chart
  # ships only the running workload.
  testFramework:
    enabled: false

  # Modest footprint for a Pi 5.
  resources:
    requests:
      cpu: 10m
      memory: 192Mi
    limits:
      memory: 320Mi

  # Spread across Pi nodes if `replicas` is ever raised. PREFERRED + hostname: bare Pi nodes have no zone
  # label, and soft so a scale-up never wedges as Pending on the 3-node cluster. No-op at the default single
  # replica. NOTE: this only pre-stages placement — actually running replicas>1 first needs unified-alerting
  # HA (grafana.ini `unified_alerting.ha_*`), else each replica evaluates rules independently and double-sends
  # email; and with persistence off, UI-created annotations/silences aren't shared. See 09_monitoring.md.
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: grafana
            topologyKey: kubernetes.io/hostname

