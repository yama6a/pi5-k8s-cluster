# POD-SCOPED to grafana. NOT namespace-wide: vmagent shares the monitoring namespace and must stay
# unrestricted. Every request is already SSO-authenticated at the Envoy edge. See 04_networking.md /
# 09_monitoring.md.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  ingress:
    # UI via the Envoy edge -> :80.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
            app.kubernetes.io/managed-by: envoy-gateway
      toPorts:
        - ports:
            - { port: "80", protocol: TCP }
  egress:
    # DNS (CoreDNS).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
    # Datasource reads: VictoriaMetrics :8428, VictoriaLogs :9428.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: vmsingle
      toPorts:
        - ports:
            - { port: "8428", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: vlsingle
      toPorts:
        - ports:
            - { port: "9428", protocol: TCP }
    # ntfy webhook (in-cluster) — publish firing alerts to the ntfy notification server (05_ntfy). REPLACES the
    # former Gmail SMTP :587 egress (email notifier retired in favour of ntfy mobile push).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: ntfy
      toPorts:
        - ports:
            - { port: "8080", protocol: TCP }
    # Datasource plugin download at first boot.
    - toEntities: [world]
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
