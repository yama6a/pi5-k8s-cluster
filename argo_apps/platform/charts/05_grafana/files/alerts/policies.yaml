apiVersion: 1
policies:
  - orgId: 1
    receiver: ntfy
    # '...' = group by ALL labels -> one notification per faulty resource (not per alertname+namespace). So the
    # ntfy title can name exactly one resource, and two instances of the same alert don't collapse into one nameless
    # notification (the old [alertname, namespace] grouping dropped the per-pod summary from CommonAnnotations).
    group_by: ['...']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
