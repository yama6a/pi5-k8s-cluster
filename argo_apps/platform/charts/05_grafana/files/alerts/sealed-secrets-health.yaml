apiVersion: 1
groups:
  # Sealed-secrets controller health. A down/unsynced controller silently blocks ALL SealedSecret decryption,
  # so nothing that depends on a sealed secret can (re)start — worth paging. Static `critical` (like
  # longhorn-manager-down): infra whose failure is cluster-wide, not a per-workload outage. Replaces the
  # chart's bundled PrometheusRule (inert here — vmalert is off; 02_sealed_secrets). See 09_monitoring.md.
  - orgId: 1
    name: sealed-secrets-health
    folder: raspi-cluster
    interval: 1m
    rules:
      # condition_info == 1 means the controller is Synced; 0 or -1 = at least one SealedSecret not reconciling.
      - uid: sealed-secrets-not-ready
        title: Sealed Secrets controller not ready
        condition: C
        for: 10m
        labels: {severity: critical}
        annotations:
          summary: 'Sealed Secrets controller is not Synced — secret decryption is blocked'
          description: |
            • the sealed-secrets controller can't reconcile SealedSecrets — dependent pods can't get their Secrets
            • check: kubectl -n sealed-secrets logs deploy/sealed-secrets
            • verify the controller is Running + its signing key exists
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: VictoriaMetrics
            model:
              refId: A
              instant: true
              expr: 'sum(sealed_secrets_controller_condition_info != 1)'
          - refId: B
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: __expr__
            model: {refId: B, type: reduce, expression: A, reducer: last, datasource: {type: __expr__, uid: __expr__}}
          - refId: C
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              datasource: {type: __expr__, uid: __expr__}
              conditions:
                - type: query
                  evaluator: {type: gt, params: [0]}
