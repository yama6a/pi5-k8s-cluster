apiVersion: v2
name: grafana
description: >-
  Wrapper chart for standalone Grafana on the Talos/Raspberry Pi 5 cluster, the dashboards/Explore UI
  AND the alerting owner for the monitoring core (no Alertmanager, no vmalert). Single source of truth
  for the Grafana chart version (this file) and its values (values.yaml, under the `grafana:` key).
  Grafana's OWN auth is off (anonymous Admin, no login form), the only gate is Google SSO applied by the
  consolidated platform-ingress app (06_platform_ingress), which fronts grafana.ops.pontiki.app alongside the
  other platform UIs; this chart no longer ships its own edge. No persistence (ephemeral pod); the VictoriaMetrics + VictoriaLogs datasources
  (pinned UIDs) and the contact point / notification policy / alert rules are all PROVISIONED as code here
  (alerts go to self-hosted ntfy; the write token comes from the sealed grafana-ntfy Secret). Curated
  dashboards still arrive as `grafana_dashboard` ConfigMaps via the sidecar (search-all-namespaces) from
  05_victoria_metrics_k8s_stack. The VictoriaLogs datasource is the signed victoriametrics-logs-datasource
  plugin (GF_INSTALL_PLUGINS). Delivered by ArgoCD via argo_apps/apps/05_grafana.yaml, wave 5, same as
  the stacks it reads from (05_victoria_metrics_k8s_stack, 05_victoria_logs). See 09_monitoring.md.
type: application
version: 0.1.0                 # this wrapper chart's own version

dependencies:
  - name: grafana
    version: "10.5.15"        # grafana/grafana chart, THE single source for the pin
    repository: https://grafana.github.io/helm-charts
