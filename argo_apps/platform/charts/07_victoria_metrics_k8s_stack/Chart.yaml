apiVersion: v2
name: victoria-metrics-k8s-stack
description: >-
  Wrapper chart for the monitoring CORE, victoria-metrics-k8s-stack: a single-replica VMSingle (metrics
  TSDB, Longhorn-backed, 180d retention), a VMAgent that scrapes every VMServiceScrape/VMPodScrape in the
  cluster (including the ones the operator converts from third-party ServiceMonitors), node-exporter +
  kube-state-metrics, and the curated default dashboards (emitted as `grafana_dashboard` ConfigMaps for
  the standalone Grafana sidecar). This is "shape B": the bundled VM operator, vmalert, Alertmanager and
  Grafana are all OFF, the operator runs standalone (01_victoria_metrics_operator) and alerting is owned
  by the standalone Grafana (07_grafana). CRDs come from wave 0 (00_victoria_metrics_operator_crds).
  Single source of truth for the chart version (this file) and all config (values.yaml, under the
  `victoria-metrics-k8s-stack:` key). Replaces the retired kube-prometheus-stack. Delivered by ArgoCD via
  argo_apps/apps/07_victoria_metrics_k8s_stack.yaml, wave 7 (after the operator wave 1 + Longhorn wave 2).
  See 15_monitoring.md.
type: application
version: 0.1.0                 # this wrapper chart's own version
appVersion: "v1.146.0"        # VictoriaMetrics version the pinned chart ships (mirrors the dependency)

dependencies:
  - name: victoria-metrics-k8s-stack
    version: "0.85.5"         # VictoriaMetrics/victoria-metrics-k8s-stack, THE single source for the pin
    repository: https://victoriametrics.github.io/helm-charts/
