# cert-manager mints this UI's cert (HTTP-01 via the shared :80 listener) into the Secret this chart's own
# Gateway listener (templates/edge-gateway.yaml) references. In the gateway namespace, alongside that
# Gateway. STAGING by default — flip .Values.ingress.issuer to letsencrypt-prod once it issues (this is a
# browser-facing UI). Edge for this stack — folded in from the retired 07_monitoring_ingress. See 15_monitoring.md.
{{- with .Values.ingress }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .name }}
  namespace: {{ .gatewayNamespace }}
spec:
  secretName: {{ .tlsSecretName | quote }}
  dnsNames:
    - {{ .host | quote }}
  issuerRef:
    name: {{ .issuer | quote }}
    kind: ClusterIssuer
{{- end }}
