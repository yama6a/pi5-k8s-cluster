apiVersion: v2
name: argocd
description: >-
  Wrapper chart for ArgoCD on the Talos/Raspberry Pi 5 cluster, the GitOps engine
  that manages itself and every later app under argo_apps/. Single source of truth for
  the argo-cd chart version (this file) and its HA-lite values (values.yaml, under the
  `argo-cd:` key). Bootstrapped imperatively once by ../../../05_gitops/05_argocd.sh,
  then adopted and self-managed by ArgoCD against this same chart. See 05_gitops.md.
type: application
version: 0.1.0                 # this wrapper chart's own version

dependencies:
  - name: argo-cd
    version: "9.7.1"          # argoproj/argo-helm argo-cd chart, THE single source for the pin
    repository: https://argoproj.github.io/argo-helm
