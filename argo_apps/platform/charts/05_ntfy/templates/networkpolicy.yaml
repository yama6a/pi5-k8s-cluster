# POD-SCOPED default-deny for ntfy (a private notification server). Listing ingress AND egress makes the ntfy
# endpoints deny-by-default each way; allow only what's needed. Same audit-first rollout as the other lockdowns
# here (Cilium PolicyAuditMode + `hubble observe --verdict DROPPED,AUDIT` until clean, then enforce). Port 8080
# end-to-end. See 04_networking.md / 09_monitoring.md.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ntfy
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ntfy
  ingress:
    # :8080 — the Envoy edge serves the phone (subscribe), and the in-cluster Grafana webhook publishes alerts.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
            app.kubernetes.io/managed-by: envoy-gateway
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: grafana
      toPorts:
        - ports:
            - { port: "8080", protocol: TCP }
    # Kubelet TCP health probes hit the pod directly from the node.
    - fromEntities: [host, remote-node]
      toPorts:
        - ports:
            - { port: "8080", protocol: TCP }
  egress:
    # DNS (CoreDNS).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
