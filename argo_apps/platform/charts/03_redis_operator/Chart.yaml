apiVersion: v2
name: redis-operator
description: >-
  Wrapper chart for the OpsTree (ot-container-kit) Redis operator on the Talos/Raspberry Pi 5 cluster (the
  Kubernetes-native Redis controller — manages the Redis / RedisReplication / RedisCluster / RedisSentinel CRDs),
  PLUS the two Redis Longhorn StorageClasses (longhorn-redis-persistent / longhorn-redis-ephemeral) the shared
  lib/helm/redis-instance chart selects between via its `persistence` flag. The actual instances (single-node
  `Redis` CRs) are PER-WORKLOAD, rendered by redis-instance in the workloads tree. Single source of truth for the
  operator chart version (this file) and its values (values.yaml: the operator under the `redis-operator:` key,
  the two classes at top level). Delivered purely by ArgoCD via argo_apps/platform/apps/03_redis_operator.yaml at
  wave 3 — the operator alone would be a wave-2 leaf, but the bundled StorageClasses use the driver.longhorn.io
  provisioner, so the whole app lands after Longhorn (wave 2). The operator + redis images (quay.io/opstree/*) are
  multi-arch incl. arm64 (but the exporter needs a pinned recent tag — see the redis-instance chart). See 12_redis.md.
type: application
version: 0.1.0                 # this wrapper chart's own version
appVersion: "0.25.0"          # OpsTree redis-operator version the pinned chart ships (mirrors the dependency)

dependencies:
  - name: redis-operator
    version: "0.25.0"         # ot-helm/redis-operator chart, THE single source for the pin
    repository: https://ot-container-kit.github.io/helm-charts/
