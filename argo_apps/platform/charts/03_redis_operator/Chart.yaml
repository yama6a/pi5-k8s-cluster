apiVersion: v2
name: redis-operator
description: >-
  Wrapper chart for the OpsTree (ot-container-kit) Redis operator on the Talos/Raspberry Pi 5 cluster (the
  Kubernetes-native Redis controller — manages the Redis / RedisReplication / RedisCluster / RedisSentinel CRDs).
  The Longhorn StorageClasses redis-instance selects between (longhorn-r2-retained / longhorn-r2-ephemeral) are
  shipped by 02_longhorn now, not here. The actual instances (single-node `Redis` CRs) are PER-WORKLOAD, rendered by
  redis-instance in the workloads tree. Single source of truth for the operator chart version (this file) and its
  values (values.yaml, under the `redis-operator:` key). Delivered purely by ArgoCD via
  argo_apps/platform/apps/03_redis_operator.yaml — a plain leaf (kept at wave 3 to avoid renumbering; it no longer
  depends on Longhorn now that the classes moved out). The operator + redis images (quay.io/opstree/*) are
  multi-arch incl. arm64 (but the exporter needs a pinned recent tag — see the redis-instance chart). See 12_redis.md.
type: application
version: 0.1.0                 # this wrapper chart's own version

dependencies:
  - name: redis-operator
    version: "0.25.0"         # ot-helm/redis-operator chart, THE single source for the pin
    repository: https://ot-container-kit.github.io/helm-charts/
