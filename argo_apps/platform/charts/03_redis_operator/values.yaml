# Values for the 03_redis_operator chart (the OpsTree operator + the two Redis StorageClasses). SINGLE SOURCE OF
# TRUTH, ArgoCD (and any local `helm template`) consume this. Chart version pinned in Chart.yaml. See 12_redis.md.
#
# The operator runs in its own `redis-operator` namespace (CreateNamespace=true in the Application) and watches
# ALL namespaces (cluster RBAC scope, the chart default), so per-workload `Redis` CRs in the workloads tree are
# reconciled. No privileged PSA needed: the controller + the redis pods it spawns run non-root (uid 1000).
#
# Everything under `redis-operator:` is passed to the upstream ot-helm/redis-operator subchart (key == dependency name).
redis-operator:
  redisOperator:
    # Admission webhook DISABLED. It only guards the master-slave anti-affinity feature (RedisReplication),
    # which we don't use — we run standalone `Redis` only. Off means there's no webhook serving-cert to manage at
    # all (no cert-manager dependency). (Even with webhook=true + certmanager.enabled=false the chart would
    # self-sign, but we don't need the feature.)
    webhook: false
    # Expose the controller's /metrics endpoint (:8080). No PodMonitor is shipped from here (the upstream chart
    # has no toggle for one, and the signal that matters is the per-instance redis-exporter, scraped by the
    # redis-instance ServiceMonitor); this just keeps the endpoint live for a future PodMonitor. See 12_redis.md.
    metrics:
      enabled: true

  # Modest footprint for the single controller pod on the Pi 5s (trimmed from the chart's 500m/500Mi default);
  # it only reconciles CRs — the real work lives in the redis pods (the workloads). Fully specified (not just
  # memory) because Helm deep-merges this map: an omitted key would silently inherit the chart's 500m default.
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  # Leader-elected (one active + standby). If `replicas` is ever raised, keep the standby off the active's
  # node. PREFERRED + hostname: bare Pi nodes have no zone label, and soft so a scale-up never wedges as
  # Pending on the 3-node cluster. No-op at the chart's default single replica.
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: redis-operator
            topologyKey: kubernetes.io/hostname

# Storage: this app no longer ships its own StorageClasses. redis-instance selects between the shared Longhorn
# classes owned by 02_longhorn — longhorn-r2-ephemeral (Delete) for caches, longhorn-r2-retained (Retain) for
# durable instances — via its `persistence` flag. See 08_storage.md + 12_redis.md.
