# Vendored from rancher/local-path-provisioner v0.0.36, parameterized from values.yaml.
# This is the class CNPG points at (workloads/charts/sample_workload). Node-local: a PV lives only on the
# node where its consumer pod is scheduled, hence WaitForFirstConsumer. Not the cluster default —
# Longhorn keeps that; CNPG opts in by name. See 18_local_path_provisioner.md.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.storageClass.name }}
  {{- if .Values.storageClass.defaultClass }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
  {{- end }}
provisioner: rancher.io/local-path
volumeBindingMode: {{ .Values.storageClass.volumeBindingMode }}
reclaimPolicy: {{ .Values.storageClass.reclaimPolicy }}
