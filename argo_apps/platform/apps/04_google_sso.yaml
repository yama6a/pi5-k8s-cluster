# ArgoCD Application for the Google-SSO PLATFORM layer (argo_apps/charts/04_google_sso/): the shared OIDC
# callback hosts (google-sso.<domain>, one per domain, each with its own SecurityPolicy that completes the
# token exchange) + the shared whoami backend + the sealed OAuth client secret. The per-APP allowlists no
# longer live here; each ingress (platform-ingress, each workload) carries its own. See 07_ingress.md.
#
# AUTOMATED (prune + selfHeal): a safe leaf, it owns no CRDs and can't cut the cluster off its network.
# Its only secret (the OAuth client secret) comes from a committed SealedSecret (unsealed by the wave-2
# controller); the raw Secret is not in git, so prune never touches it.
#
# sync-wave "4": after the gateway (wave 3, the shared :80 Gateway + ClusterIssuers its callback certs
# solve through) and sealed-secrets (wave 2, unseals the client secret) and Envoy Gateway (wave 1, owns
# the SecurityPolicy CRD). It sits BEFORE the app ingresses (platform-ingress wave 8, workloads later), so
# every protected app's redirectURL callback host already exists. Until 07_google_sso.sh seals the client
# secret and you commit it, the callback policy references a missing Secret and login fails. Per CLAUDE.md
# the NN prefix IS the wave.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: google-sso
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    # Diff via a server-side-apply dry-run so server-defaulted Gateway API fields (parentRefs/backendRefs
    # group+kind, rules.matches, weight, ...) don't show as perpetual OutOfSync. Pairs with ServerSideApply
    # below. Needs ArgoCD >= 2.10. See 12_google_sso.md.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/04_google_sso
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
