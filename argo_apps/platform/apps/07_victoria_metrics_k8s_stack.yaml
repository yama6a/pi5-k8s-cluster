# ArgoCD Application for the monitoring core, victoria-metrics-k8s-stack
# (argo_apps/charts/07_victoria_metrics_k8s_stack/). VMSingle + VMAgent + node-exporter + kube-state-metrics
# + default dashboards. Shape B: the bundled operator, vmalert, Alertmanager and Grafana are all OFF,# the operator runs standalone (01_victoria_metrics_operator) and Grafana (07_grafana) owns alerting.
# Replaces the retired kube-prometheus-stack in the same `monitoring` namespace. Also owns its own edge
# (folded in from the retired 07_monitoring_ingress): the vmui Gateway/Certificate/HTTPRoute behind Google
# SSO (templates/edge-*.yaml). vmui has no login of its own, so the `sso: pontiki.app` label IS the only
# barrier. See 15_monitoring.md.
#
# AUTOMATED (prune + selfHeal): a safe leaf, it owns no CRDs (wave-0 app) and can't cut the cluster off
# its network. The operator-created VM* objects carry ArgoCD-ignore annotations
# (prometheus_converter_add_argocd_ignore_annotations / the operator's own resources), so ArgoCD doesn't
# fight the operator. Break-glass: `kubectl -n monitoring port-forward svc/vmsingle-victoria-metrics-k8s-stack 8428:8428`.
#
# sync-wave "7": same wave as Grafana (07_grafana) and VictoriaLogs (07_victoria_logs), after the
# operator (wave 1, long Healthy by now, so its webhook validates these VMSingle/VMAgent CRs) and Longhorn
# (wave 2, for the vmsingle PVC). Co-locating the vmui edge here lets its HTTPRoute backendRef resolve the
# instant the VMSingle Service appears. ServerSideApply for the large CRs; ServerSideDiff so operator- and
# server-defaulted CR / Gateway API fields don't show perpetual OutOfSync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics-k8s-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/07_victoria_metrics_k8s_stack
  destination:
    server: https://kubernetes.default.svc
    # The stack lands in `monitoring`; its edge resources set their own metadata.namespace, the Gateway/
    # Certificate/HTTPRoute in `gateway`, the ReferenceGrant in `monitoring`. The default AppProject permits
    # all three, so this multi-namespace app is fine.
    namespace: monitoring
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        pod-security.kubernetes.io/audit: privileged
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
