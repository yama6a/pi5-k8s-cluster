# ArgoCD Application for the sealed GitHub-webhook secret (argo_apps/platform/charts/03_argocd_webhook_secret/):
# one SealedSecret that MERGES webhook.github.secret into argocd-secret (patch-mode). This is split out of the
# wave-1 01_argocd chart ON PURPOSE — see that chart's Chart.yaml and docs/05_gitops.md. A SealedSecret in the
# argocd chart would be rendered by 05_argocd.sh's imperative helm install (and by the wave-1 self-heal) BEFORE
# the sealed-secrets controller + its bitnami.com/v1alpha1 CRD exist (wave 2), aborting the cold-boot install
# and deadlocking the sync. Living at wave 3 (after sealed-secrets) keeps the argocd install CRD-clean.
#
# AUTOMATED (prune + selfHeal): a safe leaf. It owns only the SealedSecret CR; the live argocd-secret is
# created + owned by argocd-server (01_argocd runs createSecret:false), and the controller only MERGES into it
# (patch-mode), so a prune here never deletes argocd-secret or server.secretkey.
#
# sync-wave "3": strictly AFTER the sealed-secrets controller + CRD (wave 2); argocd-secret already exists by
# now (argocd-server, wave 1) and 05_argocd.sh has annotated it patch-managed so the merge is allowed. No
# CreateNamespace: the argocd namespace is created during the 05_argocd bootstrap and already exists.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-webhook-secret
  namespace: argocd
  # Cascade-delete this app's own resources on Application deletion instead of orphaning them; see 05_gitops.md.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/03_argocd_webhook_secret
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 10m
