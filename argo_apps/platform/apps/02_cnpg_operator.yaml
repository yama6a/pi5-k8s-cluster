# ArgoCD Application for the CloudNativePG operator (argo_apps/platform/charts/02_cnpg_operator/), the
# Kubernetes-native PostgreSQL controller + its CRDs. This installs the OPERATOR ONLY; the actual
# database (a Cluster CR on a node-local local-path StorageClass) is the sample-workload workload. See 08_storage.md.
#
# AUTOMATED (prune + selfHeal): a safe leaf, like cert-manager / longhorn / sealed-secrets, it can't
# cut the cluster off its own network, so drift should auto-correct. A prune won't cascade-delete the
# databases: those Cluster CRs live in the separate sample-workload workload, and their PVCs are reclaimPolicy: Retain.
#
# sync-wave "2": same wave as cert-manager / longhorn / sealed-secrets, all independent leaves, none
# depends on the others (the operator only needs the CNI). Per CLAUDE.md the NN prefix IS the wave, so
# they share `02_` (distinct dir names). The sample-workload workload syncs only after the whole platform
# is Healthy, so its Cluster CRD + Longhorn are guaranteed present first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
  # Cascade-delete this app's own resources on Application deletion instead of orphaning them; see 05_gitops.md.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  revisionHistoryLimit: 0  # roll-forward only; no Argo rollback history (05_gitops.md)
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/02_cnpg_operator
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1  # unbounded; only retry re-drives a failed sync (see 05_gitops.md)
      refresh: true  # retry the latest revision so a fix commit lands mid-loop
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # the CNPG CRDs are large, SSA avoids the last-applied-annotation limit
