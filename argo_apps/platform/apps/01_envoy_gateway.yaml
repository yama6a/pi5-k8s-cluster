# ArgoCD Application for Envoy Gateway (argo_apps/charts/01_envoy_gateway/), the cluster's Gateway
# API data plane, replacing Cilium Gateway API. Installs the envoy-gateway controller, the Gateway
# API + Envoy Gateway CRDs, the `eg` GatewayClass and the LB-IP-pinning EnvoyProxy. Later waves attach
# their Gateway/HTTPRoutes/SecurityPolicies to this. See 11_envoy_gateway.md.
#
# AUTOMATED (prune + selfHeal): unlike Cilium it is NOT the CNI and cannot cut the cluster (or ArgoCD)
# off its own network, so drift should just auto-correct. It DOES own the Gateway API + Envoy Gateway
# CRDs, but ServerSideApply lets it adopt the CRDs Cilium previously vendored without a fight, and
# prune only removes what this app itself manages.
#
# sync-wave "1": same wave as ArgoCD, it needs only the CNI (wave 0), and it must come BEFORE
# cert-manager (wave 2, whose Gateway API support wants the CRDs present at startup) and the gateway
# (wave 3, which references the `eg` GatewayClass). Per CLAUDE.md the NN prefix IS the wave; two apps
# may share a wave (distinct dir names), like the wave-2 leaves.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
  # Cascade-delete this app's own resources on Application deletion instead of orphaning them; see 05_gitops.md.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  revisionHistoryLimit: 0  # roll-forward only; no Argo rollback history (05_gitops.md)
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/01_envoy_gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1  # unbounded; only retry re-drives a failed sync (see 05_gitops.md)
      refresh: true  # retry the latest revision so a fix commit lands mid-loop
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # adopt the Gateway API CRDs (CR/CRD field ownership) without conflicts
