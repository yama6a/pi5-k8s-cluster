# ArgoCD Application that makes ArgoCD MANAGE ITSELF from the wrapper chart at
# argo_apps/charts/01_argocd/. The 05_argocd.sh bootstrap installs the same chart/release by hand
# first; this Application then adopts it (same name "argocd" + namespace "argocd") and, from then
# on, reconciles ArgoCD from git. See 05_gitops.md.
#
# AUTOMATED (prune + selfHeal): safe to self-manage, ArgoCD applying its own manifests is the
# whole point. ServerSideApply avoids the "last-applied annotation too long" failure on the large
# argo-cd CRDs.
#
# sync-wave "1": after Cilium (wave 0), ArgoCD needs the CNI. Both are adopted (already running),
# so this is purely the order the root creates the Application objects. Future apps go at wave 2+.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  # Cascade-delete this app's own resources on Application deletion instead of orphaning them; see 05_gitops.md.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/01_argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
