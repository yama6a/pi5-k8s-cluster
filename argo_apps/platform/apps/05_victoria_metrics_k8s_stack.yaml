# ArgoCD Application for the monitoring core, victoria-metrics-k8s-stack
# (argo_apps/charts/05_victoria_metrics_k8s_stack/). VMSingle + VMAgent + node-exporter + kube-state-metrics
# + default dashboards. Shape B: the bundled operator, vmalert, Alertmanager and Grafana are all OFF,# the operator runs standalone (01_victoria_metrics_operator) and Grafana (05_grafana) owns alerting.
# Replaces the retired kube-prometheus-stack in the same `monitoring` namespace. The vmui UI is exposed by
# the consolidated platform-ingress app (wave 6), not here; vmui has no login of its own, so that ingress's
# Google-SSO gate is its only barrier. See 09_monitoring.md.
#
# AUTOMATED (prune + selfHeal): a safe leaf, it owns no CRDs (wave-0 app) and can't cut the cluster off
# its network. The operator-created VM* objects carry ArgoCD-ignore annotations
# (prometheus_converter_add_argocd_ignore_annotations / the operator's own resources), so ArgoCD doesn't
# fight the operator. Break-glass: `kubectl -n monitoring port-forward svc/vmsingle-victoria-metrics-k8s-stack 8428:8428`.
#
# sync-wave "5": same wave as Grafana (05_grafana) and VictoriaLogs (05_victoria_logs), after the
# operator (wave 1, long Healthy by now, so its webhook validates these VMSingle/VMAgent CRs) and Longhorn
# (wave 2, for the vmsingle PVC). The vmui edge now lives in the platform-ingress app at a LATER wave (6),
# so the VMSingle Service already exists when its route is created. ServerSideApply for the large CRs;
# ServerSideDiff so operator-/server-defaulted CR fields don't show perpetual OutOfSync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics-k8s-stack
  namespace: argocd
  # Cascade-delete this app's own resources on Application deletion instead of orphaning them; see 05_gitops.md.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  revisionHistoryLimit: 0  # roll-forward only; no Argo rollback history (05_gitops.md)
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/05_victoria_metrics_k8s_stack
  destination:
    server: https://kubernetes.default.svc
    # The stack lands in `monitoring` (single-namespace now that the edge moved to platform-ingress).
    namespace: monitoring
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        pod-security.kubernetes.io/audit: privileged
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1  # unbounded; only retry re-drives a failed sync (see 05_gitops.md)
      refresh: true  # retry the latest revision so a fix commit lands mid-loop
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
