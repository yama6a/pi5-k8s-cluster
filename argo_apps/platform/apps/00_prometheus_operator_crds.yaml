# ArgoCD Application for the Prometheus Operator CRDs (argo_apps/charts/00_prometheus_operator_crds/).
# CRDs ONLY, no controller. The operator + the rest of the stack land at wave 5
# (07_kube_prometheus_stack, crds.enabled:false); this app owns their CRD lifecycle separately so they
# can be upgraded independently and so the CRDs exist before ANY consumer.
#
# sync-wave "0": foundational, alongside cilium. Every component ServiceMonitor we switch on lives in
# an earlier-or-equal wave than the stack, cilium (0), argocd (1), cert-manager/longhorn/sealed-secrets
# (2). On a from-scratch bootstrap those waves can't go Healthy until the ServiceMonitor CRD exists, so
# the CRDs MUST precede them, hence wave 0. CRDs with no controller are inert; ServiceMonitors created
# before the operator (wave 5) simply wait for it. Like 01_envoy_gateway owning the Gateway API CRDs.
#
# AUTOMATED with prune:false, a CRD-only app must NEVER cascade-delete its CRDs (that would take every
# Prometheus/Alertmanager/ServiceMonitor/PrometheusRule CR with them). selfHeal:true is safe: re-applying
# CRDs can't cut the cluster off its network. ServerSideApply=true, the operator CRDs are huge and blow
# past the client-side last-applied-annotation size limit. See 15_monitoring.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-operator-crds
  namespace: argocd
  # Cascade-delete this app's own resources on Application deletion instead of orphaning them; see 05_gitops.md.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/00_prometheus_operator_crds
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false   # CRD-only app: pruning a CRD cascade-deletes every CR of that kind cluster-wide
      selfHeal: true
    retry:
      limit: -1  # unbounded; only retry re-drives a failed sync (see 05_gitops.md)
      refresh: true  # retry the latest revision so a fix commit lands mid-loop
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # operator CRDs are large, SSA avoids the last-applied-annotation limit
