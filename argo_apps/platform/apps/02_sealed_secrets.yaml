# ArgoCD Application for the Sealed Secrets controller (argo_apps/charts/02_sealed_secrets/), the
# in-cluster secret-encryption layer. SealedSecret CRs are asymmetrically encrypted and safe to
# commit to git; only this controller (holding the RSA private key) can decrypt them. See
# 07_sealed_secrets.md and 05_gitops.md ("sealed-secrets is reserved for app/cluster secrets later").
#
# AUTOMATED (prune + selfHeal): a safe leaf, like nic-keeper, it can't cut the cluster off its own
# network, so drift should just auto-correct. The controller's runtime-generated key Secret is NOT
# in git, so `prune` never touches it (back it up out-of-band with 05_gitops/backup_sealed_secrets_key.sh).
#
# sync-wave "2": same wave as nic-keeper, the two are independent, neither depends on the other.
# Per CLAUDE.md the NN prefix IS the wave, so both share `02_` (distinct dir names). Wave 2 is the
# "after the platform (CNI + ArgoCD) is in place" slot.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  # Cascade-delete this app's own resources on Application deletion instead of orphaning them; see 05_gitops.md.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/02_sealed_secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 10m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
