# ArgoCD Application for the RabbitMQ operators (argo_apps/platform/charts/02_rabbitmq_operator/): the
# Cluster Operator + the Messaging Topology Operator + their CRDs. This installs the OPERATORS ONLY; the
# actual broker (a single RabbitmqCluster) is 03_rabbitmq_cluster (wave 3), and workloads declare their own
# topology via the shared lib/helm/rabbitmq-topology chart. See 11_messaging.md.
#
# AUTOMATED (prune + selfHeal): a safe leaf, like cert-manager / longhorn / cnpg-operator, it can't cut the
# cluster off its own network, so drift auto-corrects. A prune won't cascade-delete broker data: the
# RabbitmqCluster is a separate app (wave 3) and its PVCs are Longhorn (not owned by this app).
#
# sync-wave "2": same wave as cert-manager / longhorn / cnpg-operator, independent leaves that only need the
# CNI (the topology operator self-signs its webhook, so it does NOT depend on cert-manager — see values.yaml).
# Per CLAUDE.md the NN prefix IS the wave, so they share `02_` (distinct dir names). 03_rabbitmq_cluster
# syncs at wave 3, after these operators + CRDs are Healthy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/02_rabbitmq_operator
  destination:
    server: https://kubernetes.default.svc
    namespace: rabbitmq
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # the RabbitMQ CRDs are large, SSA avoids the last-applied-annotation limit
