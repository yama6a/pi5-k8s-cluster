# ArgoCD Application for standalone Grafana (argo_apps/charts/07_grafana/), the dashboards UI for the
# monitoring core. The grafana/grafana chart (no CRDs); its sidecar ingests kube-prometheus-stack's
# emitted datasource + dashboard ConfigMaps (search-all-namespaces). Grafana's own auth is off
# (anonymous Admin); the only gate is Google SSO, applied by the consolidated platform-ingress app (wave
# 8) which fronts grafana.ops.pontiki.app. No persistence. See 09_monitoring.md.
#
# AUTOMATED (prune + selfHeal): a leaf workload in the `monitoring` namespace, it can't cut the cluster
# off its network, and it owns no CRDs.
#
# sync-wave "7": same wave as the stack it reads ConfigMaps from (07_victoria_metrics_k8s_stack). The
# sidecar is a continuous watcher, so no hard "after the stack" ordering is needed. The grafana edge now
# lives in the platform-ingress app at a LATER wave (8), so the grafana Service already exists when its
# route is created (its backendRef resolves immediately). The namespace is labelled privileged exactly like
# the stack (idempotent if the stack created `monitoring` first); ServerSideApply for parity with the other
# monitoring apps; ServerSideDiff so server-defaulted CR fields don't show perpetual OutOfSync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/07_grafana
  destination:
    server: https://kubernetes.default.svc
    # Grafana lands in `monitoring` (single-namespace now that the edge moved to platform-ingress).
    namespace: monitoring
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        pod-security.kubernetes.io/audit: privileged
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
