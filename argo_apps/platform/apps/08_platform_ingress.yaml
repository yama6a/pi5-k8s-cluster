# ArgoCD Application for THE platform ingress (argo_apps/platform/charts/08_platform_ingress/). One app
# fronting every platform UI (argocd, grafana, vmui, vlogs) through a per-host Gateway (merged onto the
# one Envoy), all behind ONE Google-SSO SecurityPolicy sharing ONE email allowlist. This REPLACES the
# four hand-copied edge quartets that used to live inside 06_argocd_ingress + the three 07_* monitoring
# charts, and carries the SecurityPolicy that used to be the domain-central one in 04_google_sso. The
# whole edge is rendered by the shared ingress-edge library (a file:// dependency); no edge YAML is
# hand-written. See 07_ingress.md.
#
# AUTOMATED (prune + selfHeal): a safe leaf, Gateways + Certificates + HTTPRoutes + ReferenceGrants + one
# SecurityPolicy, no CRDs, can't cut the cluster off its network. Break-glass if this wedges a UI:
# `kubectl -n argocd port-forward svc/argocd-server 8080:80` bypasses the Gateway + SSO entirely.
#
# sync-wave "8": AFTER the monitoring backends (wave 7) so every cross-namespace backendRef resolves the
# instant the route is created (no ResolvedRefs:False across a wave boundary), and after the gateway
# (wave 3), sealed-secrets (wave 2) and 04_google_sso (wave 4, the shared callback host + sealed OAuth
# secret the SecurityPolicy references). The route AND its SecurityPolicy are created together here, so a
# protected UI is never briefly exposed. ServerSideDiff so server-defaulted Gateway API fields don't show
# perpetual OutOfSync; pairs with ServerSideApply.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-ingress
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/08_platform_ingress
  destination:
    server: https://kubernetes.default.svc
    # The Gateways/Certificates/HTTPRoutes/SecurityPolicy land in `gateway`; each ReferenceGrant sets its
    # own metadata.namespace (argocd / monitoring). The default AppProject permits all three, so this
    # multi-namespace app is fine.
    namespace: gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
