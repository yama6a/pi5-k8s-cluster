# ArgoCD Application for local-path-provisioner (argo_apps/platform/charts/02_local_path_provisioner/) —
# node-local dynamic PVs on the dedicated XFS 'cnpg' user volume (mounted at /var/mnt/cnpg by 03d,
# exposed to the kubelet by 03d's extraMount). It backs CloudNativePG OFF Longhorn so that Postgres
# streaming replication is the only replication layer, on a partition isolated from Longhorn's.
# See 18_local_path_provisioner.md.
#
# AUTOMATED (prune + selfHeal): a safe leaf like longhorn / cnpg-operator / sealed-secrets — it owns
# no CRDs and can't cut the cluster off its network, so drift should auto-correct.
#
# sync-wave "2": same wave as longhorn / cnpg-operator / cert-manager / sealed-secrets — independent
# storage leaves, none depends on the others. Per CLAUDE.md the NN prefix IS the wave (02_). The CNPG
# *cluster* that consumes the local-path class is a workload, only created once the whole platform is
# Healthy, so any platform wave is early enough — wave 2 keeps it with the storage leaves.
#
# No privileged PSA needed: the provisioner + its helper pods only require `baseline` (hostPath is
# permitted under baseline, nothing runs privileged), which is Talos' default — so unlike longhorn this
# app needs no managedNamespaceMetadata.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-path-provisioner
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/charts/02_local_path_provisioner
  destination:
    server: https://kubernetes.default.svc
    namespace: local-path-storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
