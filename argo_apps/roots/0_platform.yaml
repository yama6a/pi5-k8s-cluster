# The PLATFORM root. A child of the root-of-roots (argo_apps/root.yaml), which creates it FIRST
# (sync-wave "0", ~5s before the workloads root). It watches argo_apps/platform/apps/ and manages every
# platform Application it finds there (directory.recurse): CNI, operators, CRDs, storage, gateway,
# monitoring, SSO. Those children keep their own internal sync-waves (00...07), which now order CREATION
# only — there is no health gate, so a wave no longer waits for the prior wave's apps to be Healthy. See 05_gitops.md.
#
# AUTOMATED: keeps the set of platform Application OBJECTS matching git; each child's own syncPolicy
# governs its resources. Every platform app stays auto-syncing so it self-converges via unbounded retry;
# with no health gate an OutOfSync app no longer stalls later waves, but auto-sync is still how it recovers.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
  # Cascade-delete this app's own resources on Application deletion instead of orphaning them; see 05_gitops.md.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  revisionHistoryLimit: 0  # roll-forward only; no Argo rollback history (05_gitops.md)
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1  # unbounded; only retry re-drives a failed sync (see 05_gitops.md)
      refresh: true  # retry the latest revision so a fix commit lands mid-loop
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
