# The PLATFORM root. A child of the root-of-roots (argo_apps/root.yaml), which creates it FIRST
# (sync-wave "0") and waits for it to be Healthy before creating the workloads root. It watches
# argo_apps/platform/apps/ and manages every platform Application it finds there (directory.recurse),# CNI, operators, CRDs, storage, gateway, monitoring, SSO. Those children keep their own internal
# sync-waves (00...07); this root drives them in that order. See 05_gitops.md.
#
# AUTOMATED: keeps the set of platform Application OBJECTS matching git; each child's own syncPolicy
# governs its workloads (so the manual Cilium app is never force-synced just because this root owns its
# Application object). This root must reach Healthy for the workloads tree to start, so every platform
# app stays auto-syncing (a perpetually-OutOfSync platform app would stall workloads forever).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster
    targetRevision: HEAD
    path: argo_apps/platform/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
