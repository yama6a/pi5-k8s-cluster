# The app-of-apps ROOT. Applied once by 05_gitops/05_argocd.sh. It watches argo_apps/apps/ and
# manages every child Application it finds there (directory.recurse). Adding a future app = drop a
# new NN_name.yaml in argo_apps/apps/ pointing at its wrapper chart under argo_apps/charts/ — the
# root picks it up on the next reconcile. See 05_gitops.md.
#
# AUTOMATED: the root keeps the set of child Application OBJECTS matching git. It does NOT force a
# sync of each child's workloads — that's governed by each child's own syncPolicy (so the manual
# Cilium app is never auto-reconciled just because the root manages its Application object).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yama6a/pi5-k8s-cluster.git
    targetRevision: HEAD
    path: argo_apps/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
