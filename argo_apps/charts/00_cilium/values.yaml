# Values for the 00_cilium wrapper chart. SINGLE SOURCE OF TRUTH — both the 04_cilium.sh
# bootstrap and the ArgoCD Application consume this. The chart version is pinned in Chart.yaml.

# Everything under `cilium:` is passed to the upstream cilium/cilium subchart (key == dependency name).
cilium:
  # Talos on Raspberry Pi 5.
  ipam:
    mode: kubernetes
  kubeProxyReplacement: true
  k8sServiceHost: localhost # Talos KubePrism
  k8sServicePort: 7445
  encryption:
    enabled: true
    type: wireguard # transparent node-to-node encryption
  l2announcements:
    enabled: true # LoadBalancer IPs announced via ARP (replaces MetalLB)
  gatewayAPI:
    enabled: true # CRDs are vendored in crds/ (Gateway API v1.4.1)
  hubble:
    enabled: true
    relay: {enabled: true}
    ui: {enabled: true}
  # Talos-specific: it doesn't auto-mount cgroup v2, and the agent needs an explicit cap set.
  cgroup:
    autoMount: {enabled: false}
    hostRoot: /sys/fs/cgroup
  securityContext:
    capabilities:
      ciliumAgent: [CHOWN, KILL, NET_ADMIN, NET_RAW, IPC_LOCK, SYS_ADMIN, SYS_RESOURCE, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
      cleanCiliumState: [NET_ADMIN, SYS_ADMIN, SYS_RESOURCE]
      # L2 announcements lean on leader-election leases; if you scale up the pool and see API
      # throttling in the operator logs, raise k8sClientRateLimit (qps/burst).
# LB-IPAM pool + L2 announcement policy (templates/cilium-lb.yaml). These reference Cilium CRDs
# the operator only registers at runtime, so the 04_cilium.sh bootstrap installs Cilium with this
# OFF first, waits for the operator, then re-applies with it ON. ArgoCD just leaves it true.
loadBalancer:
  enabled: true
  # LB-IPAM address pool (CiliumLoadBalancerIPPool blocks). Written here by 04_cilium.sh
  # from 04_networking/config.sh (yq) — don't hand-edit; change the range in config.sh and
  # re-run the script. ArgoCD reads these values, so this is what keeps Argo + the pool in sync.
  ipPool:
    start: "192.168.100.10"
    stop: "192.168.100.250"
