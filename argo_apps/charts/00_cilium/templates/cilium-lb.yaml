{{- if .Values.loadBalancer.enabled }}
# LoadBalancer IPs for the cluster. COMMIT THIS — later managed by ArgoCD.
apiVersion: cilium.io/v2          # promoted to v2 in Cilium 1.19
kind: CiliumLoadBalancerIPPool
metadata:
  name: pool-default
spec:
  blocks:
    - start: "{{ .Values.loadBalancer.ipPool.start }}"
      stop:  "{{ .Values.loadBalancer.ipPool.stop }}"
---
apiVersion: cilium.io/v2alpha1    # L2 policy is still v2alpha1 in 1.19
kind: CiliumL2AnnouncementPolicy
metadata:
  name: l2-default
spec:
  loadBalancerIPs: true
  # Also announce externalIPs. The shared Gateway's IP is BOTH an LB-IPAM ingress IP (lbipam annotation)
  # AND a spec.externalIP (Envoy Gateway copies the Gateway's spec.addresses onto the Service). When one
  # IP is both, Cilium creates a single frontend typed `ExternalIPs`, which loadBalancerIPs:true alone
  # does NOT announce — and the type can land differently across restarts, so the LB IP silently stops
  # being ARP-announced (no lease, gateway unreachable) on a reschedule/rebuild. Announcing both makes it
  # deterministic. See 04_networking.md.
  externalIPs: true
  interfaces:
    - ^end0$
  # ALL nodes are control-plane here, so select every Linux node (the common
  # 'control-plane DoesNotExist' selector would match zero nodes on this cluster).
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
{{- end }}
