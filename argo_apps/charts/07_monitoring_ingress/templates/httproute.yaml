# One HTTPRoute per UI -> the stack's Service (cross-namespace, via the ReferenceGrant). In the gateway
# namespace so the 04_google_sso SecurityPolicy (also gateway ns) selects it by the `sso: <domain>` label
# — that's the ONLY auth gate in front of these UIs (they have no login of their own).
{{- range .Values.hosts }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.gatewayNamespace }}
  labels:
    {{ $.Values.routeLabelKey }}: {{ $.Values.sso | quote }}
spec:
  parentRefs:
    - name: {{ $.Values.gatewayName }}
      namespace: {{ $.Values.gatewayNamespace }}
      sectionName: {{ .name }}
  hostnames:
    - {{ .host | quote }}
  rules:
    - backendRefs:
        - name: {{ .backend.name }}
          namespace: {{ $.Values.backendNamespace }}
          port: {{ .backend.port }}
{{- end }}
