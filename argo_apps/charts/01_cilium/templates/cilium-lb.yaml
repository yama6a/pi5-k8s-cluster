{{- if .Values.loadBalancer.enabled }}
# LoadBalancer IPs for the cluster. COMMIT THIS — later managed by ArgoCD.
apiVersion: cilium.io/v2          # promoted to v2 in Cilium 1.19
kind: CiliumLoadBalancerIPPool
metadata:
  name: pool-default
spec:
  blocks:
    - start: "192.168.100.10"
      stop:  "192.168.100.250"
---
apiVersion: cilium.io/v2alpha1    # L2 policy is still v2alpha1 in 1.19
kind: CiliumL2AnnouncementPolicy
metadata:
  name: l2-default
spec:
  loadBalancerIPs: true
  interfaces:
    - ^end0$
  # ALL nodes are control-plane here, so select every Linux node (the common
  # 'control-plane DoesNotExist' selector would match zero nodes on this cluster).
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
{{- end }}
