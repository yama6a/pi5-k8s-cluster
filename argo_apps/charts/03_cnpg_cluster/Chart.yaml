apiVersion: v2
name: cnpg-cluster
description: >-
  Wrapper chart for a CloudNativePG Postgres Cluster on the Talos/Raspberry Pi 5 cluster — a 3-instance
  HA Postgres (1 primary + 2 streaming replicas, one per Pi node) provisioned by the CNPG operator
  (02_cnpg_operator). Carries both the upstream cnpg/cluster dependency (the Cluster CR) AND a
  first-party template: the dedicated `longhorn-single` StorageClass the database runs on. Postgres
  replicates at the DB layer, so its PVCs use a single Longhorn replica (numberOfReplicas: 1) to avoid
  stacking Longhorn HA on Postgres HA (3x3 = 9x write amplification). Single source of truth for the
  cluster chart version (this file) and its values (values.yaml, under the `cluster:` key). Delivered
  purely by ArgoCD via argo_apps/apps/03_cnpg_cluster.yaml — wave 3, after the operator's CRDs and
  Longhorn's CSI driver (both wave 2) are Healthy. No object-store backups in this pass. See 17_cnpg.md.
type: application
version: 0.1.0                 # this wrapper chart's own version

dependencies:
  - name: cluster
    version: "0.7.0"          # cnpg/cluster chart — THE single source for the pin
    repository: https://cloudnative-pg.github.io/charts
