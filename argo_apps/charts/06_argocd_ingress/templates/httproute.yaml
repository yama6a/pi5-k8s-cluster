# Routes the ArgoCD UI host to argocd-server (cross-namespace, via the ReferenceGrant below). Lives in
# the gateway namespace so the 04_google_sso SecurityPolicy (also gateway ns) selects it by the
# `sso: <domain>` label — that's the Google gate. ArgoCD's own admin login runs behind it.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: {{ .Values.gatewayNamespace }}
  labels:
    {{ .Values.routeLabelKey }}: {{ .Values.sso | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayName }}
      namespace: {{ .Values.gatewayNamespace }}
      sectionName: {{ .Values.listenerName }}
  hostnames:
    - {{ .Values.host | quote }}
  rules:
    - backendRefs:
        - name: {{ .Values.backend.name }}
          namespace: {{ .Values.backend.namespace }}
          port: {{ .Values.backend.port }}
