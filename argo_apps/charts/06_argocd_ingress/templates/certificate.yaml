# cert-manager mints this (HTTP-01 via the Gateway) into the Secret the `argocd` listener (03_gateway
# httpsHosts) references. In the gateway namespace, alongside the Gateway + its TLS Secrets. STAGING by
# default — flip .Values.issuer to letsencrypt-prod once it issues (the UI wants a browser-trusted cert).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd
  namespace: {{ .Values.gatewayNamespace }}
spec:
  secretName: {{ .Values.tlsSecretName | quote }}
  dnsNames:
    - {{ .Values.host | quote }}
  issuerRef:
    name: {{ .Values.issuer | quote }}
    kind: ClusterIssuer
