# Lets the HTTPRoute (in the gateway namespace) reference the argocd-server Service in the argocd
# namespace. Cross-namespace backendRefs require a ReferenceGrant in the BACKEND's namespace.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: gateway-routes-to-argocd-server
  namespace: {{ .Values.backend.namespace }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Values.gatewayNamespace }}
  to:
    - group: ""
      kind: Service
      name: {{ .Values.backend.name }}
