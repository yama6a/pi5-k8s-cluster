{{- if .Values.gatewayTestSso.enabled }}
{{- $host := printf "%s.%s" .Values.gatewayTestSso.subdomain .Values.baseDomain }}
# gateway-test-sso: the gateway-test echo app, but its HTTPRoute is labelled `auth: google-sso`. That
# label is the ONLY difference from gateway-test — the 04_google_sso SecurityPolicy selects routes by
# that label (targetSelectors) and attaches Google OIDC + email-allowlist authorization. The route
# points straight at the whoami Service (no proxy in the path); Envoy Gateway enforces auth at the edge
# before forwarding. Everything is in the gateway namespace, so no cross-namespace ReferenceGrant.
# See 12_google_sso.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-test-sso
  namespace: {{ .Values.gateway.namespace }}
  labels:
    app: gateway-test-sso
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-test-sso
  template:
    metadata:
      labels:
        app: gateway-test-sso
    spec:
      containers:
        - name: whoami
          image: {{ .Values.gatewayTestSso.image | quote }}
          ports:
            - name: http
              containerPort: 80
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { memory: 32Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-test-sso
  namespace: {{ .Values.gateway.namespace }}
spec:
  selector:
    app: gateway-test-sso
  ports:
    - name: http
      port: 80
      targetPort: http
---
# cert-manager mints this from the chosen ClusterIssuer (HTTP-01 via the Gateway) into the Secret the
# gateway-test-sso-https listener references. Defaults to STAGING — validate issuance for the new host
# before flipping gatewayTestSso.issuer to letsencrypt-prod (per 10_gateway.md).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gateway-test-sso
  namespace: {{ .Values.gateway.namespace }}
spec:
  secretName: {{ .Values.gatewayTestSso.tlsSecretName | quote }}
  dnsNames:
    - {{ $host | quote }}
  issuerRef:
    name: {{ .Values.gatewayTestSso.issuer | quote }}
    kind: ClusterIssuer
---
# Routes HTTPS traffic for the host to the echo Service. The `auth: google-sso` label is what the
# SecurityPolicy (04_google_sso) selects on — remove the label and this host goes open; add it to any
# other route and that host is protected too. No proxy backend: Envoy Gateway applies the policy itself.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-test-sso
  namespace: {{ .Values.gateway.namespace }}
  labels:
    auth: google-sso
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: gateway-test-sso-https
  hostnames:
    - {{ $host | quote }}
  rules:
    - backendRefs:
        - name: gateway-test-sso
          port: 80
{{- end }}
